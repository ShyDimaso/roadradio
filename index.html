<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Road Radio AI</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#05070f;height:100%;overscroll-behavior:none;}
body{font-family:'Inter',sans-serif;color:#ffffff;}
.app{min-height:100vh;background:#05070f;display:flex;flex-direction:column;max-width:500px;margin:0 auto;}
.hdr{padding:14px 18px;border-bottom:1px solid #1a2035;display:flex;align-items:center;justify-content:space-between;background:#05070f;position:sticky;top:0;z-index:99;}
.logo{font-family:'Orbitron',monospace;font-size:15px;font-weight:900;letter-spacing:2px;color:#ff6b35;}
.logo em{color:#4a9eff;font-style:normal;}
.pill{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;border:1px solid #1a2035;background:#0a0d1a;}
.dot{width:9px;height:9px;border-radius:50%;}
.dot.on{background:#00e87a;box-shadow:0 0 10px #00e87a;animation:pulse 1.5s infinite;}
.dot.ld{background:#f5c842;box-shadow:0 0 8px #f5c842;animation:pulse .8s infinite;}
.dot.off{background:#1a2035;}
.ptxt{font-family:'Orbitron',monospace;font-size:9px;font-weight:700;letter-spacing:2px;color:#ffffff;text-transform:uppercase;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* SETUP */
.setup{flex:1;padding:28px 20px;display:flex;flex-direction:column;gap:20px;}
.s-hero{text-align:center;}
.s-icon{font-size:52px;margin-bottom:10px;}
.s-title{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:#ff6b35;letter-spacing:2px;margin-bottom:6px;}
.s-sub{font-size:16px;color:#8899aa;line-height:1.5;}
.flabel{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:2px;color:#4a9eff;text-transform:uppercase;margin-bottom:9px;display:block;}
.finput{background:#0a0e20;border:2px solid #ffffff;border-radius:12px;padding:16px 18px;color:#ffffff;font-size:18px;outline:none;width:100%;}
.finput::placeholder{color:#334466;font-size:15px;}
.finput:focus{border-color:#4a9eff;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.dirhint{font-size:13px;color:#445566;margin-top:6px;}
.geobtn{background:#0a1528;border:2px solid #4a9eff;border-radius:12px;padding:16px;color:#4a9eff;font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;text-transform:uppercase;width:100%;}
.geobtn.ok{border-color:#00e87a;color:#00e87a;background:#051208;}
.errbox{padding:14px 16px;background:#200808;border:2px solid #aa2020;border-radius:10px;color:#ff8080;font-size:15px;font-weight:600;}
.startbtn{background:linear-gradient(135deg,#0d3a0d,#1a6a1a);color:#00e87a;border:2px solid #1e5a1e;border-radius:14px;padding:20px;font-family:'Orbitron',monospace;font-size:14px;font-weight:900;letter-spacing:2px;cursor:pointer;text-transform:uppercase;width:100%;margin-top:auto;}
.keybtn{background:#0a1528;border:2px solid #4a9eff;border-radius:12px;padding:15px;color:#4a9eff;font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;text-transform:uppercase;width:100%;}

/* KEY SCREEN */
.keyscreen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:24px;text-align:center;}
.key-icon{font-size:60px;}
.key-title{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:#ff6b35;letter-spacing:2px;}
.key-sub{font-size:16px;color:#8899aa;line-height:1.7;}
.key-sub a{color:#4a9eff;text-decoration:none;}
.kinput{background:#0a0e20;border:2px solid #ffffff;border-radius:12px;padding:16px 18px;color:#ffffff;font-size:14px;font-family:monospace;outline:none;width:100%;letter-spacing:1px;}
.kinput::placeholder{color:#334466;font-size:13px;}
.kinput:focus{border-color:#4a9eff;}
.savebtn{background:linear-gradient(135deg,#0d3a0d,#1a6a1a);color:#00e87a;border:2px solid #1e5a1e;border-radius:14px;padding:18px;font-family:'Orbitron',monospace;font-size:13px;font-weight:900;letter-spacing:2px;cursor:pointer;text-transform:uppercase;width:100%;}

/* MAIN */
.imgzone{position:relative;height:200px;background:#07091a;overflow:hidden;flex-shrink:0;}
.locimg{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .8s;}
.locimg.on{opacity:.65;}
.imgover{position:absolute;inset:0;background:linear-gradient(to top,rgba(5,7,15,1) 0%,rgba(5,7,15,.2) 60%,transparent 100%);}
.imgbot{position:absolute;bottom:0;left:0;right:0;padding:14px 18px;}
.locname{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:2px;color:#ff6b35;text-transform:uppercase;margin-bottom:4px;}
.loccrd{font-family:'Orbitron',monospace;font-size:10px;color:#8899aa;letter-spacing:1px;}
.imgsp{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:36px;opacity:.15;animation:spin 4s linear infinite;}

.dash{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 14px;border-bottom:1px solid #1a2035;}
.gauge{text-align:center;padding:12px 4px;background:#0a0d1a;border:1px solid #1a2035;border-radius:10px;}
.gv{font-family:'Orbitron',monospace;font-size:22px;font-weight:700;color:#00e87a;line-height:1;}
.gv.d{font-size:20px;color:#4a9eff;}
.gv.c{font-size:20px;color:#f5c842;}
.gv.w{font-size:15px;color:#cc88ff;padding-top:2px;}
.gl{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1.5px;color:#334455;text-transform:uppercase;margin-top:5px;}

.sa{flex:1;padding:18px;overflow-y:auto;}
.airbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.airlbl{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:3px;color:#334455;text-transform:uppercase;display:flex;align-items:center;gap:7px;}
.airdot{width:7px;height:7px;border-radius:50%;background:#ff6b35;animation:pulse 1.4s infinite;}
.snum{font-family:'Orbitron',monospace;font-size:10px;color:#223344;letter-spacing:1px;}
.stxt{font-size:21px;line-height:1.75;color:#ffffff;font-style:italic;animation:fadeUp .5s ease;}
.ldtxt{color:#334455;font-family:'Orbitron',monospace;font-size:12px;display:flex;align-items:center;gap:10px;letter-spacing:1px;}
.sp{display:inline-block;animation:spin 1s linear infinite;}
.pgrow{display:flex;align-items:center;gap:10px;margin-top:14px;}
.pglbl{font-family:'Orbitron',monospace;font-size:9px;color:#334455;white-space:nowrap;}
.pgbar{flex:1;height:3px;background:#0d1020;border-radius:2px;overflow:hidden;}
.pgfill{height:100%;background:linear-gradient(to right,#ff6b35,#f5c842);border-radius:2px;transition:width 1s linear;}

.togrow{padding:8px 14px;display:flex;gap:8px;border-top:1px solid #1a2035;}
.tog{flex:1;padding:11px 6px;background:#0a0d1a;border:1px solid #1a2035;border-radius:9px;font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;color:#8899aa;cursor:pointer;text-transform:uppercase;text-align:center;}
.tog.act{background:#081428;border-color:#4a9eff;color:#4a9eff;}
.tog.spk{background:#051208;border-color:#1a3a18;color:#00e87a;}
.tog.spk.going{border-color:#00e87a;background:#0a2010;}
.tog.wake{color:#f5c842;}
.tog.wake.act{border-color:#f5c842;background:#120e02;}

.wakeinfo{font-family:'Orbitron',monospace;font-size:9px;color:#334455;text-align:center;padding:5px 0;letter-spacing:1px;}
.qa{padding:10px 14px;border-top:1px solid #1a2035;}
.qi{width:100%;background:#0a0e20;border:2px solid #ffffff;border-radius:10px;padding:14px 15px;color:#ffffff;font-size:17px;outline:none;margin-bottom:8px;}
.qi::placeholder{color:#334466;}
.qbs{display:flex;gap:8px;}
.ctrl{padding:13px 14px 24px;display:flex;gap:10px;border-top:1px solid #1a2035;}
.btn{flex:1;padding:17px;border:none;border-radius:12px;font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:1.5px;cursor:pointer;text-transform:uppercase;}
.btn:active{transform:scale(.96);}
.bstop{background:linear-gradient(135deg,#2e0d0d,#5a1a1a);color:#ff8888;border:2px solid #4a2020;}
.bq{flex:.6;background:#0a0d1a;color:#4a9eff;border:2px solid #1a2a50;font-size:10px;}
.bsend{background:#0d1e3a;color:#4a9eff;border:2px solid #1a3060;}
.bcancel{background:#0a0a18;color:#556677;border:2px solid #14162a;flex:.5;}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useRef,useEffect}=React;
const PROXY="https://corsproxy.io/?https://api.anthropic.com/v1/messages";
const KEY_STORE="rr_key_v3";
const toDir=h=>{if(h==null||isNaN(h))return"—";const d=["N","NE","E","SE","S","SW","W","NW"];return d[Math.round(((h%360)+360)%360/45)%8];};
const toMph=ms=>ms&&ms>0?Math.round(ms*2.237):0;

function App(){
  const saved=localStorage.getItem(KEY_STORE)||"";
  const [screen,setScreen]=useState(saved?"setup":"apikey");
  const [apiInput,setApiInput]=useState("");
  const [coordInput,setCoordInput]=useState("");
  const [speedVal,setSpeedVal]=useState("65");
  const [headVal,setHeadVal]=useState("90");
  const [geoOk,setGeoOk]=useState(false);
  const [coords,setCoords]=useState(null);
  const [status,setStatus]=useState("idle");
  const [story,setStory]=useState("");
  const [locName,setLocName]=useState("");
  const [imgUrl,setImgUrl]=useState("");
  const [imgOn,setImgOn]=useState(false);
  const [err,setErr]=useState("");
  const [qMode,setQMode]=useState(false);
  const [qText,setQText]=useState("");
  const [showTxt,setShowTxt]=useState(true);
  const [count,setCount]=useState(0);
  const [cd,setCd]=useState(0);
  const [speaking,setSpeaking]=useState(false);
  const [wakeLock,setWakeLock]=useState(false);

  const runRef=useRef(false);
  const histRef=useRef([]);
  const loopRef=useRef(null);
  const coordsRef=useRef(null);
  const cdRef=useRef(null);
  const wlRef=useRef(null);

  useEffect(()=>{if(coords)coordsRef.current=coords;},[coords]);

  const requestWake=async()=>{
    try{if("wakeLock" in navigator){wlRef.current=await navigator.wakeLock.request("screen");setWakeLock(true);wlRef.current.addEventListener("release",()=>setWakeLock(false));}}catch{}
  };

  const startCd=s=>{
    setCd(s);
    if(cdRef.current)clearInterval(cdRef.current);
    cdRef.current=setInterval(()=>setCd(p=>{if(p<=1){clearInterval(cdRef.current);return 0;}return p-1;}),1000);
  };

  const speak=text=>new Promise(res=>{
    try{
      const s=window.speechSynthesis;
      if(!s){res();return;}
      s.cancel();
      const u=new SpeechSynthesisUtterance(text);
      u.lang="en-US";u.rate=0.88;u.pitch=1.05;
      try{const vs=s.getVoices();const v=vs.find(x=>x.lang.startsWith("en")&&(x.name.includes("Google")||x.name.includes("Samantha")))||vs.find(x=>x.lang.startsWith("en"))||vs[0];if(v)u.voice=v;}catch{}
      setSpeaking(true);
      u.onend=u.onerror=()=>{setSpeaking(false);res();};
      s.speak(u);
    }catch{setSpeaking(false);res();}
  });

  const callClaude=async msg=>{
    const key=localStorage.getItem(KEY_STORE);
    const msgs=[...histRef.current.slice(-6),{role:"user",content:msg}];
    const r=await fetch(PROXY,{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:400,
        system:`You are Road Radio AI — an engaging audio guide for drivers on US roads.
Narrate like the best radio host: vivid, enthusiastic, specific details — history, nature, wildlife, mountains, towns, legends.
Name specific places, peaks, rivers, towns. Always hint at what's coming ahead.
Never say you don't know — always find something fascinating about the region.
3-4 sentences max. English only.
Reply ONLY with valid JSON, no markdown:
{"story":"3-4 engaging sentences","location":"specific place name","image":"2-3 words for landscape photo"}`,
        messages:msgs
      })
    });
    if(!r.ok)throw new Error(await r.text());
    const data=await r.json();
    let txt=data.content?.[0]?.text??"{}";
    txt=txt.replace(/```json|```/g,"").trim();
    try{const p=JSON.parse(txt);histRef.current=[...msgs,{role:"assistant",content:txt}];return p;}
    catch{histRef.current=[...msgs,{role:"assistant",content:txt}];return{story:txt,location:"On the road",image:"american highway"};}
  };

  const loop=async()=>{
    if(!runRef.current)return;
    const c=coordsRef.current;
    if(!c)return;
    setStatus("loading");
    try{
      const prompt=`Coordinates: ${c.lat.toFixed(4)}°N, ${Math.abs(c.lng).toFixed(4)}°W. Speed: ${toMph(c.speed)||parseInt(speedVal)||65} mph. Heading: ${toDir(c.heading)}. What's interesting here and ahead?`;
      const res=await callClaude(prompt);
      if(!runRef.current)return;
      setStory(res.story||"");
      setLocName(res.location||"On the road");
      setImgOn(false);
      setImgUrl(`https://source.unsplash.com/700x320/?${encodeURIComponent(res.image||"american highway")}&t=${Date.now()}`);
      setStatus("ready");
      setCount(n=>n+1);
      startCd(35);
      if(res.story)speak(res.story);
      await new Promise(r=>setTimeout(r,35000));
      if(runRef.current)loopRef.current?.();
    }catch(e){
      setErr("API error: "+(e.message||"").slice(0,80));
      runRef.current=false;setStatus("idle");
    }
  };
  loopRef.current=loop;

  const getGeo=()=>{
    if(!navigator.geolocation){setErr("Geolocation not supported");return;}
    setErr("");
    navigator.geolocation.getCurrentPosition(pos=>{
      const c={lat:pos.coords.latitude,lng:pos.coords.longitude,speed:pos.coords.speed||0,heading:pos.coords.heading};
      setCoordInput(`${c.lat.toFixed(6)}, ${c.lng.toFixed(6)}`);
      if(c.speed)setSpeedVal(String(toMph(c.speed)));
      if(c.heading)setHeadVal(String(Math.round(c.heading)));
      coordsRef.current=c;setGeoOk(true);
    },()=>setErr("Location denied. Enter manually."),{enableHighAccuracy:true,timeout:12000});
  };

  const parseCoords=()=>{
    const m=coordInput.trim().match(/(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)/);
    if(!m)return null;
    return{lat:parseFloat(m[1]),lng:parseFloat(m[2]),speed:0,heading:parseFloat(headVal)||90};
  };

  const startGeoWatch=()=>{
    if(!navigator.geolocation)return;
    navigator.geolocation.watchPosition(pos=>{
      const c={lat:pos.coords.latitude,lng:pos.coords.longitude,speed:pos.coords.speed||0,heading:pos.coords.heading};
      coordsRef.current=c;setCoords(c);
    },()=>{},{enableHighAccuracy:true,maximumAge:5000});
  };

  const startTour=async()=>{
    let c=coordsRef.current||parseCoords();
    if(!c){setErr("Tap Auto-Detect or enter coordinates");return;}
    coordsRef.current=c;setCoords(c);
    runRef.current=true;histRef.current=[];
    setErr("");setStory("");setCount(0);
    setScreen("main");startGeoWatch();
    await requestWake();
    setTimeout(()=>loopRef.current?.(),300);
  };

  const stop=()=>{
    runRef.current=false;
    try{window.speechSynthesis?.cancel();}catch{}
    setSpeaking(false);setStatus("idle");
    try{wlRef.current?.release();}catch{}
    setWakeLock(false);
    if(cdRef.current)clearInterval(cdRef.current);
    setScreen("setup");
  };

  const sendQ=async()=>{
    if(!qText.trim())return;
    try{window.speechSynthesis?.cancel();}catch{}
    setQMode(false);setStatus("loading");
    try{
      const res=await callClaude(qText);
      setStory(res.story||res);setQText("");setStatus("ready");startCd(35);
      if(res.story)speak(res.story);
      await new Promise(r=>setTimeout(r,35000));
      if(runRef.current)loopRef.current?.();else setStatus("idle");
    }catch{setStatus("idle");}
  };

  const saveKey=()=>{
    const k=apiInput.trim();
    if(!k.startsWith("sk-ant")){setErr("Key must start with sk-ant...");return;}
    localStorage.setItem(KEY_STORE,k);setErr("");setScreen("setup");
  };

  const isMain=screen==="main";
  const dotCls=!isMain?"off":status==="loading"?"ld":"on";

  return(
    <div className="app">
      <div className="hdr">
        <div className="logo">Road <em>Radio</em> AI</div>
        <div className="pill">
          <div className={`dot ${dotCls}`}/>
          <span className="ptxt">{!isMain?"READY":status==="loading"?"LOADING":"ON AIR"}</span>
        </div>
      </div>

      {screen==="apikey"&&(
        <div className="keyscreen">
          <div className="key-icon">🔑</div>
          <div className="key-title">One-Time Setup</div>
          <div className="key-sub">Get your free API key at<br/><a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a><br/>Free $5 credit — ~200 hours of stories</div>
          <div style={{width:"100%"}}>
            <div className="flabel">Paste Anthropic API Key</div>
            <input className="kinput" value={apiInput} onChange={e=>setApiInput(e.target.value)} placeholder="sk-ant-api03-..."/>
          </div>
          {err&&<div className="errbox">{err}</div>}
          <button className="savebtn" onClick={saveKey}>Save & Continue →</button>
          <div style={{fontSize:"13px",color:"#445566",textAlign:"center"}}>Stored only on your device</div>
        </div>
      )}

      {screen==="setup"&&(
        <div className="setup">
          <div className="s-hero">
            <div className="s-icon">🛣️</div>
            <div className="s-title">Road Radio AI</div>
            <div className="s-sub">Your smart guide to American roads</div>
          </div>
          <button className={`geobtn${geoOk?" ok":""}`} onClick={getGeo}>
            {geoOk?"✓ Location Detected!":"📍 Auto-Detect My Location"}
          </button>
          <div style={{display:"flex",alignItems:"center",gap:"12px",color:"#445566",fontSize:"14px"}}>
            <div style={{flex:1,height:"1px",background:"#1a2035"}}/>or enter manually<div style={{flex:1,height:"1px",background:"#1a2035"}}/>
          </div>
          <div>
            <label className="flabel">📍 Coordinates (lat, lng)</label>
            <input className="finput" value={coordInput} onChange={e=>setCoordInput(e.target.value)} placeholder="35.2266, -100.0482"/>
          </div>
          <div className="row2">
            <div>
              <label className="flabel">🚀 Speed (mph)</label>
              <input className="finput" type="number" value={speedVal} onChange={e=>setSpeedVal(e.target.value)}/>
            </div>
            <div>
              <label className="flabel">🧭 Heading °</label>
              <input className="finput" type="number" value={headVal} onChange={e=>setHeadVal(e.target.value)}/>
              <div className="dirhint">N=0 · E=90 · S=180 · W=270</div>
            </div>
          </div>
          {err&&<div className="errbox">⚠ {err}</div>}
          <button className="keybtn" onClick={()=>{localStorage.removeItem(KEY_STORE);setScreen("apikey");}}>🔑 Change API Key</button>
          <button className="startbtn" onClick={startTour}>▶ Start Tour</button>
        </div>
      )}

      {screen==="main"&&(
        <>
          <div className="imgzone">
            {!imgOn&&<div className="imgsp">🌄</div>}
            {imgUrl&&<img className={`locimg${imgOn?" on":""}`} src={imgUrl} alt="" onLoad={()=>setImgOn(true)} onError={()=>setImgOn(true)}/>}
            <div className="imgover"/>
            <div className="imgbot">
              <div className="locname">{locName||"Loading..."}</div>
              {coords&&<div className="loccrd">{coords.lat.toFixed(4)}°N / {Math.abs(coords.lng).toFixed(4)}°W</div>}
            </div>
          </div>
          <div className="dash">
            <div className="gauge"><div className="gv">{toMph(coords?.speed)||parseInt(speedVal)||"—"}</div><div className="gl">MPH</div></div>
            <div className="gauge"><div className="gv d">{toDir(coords?.heading)}</div><div className="gl">DIR</div></div>
            <div className="gauge"><div className="gv c">{count}</div><div className="gl">STORIES</div></div>
            <div className="gauge"><div className="gv w">{coords?`${coords.lat.toFixed(1)}°`:"—"}</div><div className="gl">LAT</div></div>
          </div>
          <div className="sa">
            <div className="airbar">
              <div className="airlbl">{status==="ready"&&<div className="airdot"/>}{status==="loading"?"GENERATING...":"ON AIR"}</div>
              <div className="snum">#{count}</div>
            </div>
            {status==="loading"&&<div className="ldtxt"><span className="sp">◌</span>&nbsp;Preparing story...</div>}
            {showTxt&&story&&status!=="loading"&&<div className="stxt">{story}</div>}
            {!showTxt&&story&&status!=="loading"&&<div className="ldtxt" style={{color:"#1a2a40"}}>🔊 Audio only mode</div>}
            {story&&status==="ready"&&(
              <div className="pgrow">
                <span className="pglbl">⟳ next</span>
                <div className="pgbar"><div className="pgfill" style={{width:`${Math.max(0,(1-cd/35)*100)}%`}}/></div>
                <span className="pglbl">{cd}s</span>
              </div>
            )}
          </div>
          <div className="wakeinfo">{wakeLock?"🔆 Screen kept on":"⚠ Screen may turn off"}</div>
          <div className="togrow">
            <div className={`tog${showTxt?" act":""}`} onClick={()=>setShowTxt(t=>!t)}>{showTxt?"📄 TEXT ON":"📄 TEXT OFF"}</div>
            <div className={`tog spk${speaking?" going":""}`} onClick={()=>story&&speak(story)}>{speaking?"🔊 SPEAKING":"🔊 REPLAY"}</div>
            <div className={`tog wake${wakeLock?" act":""}`} onClick={()=>wakeLock?wlRef.current?.release():requestWake()}>{wakeLock?"🔆 AWAKE":"🔆 WAKE"}</div>
          </div>
          {err&&<div className="errbox" style={{margin:"0 14px 8px"}}>⚠ {err}</div>}
          {qMode&&(
            <div className="qa">
              <input className="qi" value={qText} onChange={e=>setQText(e.target.value)} placeholder="Ask about this area..." onKeyDown={e=>e.key==="Enter"&&sendQ()} autoFocus/>
              <div className="qbs">
                <button className="btn bsend" style={{flex:1,padding:"12px"}} onClick={sendQ}>Ask</button>
                <button className="btn bcancel" style={{padding:"12px"}} onClick={()=>{setQMode(false);setQText("");}}>Cancel</button>
              </div>
            </div>
          )}
          <div className="ctrl">
            <button className="btn bstop" onClick={stop}>■ STOP</button>
            {!qMode&&<button className="btn bq" onClick={()=>setQMode(true)}>? ASK</button>}
          </div>
        </>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
