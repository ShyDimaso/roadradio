<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Road Radio</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#05070f;height:100%;overscroll-behavior:none;}
body{font-family:'Inter',sans-serif;color:#fff;}
.app{min-height:100vh;background:#05070f;display:flex;flex-direction:column;max-width:500px;margin:0 auto;}

/* HEADER */
.hdr{padding:12px 16px;border-bottom:2px solid #1e2d45;display:flex;align-items:center;justify-content:space-between;background:#060912;position:sticky;top:0;z-index:99;}
.logo-wrap{display:flex;flex-direction:column;}
.logo{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;letter-spacing:2px;color:#ff6b35;}
.logo em{color:#4a9eff;font-style:normal;}
.logo-ver{font-family:'Orbitron',monospace;font-size:9px;color:#334455;letter-spacing:2px;margin-top:1px;}
.hdr-r{display:flex;align-items:center;gap:8px;}
.langsel{background:#0d1525;border:2px solid #4a9eff;border-radius:8px;padding:5px 8px;color:#4a9eff;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;cursor:pointer;outline:none;}
.setbtn{background:#0d1525;border:2px solid #1e2d45;border-radius:8px;padding:5px 10px;color:#aabbcc;font-size:16px;cursor:pointer;outline:none;}
.pill{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;border:2px solid #1e2d45;background:#0d1525;}
.dot{width:9px;height:9px;border-radius:50%;}
.dot.on{background:#00e87a;box-shadow:0 0 8px #00e87a;animation:pulse 1.5s infinite;}
.dot.ld{background:#f5c842;box-shadow:0 0 8px #f5c842;animation:pulse .8s infinite;}
.dot.off{background:#334466;}
.ptxt{font-family:'Orbitron',monospace;font-size:9px;font-weight:700;letter-spacing:2px;color:#aabbcc;text-transform:uppercase;}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes roadMove{from{background-position:0 0}to{background-position:0 200px}}
@keyframes starTwinkle{0%,100%{opacity:.4}50%{opacity:1}}

/* OVERLAY / SETTINGS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:flex;align-items:flex-end;}
.sheet{background:#060912;border-top:2px solid #1e2d45;border-radius:20px 20px 0 0;padding:24px 18px 32px;width:100%;max-width:500px;margin:0 auto;max-height:88vh;overflow-y:auto;}
.sheet-title{font-family:'Orbitron',monospace;font-size:15px;font-weight:900;color:#ff6b35;margin-bottom:18px;letter-spacing:2px;}
.set-sect{font-family:'Orbitron',monospace;font-size:10px;color:#445566;letter-spacing:2px;text-transform:uppercase;margin:16px 0 10px;}

/* MODE GRID */
.mode-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px;}
.mode-btn{padding:12px 4px;background:#0d1525;border:2px solid #1e2d45;border-radius:10px;text-align:center;cursor:pointer;transition:all .15s;}
.mode-btn.sel{border-color:#ff6b35;background:#1a0c05;}
.mode-icon{font-size:22px;display:block;margin-bottom:4px;}
.mode-lbl{font-family:'Orbitron',monospace;font-size:7px;color:#778899;letter-spacing:1px;text-transform:uppercase;}
.mode-btn.sel .mode-lbl{color:#ff6b35;}

/* BROADCAST MODE */
.bcast-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.bcast-btn{padding:12px;background:#0d1525;border:2px solid #1e2d45;border-radius:10px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px;}
.bcast-btn.sel{border-color:#aa66ff;background:#0d0a1a;}
.bcast-icon{font-size:20px;flex-shrink:0;}
.bcast-info{text-align:left;}
.bcast-name{font-size:13px;font-weight:700;color:#aabbcc;}
.bcast-desc{font-size:11px;color:#445566;margin-top:2px;}
.bcast-btn.sel .bcast-name{color:#cc88ff;}

/* TOPICS */
.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.topic-item{display:flex;align-items:center;gap:9px;padding:11px 12px;background:#0d1525;border:2px solid #1e2d45;border-radius:10px;cursor:pointer;}
.topic-item.on{border-color:#cc3333;background:#1a0808;}
.topic-check{width:22px;height:22px;border-radius:5px;background:#1a2535;border:2px solid #334455;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;color:#fff;}
.topic-item.on .topic-check{background:#cc3333;border-color:#cc3333;}
.topic-lbl{font-size:13px;color:#aabbcc;font-weight:600;}
.topic-item.on .topic-lbl{color:#ff9090;}

/* INPUTS */
.flabel{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:2px;color:#4a9eff;text-transform:uppercase;margin-bottom:9px;display:block;}
.finput{background:#0d1525;border:2px solid #ffffff;border-radius:12px;padding:16px 18px;color:#ffffff;font-size:18px;outline:none;width:100%;}
.finput::placeholder{color:#445566;font-size:15px;}
.finput:focus{border-color:#4a9eff;background:#0a1020;}
.kinput{background:#0d1525;border:2px solid #ffffff;border-radius:12px;padding:15px 18px;color:#ffffff;font-size:14px;font-family:monospace;outline:none;width:100%;letter-spacing:1px;}
.kinput::placeholder{color:#445566;}
.kinput:focus{border-color:#4a9eff;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.dirhint{font-size:13px;color:#667788;margin-top:6px;}
.errbox{padding:14px 16px;background:#1a0606;border:2px solid #aa2020;border-radius:10px;color:#ff9090;font-size:15px;font-weight:600;}
.bigbtn{border-radius:14px;padding:18px;font-size:16px;font-weight:700;cursor:pointer;width:100%;letter-spacing:1px;border:2px solid transparent;}
.bigbtn.green{background:linear-gradient(135deg,#0d3a0d,#1a6a1a);color:#00e87a;border-color:#2a6a2a;}
.bigbtn.blue{background:#0d1828;color:#4a9eff;border-color:#2a4a80;}
.sep{display:flex;align-items:center;gap:12px;color:#556677;font-size:14px;}
.sep:before,.sep:after{content:'';flex:1;height:1px;background:#1e2d45;}

/* KEY SCREEN */
.keyscreen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:22px;text-align:center;}
.key-icon{font-size:58px;}
.key-title{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:#ff6b35;letter-spacing:2px;}
.key-sub{font-size:16px;color:#aabbcc;line-height:1.7;}
.key-sub a{color:#4a9eff;text-decoration:none;}

/* SETUP */
.setup{flex:1;padding:22px 18px;display:flex;flex-direction:column;gap:16px;}
.s-hero{text-align:center;}
.s-icon{font-size:52px;margin-bottom:8px;}
.s-title{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:#ff6b35;letter-spacing:2px;margin-bottom:5px;}
.s-sub{font-size:16px;color:#aabbcc;line-height:1.5;}
.geobtn{background:#0d1828;border:2px solid #4a9eff;border-radius:12px;padding:16px;color:#4a9eff;font-size:15px;font-weight:700;cursor:pointer;width:100%;}
.geobtn.ok{border-color:#00e87a;color:#00e87a;background:#071410;}

/* ROAD BACKGROUND */
.road-bg{position:relative;height:190px;overflow:hidden;flex-shrink:0;}
.road-canvas{position:absolute;inset:0;width:100%;height:100%;}
.road-over{position:absolute;inset:0;background:linear-gradient(to top,rgba(5,7,15,1) 0%,rgba(5,7,15,.2) 65%,transparent 100%);}
.road-top{position:absolute;top:0;left:0;right:0;padding:10px 14px;display:flex;justify-content:space-between;align-items:flex-start;}
.weather-badge{background:rgba(6,9,18,.85);border:1px solid #1e2d45;border-radius:16px;padding:5px 12px;font-family:'Orbitron',monospace;font-size:11px;color:#f5c842;letter-spacing:1px;}
.mode-badge{background:rgba(6,9,18,.85);border:1px solid #1e2d45;border-radius:16px;padding:5px 12px;font-size:16px;}
.road-bot{position:absolute;bottom:0;left:0;right:0;padding:12px 18px;}
.locname{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:2px;color:#ff6b35;text-transform:uppercase;margin-bottom:3px;}
.loccrd{font-family:'Orbitron',monospace;font-size:10px;color:#aabbcc;letter-spacing:1px;}
.poi-strip{font-family:'Orbitron',monospace;font-size:9px;color:#2a5a8a;letter-spacing:1px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* DASH */
.dash{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px 14px;border-bottom:2px solid #1e2d45;}
.gauge{text-align:center;padding:12px 6px;background:#0d1525;border:2px solid #1e2d45;border-radius:12px;}
.gv{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;color:#00e87a;line-height:1;}
.gv.d{font-size:24px;color:#4a9eff;}
.gv.t{font-size:22px;color:#f5c842;}
.gl{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;color:#667788;text-transform:uppercase;margin-top:5px;}

/* STORY */
.sa{flex:1;padding:16px 18px 10px;overflow-y:auto;}
.airbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.airlbl{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:3px;color:#667788;text-transform:uppercase;display:flex;align-items:center;gap:6px;}
.airdot{width:7px;height:7px;border-radius:50%;background:#ff6b35;animation:pulse 1.4s infinite;}
.timeinfo{font-family:'Orbitron',monospace;font-size:9px;color:#334455;letter-spacing:1px;}
.stxt{font-size:22px;line-height:1.85;color:#ffffff;font-style:italic;animation:fadeUp .5s ease;font-weight:400;}
.ldtxt{color:#667788;font-family:'Orbitron',monospace;font-size:12px;display:flex;align-items:center;gap:10px;letter-spacing:1px;}
.spinico{display:inline-block;animation:spin 1s linear infinite;}
.pgrow{display:flex;align-items:center;gap:10px;margin-top:12px;}
.pglbl{font-family:'Orbitron',monospace;font-size:9px;color:#889aaa;white-space:nowrap;}
.pgbar{flex:1;height:3px;background:#1a2535;border-radius:2px;overflow:hidden;}
.pgfill{height:100%;background:linear-gradient(to right,#ff6b35,#f5c842);border-radius:2px;transition:width 1s linear;}

/* CONTROLS */
.wakeinfo{font-size:11px;color:#445566;text-align:center;padding:4px 0;}
.togrow{padding:8px 14px;display:flex;gap:8px;border-top:2px solid #1e2d45;}
.tog{flex:1;padding:11px 4px;background:#0d1525;border:2px solid #1e2d45;border-radius:10px;font-size:12px;color:#aabbcc;cursor:pointer;text-align:center;font-weight:600;}
.tog.act{background:#0a1a30;border-color:#4a9eff;color:#4a9eff;}
.tog.spk.going{border-color:#00e87a;color:#00e87a;background:#071410;}
.tog.wake.act{border-color:#f5c842;color:#f5c842;background:#120f04;}

.voice-area{padding:8px 14px;border-top:2px solid #1e2d45;}
.mic-btn{width:100%;padding:16px;background:#0d1828;border:2px solid #4a9eff;border-radius:12px;color:#4a9eff;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:10px;}
.mic-btn.listening{background:#1a0808;border-color:#ff4444;color:#ff4444;animation:pulse .8s infinite;}
.mic-btn.processing{background:#080e1a;border-color:#f5c842;color:#f5c842;}

.qa{padding:8px 14px;border-top:2px solid #1e2d45;}
.qi{width:100%;background:#0d1525;border:2px solid #ffffff;border-radius:10px;padding:13px 15px;color:#ffffff;font-size:17px;outline:none;margin-bottom:8px;}
.qi::placeholder{color:#445566;}
.qi:focus{border-color:#4a9eff;}
.qbs{display:flex;gap:8px;}
.ctrl{padding:12px 14px 24px;display:flex;gap:10px;border-top:2px solid #1e2d45;}
.btn{flex:1;padding:17px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:1px;}
.btn:active{transform:scale(.96);}
.bstop{background:linear-gradient(135deg,#2e0d0d,#5a1a1a);color:#ff9090;border:2px solid #5a2020;}
.bq{flex:.55;background:#0d1525;color:#4a9eff;border:2px solid #1e3a60;font-size:11px;}
.bsend{background:#0d1e3a;color:#88bbff;border:2px solid #1e3a70;}
.bcancel{background:#0d1020;color:#889aaa;border:2px solid #1e2d45;flex:.5;}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useRef,useEffect}=React;
const PROXY="https://corsproxy.io/?https://api.anthropic.com/v1/messages";
const KEY_STORE="rr_key_v3";
const EX_STORE="rr_excl_v2";
const MODE_STORE="rr_mode_v1";
const BCAST_STORE="rr_bcast_v1";
const VER="v12";

const TRAVEL_MODES=[
  {id:"car",icon:"🚗",en:"Car",ru:"Машина"},
  {id:"bus",icon:"🚌",en:"Bus/Train",ru:"Автобус"},
  {id:"bike",icon:"🚲",en:"Bike",ru:"Велосипед"},
  {id:"walk",icon:"🚶",en:"Walk",ru:"Пешком"},
];

const BCAST_MODES=[
  {id:"normal",icon:"📻",en:"Road Radio",ru:"Обычный",desc:"Classic narration",descRu:"Классика",style:"Warm, knowledgeable radio host. Balanced mix of all topics."},
  {id:"night",icon:"🌌",en:"Night Drive",ru:"Ночная езда",desc:"Poetic & atmospheric",descRu:"Поэтично",style:"Poetic, intimate, atmospheric. Night sky, stars, nocturnal creatures, headlight silhouettes, quiet beauty of darkness. Slow and dreamy."},
  {id:"trucker",icon:"🚛",en:"Trucker Mode",ru:"Дальнобойщик",desc:"Practical & straight",descRu:"По-дальнобойщицки",style:"Like a veteran trucker on CB radio. Direct, practical, no fluff. Mention truck stops, weigh stations, grade changes, rest areas. Respect for the road."},
  {id:"discovery",icon:"🔍",en:"Discovery",ru:"Открытия",desc:"Facts & science",descRu:"Факты и наука",style:"Like a National Geographic documentary. Rich facts about geology, ecology, wildlife, geography. Educational but captivating."},
  {id:"americana",icon:"🇺🇸",en:"Americana",ru:"Американа",desc:"History & culture",descRu:"История США",style:"Deep American history, Route 66 spirit, Native American heritage, frontier stories, small town America, country music connections. Nostalgic and proud."},
  {id:"zen",icon:"🌲",en:"Nature Zen",ru:"Природа",desc:"Calm & peaceful",descRu:"Спокойно",style:"Calm, meditative, nature-focused. Trees, rivers, wildlife, seasons, quiet landscapes. Peaceful and restorative."},
  {id:"mystery",icon:"👻",en:"Mysteries",ru:"Тайны",desc:"Legends & stories",descRu:"Легенды",style:"Local legends, ghost towns, mysterious disappearances, Native American legends, UFO sightings, strange history. Intriguing and slightly eerie."},
  {id:"funny",icon:"😄",en:"Road DJ",ru:"Весёлый DJ",desc:"Fun & humorous",descRu:"С юмором",style:"Funny road DJ. Light humor, amusing local facts, puns, pop culture references. Entertaining without being silly."},
];

const TOPICS=[
  {id:"geology",en:"Geology",ru:"Геология"},
  {id:"weather",en:"Weather",ru:"Погода"},
  {id:"wildlife",en:"Wildlife",ru:"Животные"},
  {id:"plants",en:"Plants",ru:"Растения"},
  {id:"history",en:"History",ru:"История"},
  {id:"towns",en:"Towns",ru:"Города"},
  {id:"road",en:"Roads",ru:"Дороги"},
  {id:"humor",en:"Humor",ru:"Юмор"},
];

const toDir=h=>{if(h==null||isNaN(h))return"—";const d=["N","NE","E","SE","S","SW","W","NW"];return d[Math.round(((h%360)+360)%360/45)%8];};
const toLeft=h=>h==null?"?":toDir((h+90)%360);
const toRight=h=>h==null?"?":toDir((h-90+360)%360);
const toMph=ms=>ms&&ms>0?Math.round(ms*2.237):0;

const L={
  en:{lb:"EN",tts:"en-US",ai:"English"},ru:{lb:"RU",tts:"ru-RU",ai:"Russian"},
  uk:{lb:"UA",tts:"uk-UA",ai:"Ukrainian"},es:{lb:"ES",tts:"es-ES",ai:"Spanish"},
  pt:{lb:"PT",tts:"pt-BR",ai:"Portuguese"},de:{lb:"DE",tts:"de-DE",ai:"German"},
  fr:{lb:"FR",tts:"fr-FR",ai:"French"},ja:{lb:"JA",tts:"ja-JP",ai:"Japanese"},
  zh:{lb:"ZH",tts:"zh-CN",ai:"Chinese"},ko:{lb:"KO",tts:"ko-KR",ai:"Korean"},
  ar:{lb:"AR",tts:"ar-SA",ai:"Arabic"},hi:{lb:"HI",tts:"hi-IN",ai:"Hindi"},
  it:{lb:"IT",tts:"it-IT",ai:"Italian"},tr:{lb:"TR",tts:"tr-TR",ai:"Turkish"},
};
const LK=["en","ru","uk","es","pt","de","fr","ja","zh","ko","ar","hi","it","tr"];

function App(){
  const saved=localStorage.getItem(KEY_STORE)||"";
  const autoL=(navigator.language||"en").split("-")[0].toLowerCase();
  const [screen,setScreen]=useState(saved?"setup":"apikey");
  const [apiInput,setApiInput]=useState("");
  const [lang,setLang]=useState(L[autoL]?autoL:"en");
  const [coordInput,setCoordInput]=useState("");
  const [speedVal,setSpeedVal]=useState("65");
  const [headVal,setHeadVal]=useState("90");
  const [destination,setDestination]=useState("");
  const [geoOk,setGeoOk]=useState(false);
  const [coords,setCoords]=useState(null);
  const [status,setStatus]=useState("idle");
  const [story,setStory]=useState("");
  const [locName,setLocName]=useState("");
  const [nearbyPOI,setNearbyPOI]=useState([]);
  const [err,setErr]=useState("");
  const [qMode,setQMode]=useState(false);
  const [qText,setQText]=useState("");
  const [showTxt,setShowTxt]=useState(true);
  const [cd,setCd]=useState(0);
  const [speaking,setSpeaking]=useState(false);
  const [wakeLock,setWakeLock]=useState(false);
  const [weather,setWeather]=useState(null);
  const [micState,setMicState]=useState("idle");
  const [settingsOpen,setSettingsOpen]=useState(false);
  const [excluded,setExcluded]=useState(JSON.parse(localStorage.getItem(EX_STORE)||"[]"));
  const [travelMode,setTravelMode]=useState(localStorage.getItem(MODE_STORE)||"car");
  const [bcastMode,setBcastMode]=useState(localStorage.getItem(BCAST_STORE)||"normal");
  const [timeStr,setTimeStr]=useState("");
  const canvasRef=useRef(null);

  const runRef=useRef(false);
  const histRef=useRef([]);
  const loopRef=useRef(null);
  const coordsRef=useRef(null);
  const cdRef=useRef(null);
  const wlRef=useRef(null);
  const langRef=useRef(lang);
  const excludedRef=useRef(excluded);
  const travelModeRef=useRef(travelMode);
  const bcastModeRef=useRef(bcastMode);
  const destRef=useRef(destination);
  const nextStoryRef=useRef(null);
  const fetchingNext=useRef(false);

  useEffect(()=>{langRef.current=lang;},[lang]);
  useEffect(()=>{excludedRef.current=excluded;localStorage.setItem(EX_STORE,JSON.stringify(excluded));},[excluded]);
  useEffect(()=>{travelModeRef.current=travelMode;localStorage.setItem(MODE_STORE,travelMode);},[travelMode]);
  useEffect(()=>{bcastModeRef.current=bcastMode;localStorage.setItem(BCAST_STORE,bcastMode);},[bcastMode]);
  useEffect(()=>{destRef.current=destination;},[destination]);
  useEffect(()=>{if(coords)coordsRef.current=coords;},[coords]);

  useEffect(()=>{
    const u=()=>{const n=new Date();setTimeStr(`${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}`);};
    u();const t=setInterval(u,30000);return()=>clearInterval(t);
  },[]);

  // Animated road canvas
  useEffect(()=>{
    if(!canvasRef.current)return;
    const canvas=canvasRef.current;
    const ctx=canvas.getContext('2d');
    canvas.width=500;canvas.height=190;
    let frame=0;
    let raf;
    const draw=()=>{
      frame++;
      const bm=bcastModeRef.current;
      const hr=new Date().getHours();
      const isNight=hr>=21||hr<6;
      // Background gradient based on mode
      let bg1,bg2;
      if(bm==="night"||isNight){bg1="#020408";bg2="#0a0d18";}
      else if(bm==="zen"){bg1="#061008";bg2="#0a1a0c";}
      else if(bm==="mystery"){bg1="#080410";bg2="#100818";}
      else{bg1="#04060f";bg2="#080c1a";}
      const grad=ctx.createLinearGradient(0,0,0,190);
      grad.addColorStop(0,bg1);grad.addColorStop(1,bg2);
      ctx.fillStyle=grad;ctx.fillRect(0,0,500,190);
      // Stars for night/mystery
      if(bm==="night"||bm==="mystery"||isNight){
        for(let i=0;i<60;i++){
          const x=(i*73+frame*0.1)%500;
          const y=(i*37)%120;
          const opacity=0.3+0.4*Math.sin(frame*0.03+i);
          ctx.fillStyle=`rgba(255,255,255,${opacity})`;
          ctx.beginPath();ctx.arc(x,y,i%3===0?1.2:0.7,0,Math.PI*2);ctx.fill();
        }
      }
      // Horizon glow
      let glowColor;
      if(bm==="trucker"){glowColor="rgba(255,107,53,0.15)";}
      else if(bm==="americana"){glowColor="rgba(74,158,255,0.12)";}
      else if(bm==="zen"){glowColor="rgba(0,232,122,0.1)";}
      else{glowColor="rgba(255,107,53,0.1)";}
      const hg=ctx.createRadialGradient(250,140,10,250,140,200);
      hg.addColorStop(0,glowColor);hg.addColorStop(1,"transparent");
      ctx.fillStyle=hg;ctx.fillRect(0,0,500,190);
      // Road lines
      ctx.strokeStyle="rgba(255,107,53,0.15)";ctx.lineWidth=1;
      const offset=(frame*2)%40;
      for(let y=100+offset;y<200;y+=40){
        const prog=(y-100)/100;
        const w=10+prog*80;
        ctx.beginPath();ctx.moveTo(250-w/2,y);ctx.lineTo(250+w/2,y);ctx.stroke();
      }
      raf=requestAnimationFrame(draw);
    };
    draw();
    return()=>cancelAnimationFrame(raf);
  },[]);

  const fetchWeather=async(lat,lng)=>{
    try{
      const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(4)}&longitude=${lng.toFixed(4)}&current_weather=true&temperature_unit=fahrenheit&windspeed_unit=mph&timezone=auto`);
      const d=await r.json();
      const cw=d.current_weather;
      if(cw)setWeather({temp:Math.round(cw.temperature),wind:Math.round(cw.windspeed),code:cw.weathercode,is_day:cw.is_day??1});
    }catch{}
  };

  const fetchPOI=async(lat,lng)=>{
    try{
      const q=`[out:json][timeout:12];(node["place"~"city|town|village|hamlet"](around:15000,${lat},${lng});way["waterway"~"river|stream"]["name"](around:8000,${lat},${lng});node["natural"~"peak|lake"](around:10000,${lat},${lng});way["bridge"="yes"]["name"](around:5000,${lat},${lng});node["historic"](around:8000,${lat},${lng}););out body qt 20;`;
      const r=await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(q)}`);
      const d=await r.json();
      const names=[...new Set(d.elements?.map(e=>e.tags?.name).filter(Boolean))].slice(0,8);
      setNearbyPOI(names);
      return names;
    }catch{return[];}
  };

  const requestWake=async()=>{try{if("wakeLock" in navigator){wlRef.current=await navigator.wakeLock.request("screen");setWakeLock(true);wlRef.current.addEventListener("release",()=>setWakeLock(false));}}catch{}};
  useEffect(()=>{const h=()=>{if(document.visibilityState==="visible"&&runRef.current)requestWake();};document.addEventListener("visibilitychange",h);return()=>document.removeEventListener("visibilitychange",h);},[]);

  const startCd=s=>{setCd(s);if(cdRef.current)clearInterval(cdRef.current);cdRef.current=setInterval(()=>setCd(p=>{if(p<=1){clearInterval(cdRef.current);return 0;}return p-1;}),1000);};

  const speak=text=>new Promise(res=>{
    try{
      const s=window.speechSynthesis;if(!s){res();return;}s.cancel();
      const tl=L[langRef.current]?.tts||"en-US";
      const u=new SpeechSynthesisUtterance(text);
      u.lang=tl;u.rate=0.84;u.pitch=1.0;
      try{const vs=s.getVoices();const v=vs.find(x=>x.lang===tl)||vs.find(x=>x.lang.startsWith(tl.split("-")[0]))||vs[0];if(v)u.voice=v;}catch{}
      setSpeaking(true);
      u.onend=u.onerror=()=>{setSpeaking(false);res();};
      s.speak(u);
    }catch{setSpeaking(false);res();}
  });

  const extractStory=txt=>{
    try{const p=JSON.parse(txt);return p;}catch{}
    const sm=txt.match(/"story"\s*:\s*"((?:[^"\\]|\\.)*)"/);
    const lm=txt.match(/"location"\s*:\s*"((?:[^"\\]|\\.)*)"/);
    const im=txt.match(/"image"\s*:\s*"((?:[^"\\]|\\.)*)"/);
    if(sm){return{story:sm[1].replace(/\\"/g,'"').replace(/\\n/g,' '),location:lm?lm[1]:"",image:im?im[1]:"highway"};}
    const clean=txt.replace(/\{[^}]*\}/gs,'').replace(/"[^"]*"\s*:\s*"[^"]*"/g,'').replace(/^\s*[,{}\s]+/,'').trim();
    return{story:clean||txt,location:"",image:"highway"};
  };

  const buildSystem=(isQ,question)=>{
    const al=L[langRef.current]?.ai||"English";
    const bm=BCAST_MODES.find(b=>b.id===bcastModeRef.current)||BCAST_MODES[0];
    const tm=travelModeRef.current;
    const exl=excludedRef.current;
    const dest=destRef.current;
    const c=coordsRef.current||{lat:0,lng:0,speed:0,heading:90};
    const spd=toMph(c.speed)||parseInt(speedVal)||65;
    const hr=new Date().getHours(),mn=new Date().getMinutes();
    const month=new Date().toLocaleString('en',{month:'long'});
    const isNight=hr>=22||hr<5;
    const isDusk=hr>=19&&hr<22;
    const isDawn=hr>=5&&hr<7;
    const timeDesc=isNight?`NIGHT (${hr}:${mn.toString().padStart(2,'0')}) — dark outside`:
      isDusk?`DUSK (${hr}:${mn.toString().padStart(2,'0')}) — sun setting, fading light`:
      isDawn?`DAWN (${hr}:${mn.toString().padStart(2,'0')}) — sun rising`:
      `DAYTIME (${hr}:${mn.toString().padStart(2,'0')}, ${month})`;
    const tmDesc=tm==="car"?`car at ${spd} mph`:tm==="bus"?`bus/train at ${spd} mph`:tm==="bike"?`bicycle at ${spd} mph`:`walking at ${spd} mph`;
    const hdg=c.heading||90;
    const destLine=dest?`\nTraveling toward: ${dest}. Use this to anticipate the route ahead.`:"";
    const exLine=exl.length>0?`\nNEVER mention these topics: ${exl.join(', ')}.`:"";
    const nightLine=isNight?`It is NIGHT. Do NOT say "you can see" or "look at the landscape". Say "in your headlights...", "against the night sky...", "if it were daylight...", or describe what's audible/imaginable.`
      :isDusk?`It is DUSK. Describe the fading light, silhouettes, golden hour colors still visible.`
      :`It is daytime. Describe what is visible through the windshield.`;

    if(isQ){
      return`You are Road Radio, a road companion. A traveler asked: "${question}"
Answer warmly in 2-3 sentences in ${al}, then say you're returning to the road.
Time: ${timeDesc}. Mode: ${bm.name}.
Reply ONLY valid JSON: {"story":"answer + brief return transition","location":"current place name in English","image":"2-3 english words"}`;
    }

    return`You are Road Radio — ${bm.style}

TIME: ${timeDesc}
TRAVELER: In a ${tmDesc}
HEADING: ${toDir(hdg)} (${Math.round(hdg)}°) — LEFT = ${toLeft(hdg)}, RIGHT = ${toRight(hdg)}
COORDINATES: ${c.lat.toFixed(5)}°N, ${c.lng.toFixed(5)}°W${destLine}${exLine}

${nightLine}

CRITICAL RULES — NO EXCEPTIONS:
1. NEVER use: "Вы мчитесь", "Вы несётесь", "Вы едете", "You're racing", "You're driving", "As you drive", "As you travel". PERMANENTLY BANNED.
2. Start with the PLACE or SCENE — never with the traveler. Good openings: "Just ahead...", "The hills here...", "Cherokee, Oklahoma...", "This stretch of highway...", "Rolling farmland gives way to...", "A story about this land..."
3. Use left/right directions based on heading above — be precise
4. NEVER invent specific objects (rivers, bridges, towns) that might not exist nearby. If unsure, use "somewhere in this region..." or "these hills typically..."
5. If nearby POI data is provided — use it as FACTS. Only mention objects that are in the list.
6. 5 sentences. Use "..." for natural pauses. Vary sentence length.
7. End with a hook — something ahead, a mystery, a teaser
8. DO NOT address the traveler more than once per response
9. EVERY WORD must be in ${al}

Reply ONLY valid JSON no markdown: {"story":"5 sentences with ... pauses","location":"exact place name in English","image":"2-3 english words for photo"}`;
  };

  const callClaude=async(system,msg,forNext)=>{
    const key=localStorage.getItem(KEY_STORE);
    const msgs=forNext?[{role:"user",content:msg}]:[...histRef.current.slice(-4),{role:"user",content:msg}];
    const r=await fetch(PROXY,{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:500,system,messages:msgs})});
    if(!r.ok)throw new Error(await r.text());
    const data=await r.json();
    const txt=(data.content?.[0]?.text||"{}").replace(/```json|```/g,"").trim();
    const result=extractStory(txt);
    if(!forNext)histRef.current=[...msgs,{role:"assistant",content:txt}];
    return result;
  };

  const prefetchNext=async()=>{
    if(fetchingNext.current||nextStoryRef.current)return;
    fetchingNext.current=true;
    try{
      const system=buildSystem(false,null);
      const res=await callClaude(system,"What's coming up next on the road ahead?",true);
      nextStoryRef.current=res;
    }catch{}
    fetchingNext.current=false;
  };

  const loop=async(useNext)=>{
    if(!runRef.current)return;
    const c=coordsRef.current;if(!c)return;
    let res=null;
    if(useNext&&nextStoryRef.current){
      res=nextStoryRef.current;nextStoryRef.current=null;
      setStatus("ready");
    }else{
      setStatus("loading");
      // Fetch real POI data first
      const pois=await fetchPOI(c.lat,c.lng);
      const system=buildSystem(false,null);
      const poiLine=pois.length>0?`\nREAL NEARBY OBJECTS (use these — do not invent others): ${pois.join(", ")}`:"";
      try{
        res=await callClaude(system+poiLine,"Describe what's here right now and what's immediately ahead.",false);
      }catch(e){
        setErr((e.message||"Connection error").slice(0,100));
        runRef.current=false;setStatus("idle");return;
      }
    }
    if(!runRef.current)return;
    setStory(res.story||"");
    setLocName(res.location||"");
    setStatus("ready");startCd(55);
    prefetchNext();
    if(res.story)await speak(res.story);
    if(!runRef.current)return;
    await new Promise(r=>setTimeout(r,2000));
    if(runRef.current)loopRef.current?.(!!nextStoryRef.current);
  };
  loopRef.current=loop;

  const getGeo=()=>{
    if(!navigator.geolocation){setErr("Geolocation not supported");return;}
    setErr("");
    navigator.geolocation.getCurrentPosition(pos=>{
      const c={lat:pos.coords.latitude,lng:pos.coords.longitude,speed:pos.coords.speed||0,heading:pos.coords.heading};
      setCoordInput(`${c.lat.toFixed(6)}, ${c.lng.toFixed(6)}`);
      if(c.speed)setSpeedVal(String(toMph(c.speed)));
      if(c.heading)setHeadVal(String(Math.round(c.heading)));
      coordsRef.current=c;setGeoOk(true);
      fetchWeather(c.lat,c.lng);
    },()=>setErr("Location denied. Enter manually."),{enableHighAccuracy:true,timeout:12000});
  };

  const parseCoords=()=>{
    const m=coordInput.trim().match(/(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)/);
    if(!m)return null;
    return{lat:parseFloat(m[1]),lng:parseFloat(m[2]),speed:0,heading:parseFloat(headVal)||90};
  };

  const startGeoWatch=()=>{
    if(!navigator.geolocation)return;
    let wt=0;
    navigator.geolocation.watchPosition(pos=>{
      const c={lat:pos.coords.latitude,lng:pos.coords.longitude,speed:pos.coords.speed||0,heading:pos.coords.heading};
      coordsRef.current=c;setCoords(c);
      if(++wt%60===0)fetchWeather(c.lat,c.lng);
    },()=>{},{enableHighAccuracy:true,maximumAge:5000});
  };

  const startTour=async()=>{

        try{
          const res=await callClaude(system,q,false);
          setStory(res.story||res);setStatus("ready");startCd(55);
          setMicState("idle");nextStoryRef.current=null;
          if(res.story)await speak(res.story);
          await new Promise(r=>setTimeout(r,1500));
          if(runRef.current)loopRef.current?.(false);
        }catch{setMicState("idle");}
      };
      rec.onerror=()=>setMicState("idle");
      rec.onend=()=>setMicState(s=>s==="listening"?"idle":s);

  const sendQ=async()=>{

            <div className="gauge"><div className="gv d">{toDir(coords?.heading)}</div><div className="gl">DIR</div></div>

          </div>

          <div className="sa">
            <div className="airbar">
              <div className="airlbl">{status==="ready"&&<div className="airdot"/>}{status==="loading"?(lang==="ru"?"ГЕНЕРИРУЮ...":"GENERATING..."):(lang==="ru"?"В ЭФИРЕ":"ON AIR")}</div>
              <div className="timeinfo">{timeStr}</div>

                <span className="pglbl">{cd}s</span>
              </div>
            )}
          </div>

          <div className="wakeinfo">{wakeLock?(lang==="ru"?"🔆 Экран включён":"🔆 Screen kept on"):(lang==="ru"?"⚠ Экран может погаснуть":"⚠ Screen may turn off")}</div>

          <div className="togrow">
            <div className={`tog${showTxt?" act":""}`} onClick={()=>setShowTxt(t=>!t)}>{showTxt?"📄 ✓":"📄 ○"}</div>
            <div className={`tog spk${speaking?" going":""}`} onClick={()=>story&&speak(story)}>{speaking?"🔊 ●":"🔊"}</div>
            <div className={`tog wake${wakeLock?" act":""}`} onClick={()=>wakeLock?wlRef.current?.release():requestWake()}>{wakeLock?"🔆 ✓":"🔆"}</div>
          </div>

          <div className="voice-area">
            <button className={`mic-btn${micState==="listening"?" listening":micState==="processing"?" processing":""}`}
              onMouseDown={startVoice} onTouchStart={startVoice}
              onMouseUp={()=>{}} onTouchEnd={()=>{}}>
              {micState==="listening"?(lang==="ru"?"🔴 Слушаю...":"🔴 Listening..."):micState==="processing"?(lang==="ru"?"⏳ Обрабатываю...":"⏳ Processing..."):(lang==="ru"?"🎤 Держите для вопроса":"🎤 Hold to Speak")}
            </button>
          </div>

          {err&&<div className="errbox" style={{margin:"0 14px 6px"}}>⚠ {err}</div>}

          {qMode&&(
            <div className="qa">
              <input className="qi" value={qText} onChange={e=>setQText(e.target.value)} placeholder={lang==="ru"?"Введите вопрос...":"Type your question..."} onKeyDown={e=>e.key==="Enter"&&sendQ()} autoFocus/>
              <div className="qbs">
                <button className="btn bsend" style={{flex:1,padding:"12px"}} onClick={sendQ}>{lang==="ru"?"Спросить":"Ask"}</button>
                <button className="btn bcancel" style={{padding:"12px"}} onClick={()=>{setQMode(false);setQText("");}}>{lang==="ru"?"Отмена":"Cancel"}</button>
              </div>
            </div>
          )}

          <div className="ctrl">
            <button className="btn bstop" onClick={stop}>{lang==="ru"?"■ Стоп":"■ Stop"}</button>
            <button className="btn bq" onClick={()=>setQMode(t=>!t)}>{lang==="ru"?"? Текст":"? Type"}</button>
          </div>
        </>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
