<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Road Radio">
<link rel="manifest" href='data:application/manifest+json,{"name":"Road Radio","short_name":"Road Radio","start_url":".","scope":".","display":"standalone","orientation":"portrait","background_color":"%23100c1e","theme_color":"%23100c1e","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22512%22 height=%22512%22%3E%3Crect width=%22512%22 height=%22512%22 fill=%22%23100c1e%22/%3E%3Ctext x=%2250%25%22 y=%2258%25%22 font-size=%22300%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22%3E%F0%9F%93%BB%3C/text%3E%3C/svg%3E","sizes":"512x512","type":"image/svg+xml","purpose":"any maskable"}]}'>
<title>Road Radio v134</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#0a0a14;height:100%;overscroll-behavior:none;}
body{font-family:'Inter',sans-serif;color:#fff;}
.app{min-height:100vh;background:linear-gradient(165deg,#1e1838 0%,#16122a 45%,#100c1e 100%);display:flex;flex-direction:column;max-width:500px;margin:0 auto;}

/* SPLASH */
.splash{position:fixed;inset:0;background:#0a0a14;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;animation:splashOut 0.5s ease forwards 2.8s;}
@keyframes splashOut{to{opacity:0;pointer-events:none;}}
.sp-logo{font-family:'Orbitron',monospace;font-size:40px;font-weight:900;color:#ff6b35;letter-spacing:3px;}
.sp-logo em{color:#4a9eff;font-style:normal;}
.sp-ver{font-family:'Orbitron',monospace;font-size:14px;color:#7a8ba0;letter-spacing:4px;margin-top:-8px;}
.sp-line{width:0;height:2px;background:linear-gradient(to right,#ff6b35,#4a9eff);border-radius:2px;animation:lineG .9s ease .2s forwards;}
@keyframes lineG{to{width:140px}}
.sp-tag{font-size:18px;color:#aabbcc;letter-spacing:1px;text-align:center;opacity:0;animation:fadeI .6s ease .8s forwards;}
@keyframes fadeI{to{opacity:1}}
.sp-dots{display:flex;gap:8px;margin-top:6px;}
.sp-dot{width:9px;height:9px;border-radius:50%;animation:dotP 1.4s ease-in-out infinite;}
.sp-dot:nth-child(1){background:#ff6b35;}
.sp-dot:nth-child(2){background:#f5c842;animation-delay:.2s;}
.sp-dot:nth-child(3){background:#4a9eff;animation-delay:.4s;}
@keyframes dotP{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.6);opacity:1}}

/* INSTALL BANNER */
.install-banner{background:#0d1828;border-bottom:2px solid #4a9eff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.install-txt{font-size:14px;color:#aabbcc;flex:1;}
.install-txt b{color:#4a9eff;}
.install-btn{background:#4a9eff;color:#0a0a14;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
.install-x{background:none;border:none;color:#9aabbf;font-size:20px;cursor:pointer;padding:4px;}

/* HEADER */
.hdr{padding:12px 16px;border-bottom:2px solid #1e2d45;display:flex;align-items:center;justify-content:space-between;background:#060912;position:sticky;top:0;z-index:98;}
.logo-wrap{display:flex;flex-direction:column;}
.logo{font-family:'Orbitron',monospace;font-size:17px;font-weight:900;letter-spacing:2px;color:#ff6b35;}
.logo em{color:#4a9eff;font-style:normal;}
.logo-ver{font-family:'Orbitron',monospace;font-size:15px;color:#ffffff;letter-spacing:3px;margin-top:2px;opacity:1;font-weight:700;}
.hdr-r{display:flex;align-items:center;gap:8px;}
.langsel{background:#0d1525;border:2px solid #4a9eff;border-radius:8px;padding:6px 9px;color:#4a9eff;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;cursor:pointer;outline:none;}
.setbtn{background:#0d1525;border:2px solid #1e2d45;border-radius:8px;padding:6px 12px;color:#aabbcc;font-size:18px;cursor:pointer;outline:none;}
.pill{display:flex;align-items:center;gap:6px;padding:6px 13px;border-radius:20px;border:2px solid #1e2d45;background:#0d1525;}
.dot{width:10px;height:10px;border-radius:50%;}
.dot.on{background:#00e87a;box-shadow:0 0 10px #00e87a;animation:pulse 1.5s infinite;}
.dot.ld{background:#f5c842;box-shadow:0 0 8px #f5c842;animation:pulse .8s infinite;}
.dot.off{background:#334466;}
.ptxt{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:2px;color:#aabbcc;text-transform:uppercase;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ONBOARDING */
.onboard{flex:1;display:flex;flex-direction:column;padding:24px 20px;gap:0;}
.ob-progress{display:flex;gap:6px;margin-bottom:28px;}
.ob-step{flex:1;height:3px;border-radius:2px;background:#1e2d45;}
.ob-step.done{background:#ff6b35;}
.ob-step.active{background:#4a9eff;}
.ob-title{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:#ff6b35;letter-spacing:2px;margin-bottom:8px;}
.ob-sub{font-size:16px;color:#aabbcc;margin-bottom:24px;line-height:1.6;}
.ob-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:auto;}
.ob-item{padding:16px 12px;background:#0d1525;border:2px solid #1e2d45;border-radius:12px;cursor:pointer;text-align:center;transition:all .15s;}
.ob-item.sel{border-color:#ff6b35;background:#1a0c05;}
.ob-item-icon{font-size:28px;display:block;margin-bottom:6px;}
.ob-item-lbl{font-size:14px;font-weight:700;color:#aabbcc;}
.ob-item.sel .ob-item-lbl{color:#ff6b35;}
.ob-actions{display:flex;gap:10px;margin-top:24px;}
.ob-skip{flex:1;padding:16px;background:transparent;border:2px solid #1e2d45;border-radius:12px;color:#9aabbf;font-size:15px;cursor:pointer;}
.ob-next{flex:2;padding:16px;background:linear-gradient(135deg,#0d3a0d,#1a6a1a);border:2px solid #2a6a2a;border-radius:12px;color:#00e87a;font-size:16px;font-weight:700;cursor:pointer;}
.ob-install{background:#0d1828;border:2px solid #4a9eff;border-radius:14px;padding:20px;text-align:center;margin-bottom:20px;}
.ob-install-icon{font-size:48px;margin-bottom:12px;}
.ob-install-title{font-family:'Orbitron',monospace;font-size:16px;color:#4a9eff;margin-bottom:8px;letter-spacing:1px;}
.ob-install-text{font-size:14px;color:#778899;line-height:1.6;margin-bottom:16px;}
.ob-install-btn{width:100%;padding:16px;background:#4a9eff;border:none;border-radius:12px;color:#0a0a14;font-size:16px;font-weight:700;cursor:pointer;}

/* OVERLAY / SETTINGS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:flex;align-items:flex-end;}
.sheet{background:#060912;border-top:2px solid #1e2d45;border-radius:20px 20px 0 0;padding:24px 18px 34px;width:100%;max-width:500px;margin:0 auto;max-height:90vh;overflow-y:auto;}
.sheet-title{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;color:#ff6b35;margin-bottom:20px;letter-spacing:2px;}
.set-sect{font-family:'Orbitron',monospace;font-size:12px;color:#8a9bb0;letter-spacing:2px;text-transform:uppercase;margin:18px 0 10px;}
.bcast-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.bcast-btn{padding:13px 12px;background:#0d1525;border:2px solid #1e2d45;border-radius:12px;cursor:pointer;display:flex;align-items:center;gap:10px;}
.bcast-btn.sel{border-color:#aa66ff;background:#0d0a1a;}
.bcast-icon{font-size:22px;flex-shrink:0;}
.bcast-name{font-size:14px;font-weight:700;color:#aabbcc;}
.bcast-desc{font-size:12px;color:#8a9bb0;margin-top:2px;}
.bcast-btn.sel .bcast-name{color:#cc88ff;}
.mode-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.mode-btn{padding:14px 4px;background:#0d1525;border:2px solid #1e2d45;border-radius:10px;text-align:center;cursor:pointer;}
.mode-btn.sel{border-color:#ff6b35;background:#1a0c05;}
.mode-icon{font-size:24px;display:block;margin-bottom:5px;}
.mode-lbl{font-family:'Orbitron',monospace;font-size:8px;color:#778899;letter-spacing:1px;text-transform:uppercase;}
.mode-btn.sel .mode-lbl{color:#ff6b35;}
.voice-sel{width:100%;background:#0d1525;border:2px solid #4a9eff;border-radius:10px;padding:12px 14px;color:#4a9eff;font-size:14px;outline:none;margin-top:4px;}
.tts-btn{width:100%;padding:14px;background:#0d1828;border:2px solid #4a9eff;border-radius:10px;color:#4a9eff;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;}
.tts-btn.rec{border-color:#ff5a5a;color:#ff8a8a;background:#1c0d0d;}
.voice-list{display:flex;flex-direction:column;gap:6px;margin-bottom:6px;max-height:300px;overflow-y:auto;}
.voice-collapse{display:flex;justify-content:space-between;align-items:center;background:#0d1525;border:2px solid #2a4a80;border-radius:10px;padding:14px 14px;color:#cfe0f0;font-size:15px;cursor:pointer;margin-bottom:6px;}
.voice-row{display:flex;align-items:center;gap:8px;background:#0d1525;border:2px solid #1e2d45;border-radius:10px;padding:2px 4px 2px 0;}
.voice-row.sel{border-color:#3fb950;background:#0d1a0d;}
.voice-pick{flex:1;padding:13px 12px;color:#cfe0f0;font-size:15px;cursor:pointer;}
.voice-row.sel .voice-pick{color:#7af0a0;font-weight:700;}
.voice-play{width:48px;height:42px;flex-shrink:0;border:none;border-radius:8px;background:#13233f;color:#7ac0ff;font-size:16px;cursor:pointer;}
.voice-play:active{background:#1e3a60;}
.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.topic-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#0d1525;border:2px solid #1e2d45;border-radius:10px;cursor:pointer;}
.topic-item.on{border-color:#cc3333;background:#1a0808;}
.topic-check{width:22px;height:22px;border-radius:6px;background:#1a2535;border:2px solid #334455;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;color:#fff;}
.topic-item.on .topic-check{background:#cc3333;border-color:#cc3333;}
.topic-item.on2{border-color:#3fb950;background:#0d1a0d;}
.topic-item.on2 .topic-check.on{background:#3fb950;border-color:#3fb950;}
.topic-lbl{font-size:14px;color:#aabbcc;font-weight:600;}
.topic-item.on .topic-lbl{color:#ff9090;}

/* INPUTS */
.flabel{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:2px;color:#4a9eff;text-transform:uppercase;margin-bottom:10px;display:block;}
.finput{background:#0d1525;border:2px solid #fff;border-radius:12px;padding:17px 18px;color:#fff;font-size:19px;outline:none;width:100%;}
.finput::placeholder{color:#8a9bb0;font-size:16px;}
.finput:focus{border-color:#4a9eff;}
.kinput{background:#0d1525;border:2px solid #fff;border-radius:12px;padding:16px 18px;color:#fff;font-size:15px;font-family:monospace;outline:none;width:100%;letter-spacing:1px;}
.kinput::placeholder{color:#8a9bb0;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.dirhint{font-size:13px;color:#667788;margin-top:6px;}
.errbox{padding:14px;background:#1a0606;border:2px solid #aa2020;border-radius:10px;color:#ff9090;font-size:15px;font-weight:600;}
.bigbtn{border-radius:14px;padding:19px;font-size:17px;font-weight:700;cursor:pointer;width:100%;letter-spacing:1px;border:2px solid transparent;}
.bigbtn.green{background:linear-gradient(135deg,#0d3a0d,#1a6a1a);color:#00e87a;border-color:#2a6a2a;}
.bigbtn.blue{background:#0d1828;color:#4a9eff;border-color:#2a4a80;}
.sep{display:flex;align-items:center;gap:12px;color:#9aabbf;font-size:15px;}
.sep:before,.sep:after{content:'';flex:1;height:1px;background:#1e2d45;}

/* SETUP + KEY */
.keyscreen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:22px;text-align:center;}
.key-icon{font-size:60px;}
.key-title{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#ff6b35;letter-spacing:2px;}
.key-sub{font-size:17px;color:#aabbcc;line-height:1.7;}
.key-sub a{color:#4a9eff;text-decoration:none;}
.setup{flex:1;padding:22px 18px;display:flex;flex-direction:column;gap:17px;}
.s-hero{text-align:center;}
.s-icon{font-size:54px;margin-bottom:9px;}
.s-title{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#ff6b35;letter-spacing:2px;margin-bottom:6px;}
.s-sub{font-size:17px;color:#aabbcc;line-height:1.5;}
.geobtn{background:#0d1828;border:2px solid #4a9eff;border-radius:12px;padding:17px;color:#4a9eff;font-size:16px;font-weight:700;cursor:pointer;width:100%;}
.geobtn.ok{border-color:#00e87a;color:#00e87a;background:#071410;}

/* DJ AVATAR */
.dj-zone{position:relative;height:250px;overflow:hidden;flex-shrink:0;background:transparent;display:flex;align-items:center;justify-content:center;}
.dj-zone.focus{height:auto;flex:1;min-height:0;transition:none;align-items:flex-start;padding-top:6vh;}
.dj-canvas{position:absolute;left:0;top:0;width:100%;height:230px;}
.dj-zone.focus .dj-canvas{top:6vh;transform:none;}
.focus-col{position:absolute;left:0;right:0;top:8px;display:flex;flex-direction:row;justify-content:space-around;gap:8px;z-index:5;}
.fc-item{text-align:center;}
.fc-v{font-family:'Orbitron',monospace;font-size:30px;font-weight:900;color:#f3d27a;line-height:1;}
.fc-l{font-size:13px;color:#cdb87a;letter-spacing:2px;font-weight:700;}
.focus-hint{position:absolute;bottom:12px;left:0;right:0;text-align:center;font-size:13px;color:#8a7a5a;letter-spacing:1px;}
.focus-ctrl{padding:12px 14px;}
.dj-canvas{position:absolute;left:0;top:0;width:100%;height:230px;}
.dj-zone.focus .dj-canvas{top:50%;transform:translateY(-55%);}
.dj-over{display:none;}
.dj-info{position:absolute;bottom:0;left:0;right:0;padding:8px 18px;background:transparent;}
.dj-hw{font-family:'Orbitron',monospace;font-size:13px;font-weight:900;color:#00e87a;letter-spacing:2px;margin-bottom:3px;}
.dj-loc{font-family:'Orbitron',monospace;font-size:14px;color:#f0a850;text-transform:uppercase;letter-spacing:2px;margin-bottom:3px;font-weight:700;}
.dj-crd{font-family:'Orbitron',monospace;font-size:12px;color:#d8e2ee;letter-spacing:1px;}
.dj-poi{font-size:11px;color:#6aa0d8;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dj-top{position:absolute;top:0;left:0;right:0;padding:10px 14px;display:flex;justify-content:space-between;}
.weather-badge{background:rgba(6,9,18,.9);border:1px solid #1e2d45;border-radius:16px;padding:6px 14px;font-family:'Orbitron',monospace;font-size:12px;color:#f5c842;}
.bcast-badge{background:rgba(6,9,18,.9);border:1px solid #1e2d45;border-radius:16px;padding:6px 10px;font-size:18px;}

/* ROAD BG (text mode) */
.road-bg{position:relative;height:200px;overflow:hidden;flex-shrink:0;background:#04060e;}
.road-canvas{position:absolute;inset:0;width:100%;height:100%;}
.road-over{position:absolute;inset:0;background:linear-gradient(to top,rgba(5,7,15,1) 0%,rgba(5,7,15,.15) 65%,transparent 100%);}
.road-top{position:absolute;top:0;left:0;right:0;padding:10px 14px;display:flex;justify-content:space-between;}
.road-bot{position:absolute;bottom:0;left:0;right:0;padding:12px 18px;}
.road-hw{font-family:'Orbitron',monospace;font-size:13px;font-weight:900;color:#00e87a;letter-spacing:2px;margin-bottom:3px;}
.road-loc{font-family:'Orbitron',monospace;font-size:14px;color:#f0a850;text-transform:uppercase;letter-spacing:2px;margin-bottom:3px;font-weight:700;}
.road-crd{font-family:'Orbitron',monospace;font-size:12px;color:#d8e2ee;letter-spacing:1px;}
.road-poi{font-size:11px;color:#6aa0d8;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* DASH */
.dash{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:12px 14px;border-bottom:2px solid #1e2d45;}
.gauge{text-align:center;padding:14px 6px;background:#0d1525;border:2px solid #1e2d45;border-radius:12px;}
.gv{font-family:'Orbitron',monospace;font-size:30px;font-weight:900;color:#00e87a;line-height:1;}
.gv.d{font-size:26px;color:#4a9eff;}
.gv.t{font-size:24px;color:#f5c842;}
.gl{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;color:#667788;text-transform:uppercase;margin-top:6px;}

/* STORY */
.sa{flex:1;padding:16px 18px 10px;overflow-y:auto;}
.airbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.airlbl{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:3px;color:#667788;text-transform:uppercase;display:flex;align-items:center;gap:6px;}
.airdot{width:8px;height:8px;border-radius:50%;background:#ff6b35;animation:pulse 1.4s infinite;}
.timeinfo{font-family:'Orbitron',monospace;font-size:10px;color:#7a8ba0;letter-spacing:1px;}
.stxt{font-size:23px;line-height:1.85;color:#fff;font-style:italic;animation:fadeUp .5s ease;}
.ldtxt{color:#667788;font-family:'Orbitron',monospace;font-size:13px;display:flex;align-items:center;gap:10px;letter-spacing:1px;}
.spinico{display:inline-block;animation:spin 1s linear infinite;}
.pgrow{display:flex;align-items:center;gap:10px;margin-top:12px;}
.pglbl{font-family:'Orbitron',monospace;font-size:10px;color:#889aaa;white-space:nowrap;}
.pgbar{flex:1;height:3px;background:#1a2535;border-radius:2px;overflow:hidden;}
.pgfill{height:100%;background:linear-gradient(to right,#ff6b35,#f5c842);border-radius:2px;transition:width 1s linear;}
.eq{display:flex;align-items:flex-end;justify-content:center;gap:5px;height:70px;padding:14px 0 4px;}
.eq span{width:6px;height:10px;border-radius:3px;background:linear-gradient(to top,#ff6b35,#4a9eff);opacity:.45;}
.eq.live span{animation:eqp .7s ease-in-out infinite;opacity:1;}
@keyframes eqp{0%,100%{height:10px;}50%{height:54px;}}

/* MIC TRANSCRIPT */
.mic-transcript{background:#0d1828;border:1px solid #2a4a80;border-radius:10px;padding:12px 14px;margin:8px 14px;font-size:16px;color:#aabbcc;min-height:44px;max-height:120px;overflow-y:auto;font-style:italic;}

/* PARKED MODAL */
.parked-modal{position:fixed;bottom:0;left:0;right:0;max-width:500px;margin:0 auto;background:#080c18;border-top:2px solid #4a9eff;padding:22px 18px 30px;z-index:150;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.parked-title{font-family:'Orbitron',monospace;font-size:15px;color:#4a9eff;letter-spacing:2px;margin-bottom:8px;}
.parked-sub{font-size:15px;color:#aabbcc;margin-bottom:18px;}
.parked-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.parked-btn{padding:18px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:2px solid transparent;}
.parked-btn.go{background:#0d3a0d;color:#00e87a;border-color:#2a6a2a;}
.parked-btn.wait{background:#0d1828;color:#4a9eff;border-color:#2a4a80;}

/* BOTTOM CONTROLS */
.bottom-ctrl{padding:12px 14px 26px;border-top:2px solid #1e2d45;}
.main-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
.mbtn{padding:18px 8px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;text-align:center;border:2px solid transparent;}
.mbtn:active{transform:scale(.96);}
.mbtn.stop{background:linear-gradient(135deg,#2e0d0d,#5a1a1a);color:#ff9090;border-color:#5a2020;}
.mbtn.mic{background:#0d1828;color:#4a9eff;border-color:#2a4a80;font-size:16px;}
.mbtn.mic.listening{background:#1a0808;border-color:#ff4444;color:#ff4444;animation:pulse .8s infinite;}
.mbtn.mic.processing{background:#080e1a;border-color:#f5c842;color:#f5c842;}
.mbtn.djtog{background:#0d1525;color:#aa66ff;border-color:#3a2060;font-size:20px;}
.mbtn.djtog.on{border-color:#aa66ff;background:#0d0a1a;}
.sec-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

  const BANNED_OPENERS=/^(смена частоты|следующая метка|бер[её]м слой|слой|контраст|казалось бы|ну что ж|а если|раз уж|напоследок|завершая|стоит упомянуть|нельзя не|интересно, что|кстати говоря|если|едем|посмотрите|вдоль|теперь\s*[-—–]\s*(к|про|о)|дальше\s*[-—–]\s*(к|про|о)|а теперь\s*[-—–]?\s*(к|про|о)|от\s+[а-яё\s]{3,20}\s*[-—–]\s*к\s|перейд[её]м к|поговорим о|немного о|что до|раз карта подмигнула)/i;

  const applyRadioContinuity=(res)=>{
    if(!res||!res.story||res._src==="pause")return res;
    if(res._wiki){try{res.story=cleanRussianStory(cleanWikiText(res.story));}catch{} return res;}
    if(!["ru","uk"].includes(langRef.current))return res;
    const raw=cleanRussianStory(res.story||"");
    const count=(spokenLedgerRef.current||[]).length;
    const prev=(spokenLedgerRef.current||[]).slice(-1)[0]||{};
    const cur=res._dirTopic||res.topic_key||"";
    let bridge="";
    if(count>0){
      const resting=isOvernightRest();
      if(resting){
        if(count%3!==2)bridge=radioBridgeFor(prev.topic,cur,count); // more breathable than drive mode
      }else{
        if(count%4!==2)bridge=radioBridgeFor(prev.topic,cur,count);
      }
    }
    if(bridge){
      bridge=cleanRussianStory(bridge);
      res._rawStory=raw;
      res._radioBridge=bridge;
      res.story=cleanRussianStory(`${bridge} ${raw}`);
    }else res.story=raw;
    return res;
  };

  // Compact memory block for the prompt (never dump the whole session into the model).
  // v77: build a human-readable transcript of the whole session and download it as a .txt file.
  const downloadAirLog=()=>{
    const rows=airLogRef.current;
    if(!rows.length){alert(langRef.current==="ru"?"Лог пока пуст — запусти эфир.":"Log is empty — start the broadcast first.");return;}
    const lines=[];
    lines.push("ROAD RADIO — AIR LOG ("+VER+")");
    lines.push("Session start: "+(rows[0]?.t||"")+"   |   entries: "+rows.length);
    lines.push("Detector: AIRED = spoken on air; REJECTED-REPEAT / REJECTED-FICTION = caught before air.");
    lines.push("=".repeat(60));
    for(const r of rows){
      lines.push("");
      if(r.status==="AIRED"){
        lines.push(`[${r.t}]  AIRED`);
        lines.push(`  place: ${r.city||"?"}${r.state?", "+r.state:""}   coords: ${r.lat},${r.lng}`);
        lines.push(`  topic: ${r.topic||"?"} | lens: ${r.lens||"-"} | scope: ${r.scope||"-"} | source: ${r.src||"?"}`);
        lines.push(`  keys: ${(r.keys||[]).join(", ")||"—"}${r.entity?"  | entity: "+r.entity:""}${r.claimKey?" | claim:"+r.claimKey:""}${r.bridgeKey?" | bridge:"+r.bridgeKey:""}${(r.structure||[]).length?" | structure:"+(r.structure||[]).join(","):""}`);
        lines.push(`  stop-list so far: ${(r.stopList||[]).join(", ")||"—"}`);
        lines.push(`  TEXT: ${r.story||""}`);
      }else if(r.status==="REJECTED-REPEAT"){
        lines.push(`[${r.t}]  x REJECTED-REPEAT  topic:${r.topic} reason:${r.reason} keys:${(r.keys||[]).join(",")} score:${r.score??""} dupOf:${r.duplicateOf||""}`);
        lines.push(`  (not aired) TEXT: ${r.story||""}`);
      }else if(r.status==="REJECTED-FICTION"){
        lines.push(`[${r.t}]  x REJECTED-FICTION  topic:${r.topic}`);
        lines.push(`  (not aired) TEXT: ${r.story||""}`);
      }else if(r.status==="SLOT_PLAN"){
        lines.push(`[${r.t}]  📋 SLOT_PLAN  ${r.note||""}`);
      }else if(r.status==="REJECTED-QUEUE"){
        lines.push(`[${r.t}]  ⛔ REJECTED-QUEUE (не пущен в эфир)  причина:${r.reason}  topic:${r.topic||"?"}`);
        lines.push(`  (not aired) ${r.story||""}`);
      }else if(r.status==="BATCH_BG"){
        lines.push(`[${r.t}]  ⚡ BATCH_BG (фоновая догрузка во время речи)  ${r.note||""}`);
      }else if(r.status==="BATCH_BG_FAIL"){
        lines.push(`[${r.t}]  ✗ BATCH_BG_FAIL  ${r.note||""}`);
      }else if(r.status==="LOOP_ERROR"){
        lines.push(`[${r.t}]  ‼ LOOP_ERROR (цикл упал — ЭТО ПРИЧИНА ТИШИНЫ)`);
        lines.push(`  error: ${r.note||""}`);
        if(r.stack)lines.push(`  stack: ${r.stack}`);
      }else if(r.status==="GEMINI_RAW"){
        lines.push(`[${r.t}]  ⚙ GEMINI_RAW  model:${r.model} finish:${r.finishReason} cand:${r.candCount} promptTok:${r.promptTokens} КЭШ:${r.cachedTokens||0} outTok:${r.outputTokens} thoughtsTok:${r.thoughtsTokens} rawLen:${r.rawTextLen}`);
        if(r.promptFeedback&&r.promptFeedback!=="{}")lines.push(`  promptFeedback: ${r.promptFeedback}`);
        lines.push(`  RAW: ${r.rawTextPreview||""}`);
      }else if(r.status==="GEMINI_PARSED"){
        lines.push(`[${r.t}]  ⚙ GEMINI_PARSED  БЛОКОВ:${r.segCount!=null?r.segCount:"?"} storyLen:${r.storyLen} loc:${r.location||""}`);
        lines.push(`  STORY: ${r.storyPreview||""}`);
      }else if(r.status==="GEMINI_TIMEOUT"){
        lines.push(`[${r.t}]  ⏱ GEMINI_TIMEOUT  model:${r.model} ${r.note||""}`);
      }else if(r.status==="GEMINI_FAIL"){
        lines.push(`[${r.t}]  ✗ GEMINI_FAIL  model:${r.model} ${r.note||""}`);
      }else if(r.status==="GEMINI_HTTP_ERR"){
        lines.push(`[${r.t}]  ✗ GEMINI_HTTP_ERR  status:${r.httpStatus}`);
        lines.push(`  raw: ${r.raw||""}`);
      }else if(String(r.status||"").startsWith("LOCAL_AI")){
        lines.push(`[${r.t}]  🧠 ${r.status}  ${r.note||""}`);
        if(r.model)lines.push(`  model: ${r.model}`);
        if(r.progress!=null)lines.push(`  progress: ${r.progress}%`);
        if(r.basePreview)lines.push(`  BASE: ${r.basePreview}`);
        if(r.storyPreview)lines.push(`  STORY: ${r.storyPreview}`);
        if(r.rawTextPreview)lines.push(`  RAW: ${r.rawTextPreview}`);
      }else if(r.status==="TTS_START"){
        lines.push(`[${r.t}]  🔊 TTS_START  textLen:${r.textLen} chunks:${r.chunks} voice:${r.voice||"?"}`);
        lines.push(`  firstChunk: ${r.firstChunk||""}`);
      }
    }
    // v126 SUMMARY (по запросу GPT): сводка для быстрой проверки экономии.
    try{
      const gm=rows.filter(r=>r.status==="GEMINI_RAW");
      const aired=rows.filter(r=>r.status==="AIRED").length;
      const rej=rows.filter(r=>r.status&&r.status.indexOf("REJECTED")>=0).length;
      const tin=gm.reduce((s,r)=>s+(r.promptTokens||0),0);
      const tout=gm.reduce((s,r)=>s+(r.outputTokens||0),0);
      const tcache=gm.reduce((s,r)=>s+(r.cachedTokens||0),0);
      const prompts=gm.map(r=>r.promptTokens||0);
      const avgP=prompts.length?Math.round(prompts.reduce((a,b)=>a+b,0)/prompts.length):0;
      const maxP=prompts.length?Math.max(...prompts):0;
      const t0=rows[0]?._ms||0,t1=rows[rows.length-1]?._ms||0;
      const durMin=t0&&t1?((t1-t0)/60000):0;
      // 2.5/3.1-flash-lite: вход $0.25/M, кэш $0.025/M, выход $1.50/M
      const cost=(tin-tcache)/1e6*0.25+tcache/1e6*0.025+tout/1e6*1.50;
      const perHour=durMin>0?cost/durMin*60:0;
      lines.push("");lines.push("=".repeat(60));
      lines.push("SUMMARY (v134 Local AI Background Lab / WikiBrain)");
      lines.push(`  duration: ${durMin.toFixed(1)} min`);
      const lai=rows.filter(r=>String(r.status||"").startsWith("LOCAL_AI"));
      const rew=rows.filter(r=>r.status==="LOCAL_AI_REWRITE").length;
      const lrej=rows.filter(r=>r.status==="LOCAL_AI_REJECT"||r.status==="LOCAL_AI_FINAL_REJECT").length;
      lines.push(`  Gemini requests: ${gm.length}   aired: ${aired}   rejected: ${rej}`);
      lines.push(`  Local AI events: ${lai.length}   rewrites: ${rew}   local rejects: ${lrej}`);
      lines.push(`  input tokens: ${tin.toLocaleString()}   output: ${tout.toLocaleString()}   cached: ${tcache.toLocaleString()} (${tin?Math.round(tcache/tin*100):0}%)`);
      lines.push(`  avg promptTok: ${avgP}   max promptTok: ${maxP}  ${maxP>9000?"⚠ Wikipedia-раздув есть":"✓ раздува нет"}`);
      lines.push(`  estimated cost: $${cost.toFixed(3)}   →  ~$${perHour.toFixed(3)}/hour`);
    }catch(e){lines.push("SUMMARY error: "+e.message);}
    lines.push("");lines.push("=".repeat(60));lines.push("END OF LOG");
    const blob=new Blob([lines.join("\n")],{type:"text/plain;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    const stamp=new Date().toISOString().replace(/[:.]/g,"-").slice(0,19);
    a.href=url;a.download=`roadradio_airlog_${stamp}.txt`;
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
  };

  const WIKIBRAIN_CAPSULES=[{"k":"land","t":"Как устроена местность. В {REGION} земля читается через {LAND}. Именно это решает, где задерживается вода, где строят дороги и почему одни участки растут быстрее других. Это не громкая история, но она держит всю карту."},{"k":"history","t":"Старая карта. До современных съездов и районов здесь почти всегда были более старые причины: вода, земля, торговый путь, ферма, пристань, железная дорога или административный центр округа. Так история становится полезной, а не декоративной."},{"k":"films","t":"Место в кадре. Кино любит места, где видно сразу несколько слоёв: старый центр, новый пригород, вода, трасса, небо и обычная жизнь без декораций. Дорога сама по себе уже готовая сцена."},{"k":"economy","t":"Рабочий округ. В {REGION} экономика часто собирается из простых вещей: {WORK}. Для водителя это видно по складам, сервисам, парковкам и утреннему потоку машин. Поэтому рабочий слой — один из самых честных в бесплатном эфире."},{"k":"life","t":"Жизнь вокруг. Обычная жизнь не хуже достопримечательности. Она показывает, почему округ растёт, где людям удобно жить и как дорога становится частью каждого дня. Обычная жизнь — тоже история, просто без фанфар."},{"k":"news","t":"О чём говорит район. Если свежих заголовков нет, хронику можно расширить до типичных тем округа: погода, транспорт, школьные события, рост жилья, природные зоны и решения по инфраструктуре. Местная хроника хорошо связывает карту с сегодняшним днём."},{"k":"sky","t":"Небо над точкой. Для {REGION} небо связано с землёй: где вода, там влажность; где открытая равнина, там ветер; где жарко, там облака быстро становятся событием. Так обычная погода превращается в часть истории места."},{"k":"mystery","t":"Местная легенда. Местные легенды полезны, если не спорить с наукой: они показывают, чего люди боялись, что запоминали и как делали место своим. Так эфир получает ночной поворот без дешёвой мистики."},{"k":"native","t":"До шоссе. Названия округов и рек иногда сохраняют то, что менялось вокруг: язык, племена, союзы, конфликты, переселения и попытки удержать связь с землёй. Дорога здесь моложе земли и её памяти."},{"k":"crafts","t":"Ручная работа. Для стоянки это хорошая тема: она переводит карту из абстракции в руки людей, которые что-то держали, точили, шили, варили, красили или собирали. Это тихая, но крепкая тема для долгой стоянки."},{"k":"crafts","t":"Материалы места. Если рядом нет знаменитого промысла, всё равно есть практическое ремесло дороги: ремонт, сварка, дерево, еда, вывески, лодки, мебель, упаковка и местный сервис. Руки часто рассказывают о месте честнее вывески."},{"k":"history","t":"До сегодняшних дорог. Водитель слышит историю иначе: не через музейную витрину, а через мосты, насыпь, старую центральную улицу и внезапно сохранившееся название района. На стоянке этот слой хорошо слушается без спешки."},{"k":"food","t":"О вкусе места. Дорожная еда — не только фастфуд. Это рынки, сезонные фрукты, рыба, барбекю, пекарни, закусочные у съездов и блюда, которые держатся за региональную привычку. Так место становится ощутимым не только глазами, но и вкусом."},{"k":"road","t":"О дороге. Большая дорога всегда меняет маленькие места: сначала появляется поток, потом сервисы, потом склады, потом новые районы и уже потом — новая повседневность. Так дорога становится не фоном, а главным объяснением места."},{"k":"people","t":"Имена и дела. Если говорить о людях честно, не нужно придумывать героев. Достаточно увидеть, как округ каждый день собирается из работы, дороги, еды, медицины и жилья. Это не эффектная легенда, зато настоящее содержание места."},{"k":"news","t":"Хроника округа. Для водителя хроника полезна не сенсацией, а ощущением, чем сейчас занят округ: ремонт дороги, гроза, новый объект, школьный сезон или спор вокруг земли. Для долгой стоянки такие вставки дают ощущение настоящего времени."},{"k":"road","t":"О дороге. {ROADLINE} Вокруг дороги быстро появляются склады, заправки, мотели, ремонтные зоны и короткие местные маршруты — водитель видит этот слой раньше туриста. У дороги есть память, даже когда мотор молчит."},{"k":"history","t":"О времени до нас. Прошлое не обязано быть громким. Иногда достаточно понять, что сегодняшняя развязка стоит на месте старого маршрута, а новый район повторяет старую логику земли. Это прошлое не уводит от дороги, а объясняет её."},{"k":"records","t":"Достижение без фанфар. Для дороги интересны не только официальные рекорды, но и придорожные чудеса: странная вывеска, старый ангар, большой мост, необычный поворот истории. Главное — не выдумывать рекорд, а брать безопасный масштаб шире."},{"k":"crafts","t":"Мастерская сторона. Ремесленная нить помогает услышать округ не как набор названий, а как рабочее место, где всё сделано чьими-то руками. Это тихая, но крепкая тема для долгой стоянки."},{"k":"crafts","t":"Работа руками. В дорожных округах ручная работа видна в мастерских, ремонтных боксах, рынках, ярмарках, гаражах, маленьких производствах и семейных делах. Дорога уважает тех, кто умеет чинить и делать."},{"k":"films","t":"Место в кадре. Для стоянки киношный взгляд полезен: он заставляет увидеть не только место, но и сцену — кто здесь проходит, куда едет, что остаётся за кадром. Дорога сама по себе уже готовая сцена."},{"k":"sky","t":"Высокий слой эфира. Для {REGION} небо связано с землёй: где вода, там влажность; где открытая равнина, там ветер; где жарко, там облака быстро становятся событием. Иногда небо рассказывает больше, чем указатель."},{"k":"records","t":"Достижение без фанфар. Рекорд не всегда выглядит как огромная табличка. Иногда это самый старый объект округа, редкая птица, необычный музей, быстрый рост района или первая для штата дорога. Это как дорожная специя: немного — и эфир просыпается."},{"k":"weather","t":"Ветер и свет. {WEATHER} Для дальнего маршрута это маленький прогноз настроения: будет ли дорога казаться тяжёлой, влажной, спокойной или открытой. Хорошее дорожное радио не отделяет факты от воздуха вокруг."},{"k":"sky","t":"Облака и свет. На стоянке небо становится частью отдыха: оно задаёт темп, помогает понять время и напоминает, что карта — это не только дороги, но и воздух над ними. Иногда небо рассказывает больше, чем указатель."},{"k":"mystery","t":"Загадка рядом. Загадочный эфир лучше держать честно: не выдавать легенду за факт, но признавать, что люди часто объясняют пустые места историями. Так эфир получает ночной поворот без дешёвой мистики."},{"k":"history","t":"Старая карта. Водитель слышит историю иначе: не через музейную витрину, а через мосты, насыпь, старую центральную улицу и внезапно сохранившееся название района. Даже без конкретной даты становится понятно, почему место выросло именно здесь."},{"k":"sky","t":"Погодное небо. Погодное небо связывает все остальные темы: воду, природу, дорожную безопасность, настроение и то, как долго человеку хочется оставаться на месте. Для бесплатного эфира это один из самых честных источников."},{"k":"people","t":"Повседневная карта. Округ становится понятным, когда смотришь не только на историю, но и на тех, кто сегодня делает его обычным, рабочим, живым местом. Так радио остаётся рядом с человеком, а не только с картой."},{"k":"sky","t":"Смотрим выше карты. На стоянке небо становится частью отдыха: оно задаёт темп, помогает понять время и напоминает, что карта — это не только дороги, но и воздух над ними. Иногда небо рассказывает больше, чем указатель."},{"k":"road","t":"О дороге. Дорога не просто проходит мимо {PLACE}. Она собирает вокруг себя работу, еду, сервис, жильё и привычку людей жить недалеко от съезда. Для Road Radio это честная тема: место читается через поток."},{"k":"sports","t":"От стоянки — к игре. Если открытые источники дают команду или атлета, эфир берёт их; если нет — смотрит шире на спортивную культуру региона и то, как она связана с дорогами и водой. Местная игра часто показывает район лучше официальной справки."},{"k":"records","t":"Факт с краю карты. Странности хороши тем, что вытаскивают место из серой справки: у округа появляется характер, даже если вокруг обычная парковка и влажный воздух. Так бесплатный диктор не засыпает в общих словах."},{"k":"road","t":"Линия маршрута. Когда машина стоит, трасса всё равно остаётся частью эфира: она объясняет, почему рядом есть эти кварталы, эти магазины и этот темп округа. У дороги есть память, даже когда мотор молчит."},{"k":"news","t":"Что попадает в новости. Если свежих заголовков нет, хронику можно расширить до типичных тем округа: погода, транспорт, школьные события, рост жилья, природные зоны и решения по инфраструктуре. Так эфир остаётся современным без платной модели."},{"k":"road","t":"О дороге. {ROADLINE} Вокруг дороги быстро появляются склады, заправки, мотели, ремонтные зоны и короткие местные маршруты — водитель видит этот слой раньше туриста. Для Road Radio это честная тема: место читается через поток."},{"k":"sports","t":"От стоянки — к игре. Спорт в округах часто живёт не только на больших аренах: школьные поля, бейсбольные площадки, рыбалка, гонки, беговые клубы и водные тренировки держат местную энергию. Местная игра часто показывает район лучше официальной справки."},{"k":"place","t":"Округ в деталях. У этой точки есть несколько слоёв: ближайшее название, округ, погода, дорога и привычные маршруты людей, которые каждый день ездят через {PLACE}. Для дороги это полезнее списка дат: понятно, почему окружение устроено именно так."},{"k":"oddity","t":"Маленькая причуда. Такие факты хороши коротко и честно: не надо раздувать. Достаточно одной необычной связи, и место перестаёт быть безликим. Дорога любит места, которые слегка подмигивают."},{"k":"water","t":"Вода рядом. В {REGION} вода редко бывает декорацией: {WATER} определяют, где стоят дома, как идут дороги и почему часть земли остаётся зелёной. Для дальнобойщика это не романтика, а практическая география вокруг колёс."},{"k":"people","t":"Человеческая нить. Если говорить о людях честно, не нужно придумывать героев. Достаточно увидеть, как округ каждый день собирается из работы, дороги, еды, медицины и жилья. Именно люди превращают географию в место, где кто-то живёт."},{"k":"crafts","t":"Ручная работа. Материалы региона часто диктуют работу: влажность меняет древесину, песчаная почва влияет на строительство, вода требует лодок, а дорога — ремонта и металла. Руки часто рассказывают о месте честнее вывески."},{"k":"native","t":"История старше округа. Названия округов и рек иногда сохраняют то, что менялось вокруг: язык, племена, союзы, конфликты, переселения и попытки удержать связь с землёй. Это важный слой бесплатного эфира, если говорить аккуратно и без выдуманных деталей."},{"k":"wildlife","t":"Зелёная сторона дороги. На стоянке природа слышится не как лекция, а как фон: влажный воздух, птица над водой, шелест травы и редкое движение в тени. Для спокойного эфира этого уже достаточно: место становится живым."},{"k":"crafts","t":"Ручная работа. Материалы региона часто диктуют работу: влажность меняет древесину, песчаная почва влияет на строительство, вода требует лодок, а дорога — ремонта и металла. Дорога уважает тех, кто умеет чинить и делать."},{"k":"road","t":"О том, что держит путь. {ROADLINE} Вокруг дороги быстро появляются склады, заправки, мотели, ремонтные зоны и короткие местные маршруты — водитель видит этот слой раньше туриста. На паузе это особенно заметно: всё вокруг словно собрано ради движения."},{"k":"oddity","t":"Карта умеет удивлять. Если источники молчат, можно искать странность в самой географии: почему дорога делает изгиб, почему район вырос у воды, почему аэропорт стоит именно здесь. Главное — не путать её с выдумкой."},{"k":"road","t":"Линия маршрута. {ROADLINE} Вокруг дороги быстро появляются склады, заправки, мотели, ремонтные зоны и короткие местные маршруты — водитель видит этот слой раньше туриста. Так дорога становится не фоном, а главным объяснением места."},{"k":"sky","t":"Смотрим выше карты. Небо меняет дорогу быстрее, чем кажется: облака, свет, влажность, грозовые фронты и вечерняя тень способны превратить тот же самый съезд в другое место. Для бесплатного эфира это один из самых честных источников."},{"k":"life","t":"Жизнь вокруг. У таких мест есть свой темп: утром поток к работе, днём сервисы и доставка, вечером магазины и школы, ночью редкие фары и работа трассы. Так эфир держится рядом с настоящим днём, а не только с прошлым."},{"k":"records","t":"Необычная отметка. Рекорд не всегда выглядит как огромная табличка. Иногда это самый старый объект округа, редкая птица, необычный музей, быстрый рост района или первая для штата дорога. Главное — не выдумывать рекорд, а брать безопасный масштаб шире."},{"k":"weather","t":"Климатическая пауза. {WEATHER} Пока машина стоит, именно погода делает точку реальной: не название, а температура, ветер, свет и влажность вокруг. Хорошее дорожное радио не отделяет факты от воздуха вокруг."},{"k":"economy","t":"Экономика без витрины. Если смотреть с дороги, экономика места выглядит не как график, а как набор ворот, вывесок, разгрузок, стоянок и людей, которые держат эту систему каждый день. Поэтому рабочий слой — один из самых честных в бесплатном эфире."},{"k":"crafts","t":"Ручная работа. Ремесло почти всегда начинается с того, что даёт место: дерево, глина, металл, ткань, вода, фермы, старые склады или люди, которые умеют чинить и делать. Руки часто рассказывают о месте честнее вывески."},{"k":"mystery","t":"Странная история. Иногда загадка — это не привидение, а исчезнувшая дорога, закрытый мост, старый ангар или район, который вырос поверх другой истории. У каждой карты есть тёмный угол, но не каждый нужно раздувать."},{"k":"road","t":"О дороге. Когда машина стоит, трасса всё равно остаётся частью эфира: она объясняет, почему рядом есть эти кварталы, эти магазины и этот темп округа. На паузе это особенно заметно: всё вокруг словно собрано ради движения."},{"k":"life","t":"Обычный день округа. Если слушать место дольше пяти минут, начинают проявляться бытовые детали: погода, шум, соседние названия, машины, вывески, привычные маршруты. Обычная жизнь — тоже история, просто без фанфар."},{"k":"news","t":"Свежая повестка. Городская заметка — это маленький снимок времени. Через неё место звучит не как музей, а как живой район, где прямо сейчас что-то происходит. Так эфир остаётся современным без платной модели."},{"k":"land","t":"Здешний ландшафт. Почва и высота часто объясняют больше, чем рекламные щиты: где ставят склады, где оставляют парк, где после дождя вода стоит дольше всего. На длинной стоянке такие детали начинают работать лучше экскурсионной суеты."},{"k":"weather","t":"По погоде. {WEATHER} Такая погода сразу объясняет часть территории: где нужна тень, почему земля быстро мокнет или сохнет, и как водители чувствуют место без карты. Так погода становится частью рассказа, а не отдельной строкой на экране."},{"k":"road","t":"О том, что держит путь. {ROADLINE} Вокруг дороги быстро появляются склады, заправки, мотели, ремонтные зоны и короткие местные маршруты — водитель видит этот слой раньше туриста. У дороги есть память, даже когда мотор молчит."},{"k":"life","t":"Бытовая карта. Пригородный район часто кажется одинаковым только на скорости. На стоянке видно больше: где люди гуляют, где стоит сервис, где начинается новый квартал. Обычная жизнь — тоже история, просто без фанфар."},{"k":"literature","t":"Место в тексте. Когда локальные факты заканчиваются, можно слушать территорию как страницу: какие здесь запахи, дороги, вода, привычки и одиночество длинного маршрута. Так бесплатное радио остаётся живым даже после всех местных справок."},{"k":"road","t":"О дороге. {ROADLINE} Вокруг дороги быстро появляются склады, заправки, мотели, ремонтные зоны и короткие местные маршруты — водитель видит этот слой раньше туриста. Так дорога становится не фоном, а главным объяснением места."},{"k":"life","t":"Между домом и дорогой. Обычная жизнь не хуже достопримечательности. Она показывает, почему округ растёт, где людям удобно жить и как дорога становится частью каждого дня. Обычная жизнь — тоже история, просто без фанфар."},{"k":"food","t":"После дороги — к еде. Даже без конкретного ресторана можно услышать вкус территории: климат, миграции, старые фермы, придорожные кафе и привычка людей собираться вокруг еды. Так место становится ощутимым не только глазами, но и вкусом."},{"k":"literature","t":"Литературная нить. Если рядом есть писатель, роман или историческая книга, такой источник можно читать мягко: не дословно, а как историю, связанную с воздухом и землёй вокруг. Для дальнего водителя такой слой может держать эфир часами."},{"k":"crafts","t":"Ремесло рядом. Материалы региона часто диктуют работу: влажность меняет древесину, песчаная почва влияет на строительство, вода требует лодок, а дорога — ремонта и металла. Так бесплатный эфир получает осязаемость."},{"k":"food","t":"Что здесь едят. Для водителя еда — часть географии: одно меню говорит, что рядом побережье; другое — что вокруг фермы; третье — что трасса кормит весь район. Так место становится ощутимым не только глазами, но и вкусом."},{"k":"wildlife","t":"Кто тут живёт. Если смотреть шире, дорога проходит не через пустоту, а через живой коридор: деревья, вода, насекомые, птицы и сезонная миграция рядом. У дороги тоже есть экология, просто она не всегда выглядит как заповедник."},{"k":"records","t":"Странность рядом. У каждого округа есть свои маленькие рекорды: кто-то первым построил школу, где-то дольше держалась старая ферма, где-то появился необычный парк или музей. У каждой карты есть свои странные углы."},{"k":"films","t":"Фильмы и эта земля. Если слушатель любит фильмы, бесплатный эфир может уходить от точки к региону: какие пейзажи здесь снимают, какие дороги выглядят кинематографично и почему. Когда фактов мало, такой ракурс держит эфир без фальши."},{"k":"records","t":"Странность рядом. Странности хороши тем, что вытаскивают место из серой справки: у округа появляется характер, даже если вокруг обычная парковка и влажный воздух. Так бесплатный диктор не засыпает в общих словах."},{"k":"land","t":"География без витрины. В такой местности дорога словно идёт по старому договору с землёй: обходит низины, использует сухие гряды и тянется туда, где проще держать поток. Земля обычно молчит, но именно она расставляет остальные факты."},{"k":"oddity","t":"Факт с улыбкой. Иногда странность места — не музей, а сочетание вещей: аэропорт рядом с болотом, старый район у новой трассы, огромная парковка возле тихого озера или название, которое пережило прежнюю жизнь. Маленькая странность иногда лучше большой лекции."},{"k":"road","t":"О дороге. Дорога не просто проходит мимо {PLACE}. Она собирает вокруг себя работу, еду, сервис, жильё и привычку людей жить недалеко от съезда. Так дорога становится не фоном, а главным объяснением места."},{"k":"crafts","t":"Ручная работа. Если рядом нет знаменитого промысла, всё равно есть практическое ремесло дороги: ремонт, сварка, дерево, еда, вывески, лодки, мебель, упаковка и местный сервис. Руки часто рассказывают о месте честнее вывески."},{"k":"history","t":"Немного прошлого. Если поднять взгляд от стоянки к округу, видно, как прошлое стало инфраструктурой: где был первый путь, там часто появляется новая дорога и работа. Даже без конкретной даты становится понятно, почему место выросло именно здесь."},{"k":"films","t":"Экранная нитка. Даже если конкретная съёмка проходила в другом городе, визуальный язык региона узнаётся: свет, влажность, низкая земля, дорожные сервисы и большие парковки. Дорога сама по себе уже готовая сцена."},{"k":"land","t":"География без витрины. Открытая земля, лесные пятна и низины складываются в маршрутный рисунок, который водитель чувствует ещё до того, как увидит название города. Так место становится понятнее без единой платной генерации."},{"k":"mystery","t":"Загадка рядом. Загадочный эфир лучше держать честно: не выдавать легенду за факт, но признавать, что люди часто объясняют пустые места историями. Главное — держать границу между байкой и фактом."},{"k":"weather","t":"Ветер и свет. {WEATHER} Небо здесь работает как часть географии — оно меняет свет на асфальте, поведение птиц, видимость и ритм стоянки. Хорошее дорожное радио не отделяет факты от воздуха вокруг."},{"k":"mystery","t":"Карта подмигнула. Если рядом есть вода, лес, старая дорога или бывшая железная линия, у местных рассказов появляется сцена: туман, шум ночью, странный свет или забытое название. У каждой карты есть тёмный угол, но не каждый нужно раздувать."},{"k":"water","t":"О воде. Если рядом есть низины, озёра или каналы, дорога почти всегда подстраивается под них — съезды, мосты и жилые кварталы растут уже вокруг этой водной логики. Для дальнобойщика это не романтика, а практическая география вокруг колёс."},{"k":"films","t":"Кадр у дороги. Для стоянки киношный взгляд полезен: он заставляет увидеть не только место, но и сцену — кто здесь проходит, куда едет, что остаётся за кадром. Когда фактов мало, такой ракурс держит эфир без фальши."},{"k":"music","t":"Сцена и дорога. Музыка вокруг таких мест часто держится не на больших афишах, а на школьных залах, церквях, барах, парках, фестивалях и семейных праздниках. Дорога всегда была хорошим радиоприёмником для местной музыки."},{"k":"sports","t":"Местная скорость. В таких местах соревнование может быть совсем рядом с обычной жизнью: поле за школой, лодки у воды, грунтовая трасса, парк с бегунами или зал при колледже. Местная игра часто показывает район лучше официальной справки."},{"k":"life","t":"Как здесь живут. Пригородный район часто кажется одинаковым только на скорости. На стоянке видно больше: где люди гуляют, где стоит сервис, где начинается новый квартал. Так эфир держится рядом с настоящим днём, а не только с прошлым."},{"k":"news","t":"Хроника округа. Городская заметка — это маленький снимок времени. Через неё место звучит не как музей, а как живой район, где прямо сейчас что-то происходит. Местная хроника хорошо связывает карту с сегодняшним днём."},{"k":"place","t":"Местность вокруг. Стоянка показывает территорию с уровня земли: не туристический буклет, а реальный набор дорог, кварталов, воздуха, воды и рабочих маршрутов. Так появляется нормальное чувство места, а не сухая строка из справочника."},{"k":"sky","t":"Смотрим выше карты. Для {REGION} небо связано с землёй: где вода, там влажность; где открытая равнина, там ветер; где жарко, там облака быстро становятся событием. Так обычная погода превращается в часть истории места."},{"k":"road","t":"О дороге. {ROADLINE} Вокруг дороги быстро появляются склады, заправки, мотели, ремонтные зоны и короткие местные маршруты — водитель видит этот слой раньше туриста. На паузе это особенно заметно: всё вокруг словно собрано ради движения."},{"k":"crafts","t":"Что делают руками. Ремесленная нить помогает услышать округ не как набор названий, а как рабочее место, где всё сделано чьими-то руками. Так бесплатный эфир получает осязаемость."},{"k":"history","t":"Историческая нить. Прошлое не обязано быть громким. Иногда достаточно понять, что сегодняшняя развязка стоит на месте старого маршрута, а новый район повторяет старую логику земли. Так история становится полезной, а не декоративной."},{"k":"music","t":"Звучание места. Если в открытых источниках найдётся музыкант или песня, WikiRadio может уйти в эту ветку; если нет — держать музыкальный ракурс через регион и его сцены. Так музыка становится способом слышать карту, а не просто темой из списка."},{"k":"music","t":"Музыкальная нить. Если в открытых источниках найдётся музыкант или песня, WikiRadio может уйти в эту ветку; если нет — держать музыкальный ракурс через регион и его сцены. Для спокойного эфира это мягкая смена угла без выдуманных фактов."},{"k":"life","t":"Бытовая карта. Пригородный район часто кажется одинаковым только на скорости. На стоянке видно больше: где люди гуляют, где стоит сервис, где начинается новый квартал. Для стоянки это честный и спокойный материал."},{"k":"road","t":"О том, что держит путь. Если позже маршрут продолжится тем же курсом, окружающая территория будет меняться не скачком, а полосами: вода, жильё, сервисы, открытая земля, снова городские огни. На паузе это особенно заметно: всё вокруг словно собрано ради движения."},{"k":"people","t":"Человеческая нить. Если говорить о людях честно, не нужно придумывать героев. Достаточно увидеть, как округ каждый день собирается из работы, дороги, еды, медицины и жилья. Для долгой остановки такая человеческая нить важнее очередной сухой справки."},{"k":"native","t":"До современных дорог. До округов, трасс и пригородов эта земля уже имела маршруты, имена, воду, охотничьи места, поселения и память народов, которые знали её не как карту, а как дом. Так карта получает глубину, а не только современные дороги."},{"k":"economy","t":"Чем место живёт. Трасса почти всегда создаёт работу вокруг себя. Сначала нужен топливо, ремонт и еда; потом приходят склады, доставка, гостиницы, медицина и новые районы. Поэтому рабочий слой — один из самых честных в бесплатном эфире."},{"k":"life","t":"Бытовая карта. Пригородный район часто кажется одинаковым только на скорости. На стоянке видно больше: где люди гуляют, где стоит сервис, где начинается новый квартал. Здесь место становится человеческим."},{"k":"news","t":"Свежая повестка. Новости вокруг дороги показывают повседневность: где задержка, где строят, где вода вышла из берегов, где местная команда выиграла, где меняется район. Так эфир остаётся современным без платной модели."},{"k":"oddity","t":"Необычный угол. Такие факты хороши коротко и честно: не надо раздувать. Достаточно одной необычной связи, и место перестаёт быть безликим. Главное — не путать её с выдумкой."},{"k":"music","t":"Звучание места. Дорога хорошо слышит музыку региона: радиостанции, старые клубы, церковные хоры, кантри-площадки, латиноамериканские ритмы или блюзовые следы. Дорога всегда была хорошим радиоприёмником для местной музыки."},{"k":"history","t":"До сегодняшних дорог. Водитель слышит историю иначе: не через музейную витрину, а через мосты, насыпь, старую центральную улицу и внезапно сохранившееся название района. Так история становится полезной, а не декоративной."},{"k":"wildlife","t":"Природа рядом. На стоянке природа слышится не как лекция, а как фон: влажный воздух, птица над водой, шелест травы и редкое движение в тени. Такая история не требует громкого открытия — достаточно внимательно посмотреть вокруг."},{"k":"news","t":"Городская заметка. Городская заметка — это маленький снимок времени. Через неё место звучит не как музей, а как живой район, где прямо сейчас что-то происходит. Так эфир остаётся современным без платной модели."},{"k":"life","t":"Жизнь вокруг. Пригородный район часто кажется одинаковым только на скорости. На стоянке видно больше: где люди гуляют, где стоит сервис, где начинается новый квартал. Обычная жизнь — тоже история, просто без фанфар."},{"k":"crafts","t":"Ручная работа. Если рядом нет знаменитого промысла, всё равно есть практическое ремесло дороги: ремонт, сварка, дерево, еда, вывески, лодки, мебель, упаковка и местный сервис. Это тихая, но крепкая тема для долгой стоянки."},{"k":"life","t":"Бытовая карта. У таких мест есть свой темп: утром поток к работе, днём сервисы и доставка, вечером магазины и школы, ночью редкие фары и работа трассы. Обычная жизнь — тоже история, просто без фанфар."},{"k":"water","t":"После дождя это особенно заметно. В {REGION} вода редко бывает декорацией: {WATER} определяют, где стоят дома, как идут дороги и почему часть земли остаётся зелёной. Для дальнобойщика это не романтика, а практическая география вокруг колёс."},{"k":"history","t":"Старая карта. Прошлое не обязано быть громким. Иногда достаточно понять, что сегодняшняя развязка стоит на месте старого маршрута, а новый район повторяет старую логику земли. Это прошлое не уводит от дороги, а объясняет её."},{"k":"sports","t":"Игры и дороги. Если открытые источники дают команду или атлета, эфир берёт их; если нет — смотрит шире на спортивную культуру региона и то, как она связана с дорогами и водой. Дорога и спорт любят одно и то же — направление и ритм."},{"k":"economy","t":"Работа вокруг стоянки. В {REGION} экономика часто собирается из простых вещей: {WORK}. Для водителя это видно по складам, сервисам, парковкам и утреннему потоку машин. Так место перестаёт быть пустой точкой и становится системой."},{"k":"records","t":"Достижение без фанфар. Такие факты лучше звучат коротко: что выделяется, почему это редкость, как оно связано с местом и что водитель может представить прямо сейчас. Так бесплатный диктор не засыпает в общих словах."},{"k":"weather","t":"Воздух вокруг. {WEATHER} Такая погода сразу объясняет часть территории: где нужна тень, почему земля быстро мокнет или сохнет, и как водители чувствуют место без карты. Это короткая, но полезная нить перед следующей историей."},{"k":"food","t":"Еда у дороги. Еда вокруг таких мест часто растёт из климата, дороги и миграций: что можно вырастить, что удобно привезти, где останавливаются водители и какие семьи открывают маленькие кухни. Так место становится ощутимым не только глазами, но и вкусом."},{"k":"films","t":"Кино и экран. Если слушатель любит фильмы, бесплатный эфир может уходить от точки к региону: какие пейзажи здесь снимают, какие дороги выглядят кинематографично и почему. Это не выдумка о съёмках, а способ смотреть на территорию через киноязык."},{"k":"films","t":"Если смотреть как кино. Даже если конкретная съёмка проходила в другом городе, визуальный язык региона узнаётся: свет, влажность, низкая земля, дорожные сервисы и большие парковки. Дорога сама по себе уже готовая сцена."},{"k":"films","t":"Экранная нитка. Экран часто выбирает не знаменитый вид, а удобную правду: аэропорт, склад, старую улицу, придорожный мотель или район, где жизнь выглядит без грима. Так даже обычная стоянка получает экранный ракурс."},{"k":"films","t":"Кино и экран. Даже если конкретная съёмка проходила в другом городе, визуальный язык региона узнаётся: свет, влажность, низкая земля, дорожные сервисы и большие парковки. Так даже обычная стоянка получает экранный ракурс."},{"k":"economy","t":"Экономика без витрины. Трасса почти всегда создаёт работу вокруг себя. Сначала нужен топливо, ремонт и еда; потом приходят склады, доставка, гостиницы, медицина и новые районы. Для Road Radio такая тема почти родная: экономика часто начинается у съезда."},{"k":"history","t":"Из старой истории. История таких мест редко выглядит как один памятник. Чаще она прячется в названии улицы, старом вокзале, форме квартала, кладбище или маршруте к воде. На стоянке этот слой хорошо слушается без спешки."},{"k":"land","t":"Как устроена местность. Рельеф не всегда бросается в глаза из кабины, но он управляет всем: дренажом, мостами, зелёными полосами, промышленными зонами и жилыми кварталами. Так место становится понятнее без единой платной генерации."},{"k":"land","t":"Рельеф и почва. Открытая земля, лесные пятна и низины складываются в маршрутный рисунок, который водитель чувствует ещё до того, как увидит название города. Это не громкая история, но она держит всю карту."},{"k":"history","t":"Из старой истории. До современных съездов и районов здесь почти всегда были более старые причины: вода, земля, торговый путь, ферма, пристань, железная дорога или административный центр округа. Даже без конкретной даты становится понятно, почему место выросло именно здесь."},{"k":"weather","t":"Климатическая пауза. {WEATHER} Такая погода сразу объясняет часть территории: где нужна тень, почему земля быстро мокнет или сохнет, и как водители чувствуют место без карты. Хорошее дорожное радио не отделяет факты от воздуха вокруг."},{"k":"people","t":"Кто держит округ. Округ становится понятным, когда смотришь не только на историю, но и на тех, кто сегодня делает его обычным, рабочим, живым местом. Это не эффектная легенда, зато настоящее содержание места."},{"k":"music","t":"Ритм округа. Места у трасс часто собирают музыку практично: где есть бар, фестиваль, школьное поле или городская площадь, там появляется своя сцена. Дорога всегда была хорошим радиоприёмником для местной музыки."},{"k":"road","t":"Дорожная нить. Когда машина стоит, трасса всё равно остаётся частью эфира: она объясняет, почему рядом есть эти кварталы, эти магазины и этот темп округа. Для Road Radio это честная тема: место читается через поток."},{"k":"oddity","t":"Маленькая причуда. Для длинной стоянки маленькие странности спасают эфир от учебника: карта вдруг становится характером, а не таблицей. Дорога любит места, которые слегка подмигивают."},{"k":"people","t":"Человеческая нить. В таких местах человек обычно виден через инфраструктуру: парковки у магазинов, окна офисов, вывески клиник, школьные поля и грузовые ворота складов. Именно люди превращают географию в место, где кто-то живёт."},{"k":"water","t":"Река и низины. В {REGION} вода редко бывает декорацией: {WATER} определяют, где стоят дома, как идут дороги и почему часть земли остаётся зелёной. Для дальнобойщика это не романтика, а практическая география вокруг колёс."},{"k":"history","t":"Из старой истории. Если поднять взгляд от стоянки к округу, видно, как прошлое стало инфраструктурой: где был первый путь, там часто появляется новая дорога и работа. Так история становится полезной, а не декоративной."},{"k":"sports","t":"Спорт вокруг. В таких местах соревнование может быть совсем рядом с обычной жизнью: поле за школой, лодки у воды, грунтовая трасса, парк с бегунами или зал при колледже. Для длинной паузы спорт добавляет человеческий шум без выдумки."},{"k":"oddity","t":"Дорожная диковина. У округа почти всегда есть маленькая причуда, которую не заметишь в общей статье: редкий парк, странное название, забытый объект, непривычная кухня или местная байка. Маленькая странность иногда лучше большой лекции."},{"k":"people","t":"Люди вокруг дороги. Округ становится понятным, когда смотришь не только на историю, но и на тех, кто сегодня делает его обычным, рабочим, живым местом. Так радио остаётся рядом с человеком, а не только с картой."},{"k":"economy","t":"Рабочий округ. Пригородный рост меняет округ тихо: бывшие поля становятся кварталами, старые дороги получают новые съезды, а рядом появляются сервисы для людей и грузов. Для Road Radio такая тема почти родная: экономика часто начинается у съезда."},{"k":"place","t":"Точка на карте. У этой точки есть несколько слоёв: ближайшее название, округ, погода, дорога и привычные маршруты людей, которые каждый день ездят через {PLACE}. Именно такие детали делают бесплатный эфир живым даже без платного диктора."},{"k":"road","t":"Пока колёса отдыхают. {ROADLINE} Вокруг дороги быстро появляются склады, заправки, мотели, ремонтные зоны и короткие местные маршруты — водитель видит этот слой раньше туриста. Так дорога становится не фоном, а главным объяснением места."},{"k":"food","t":"Местный стол. В {REGION} вкус часто связан с {WATER}, жарой, длинными поездками и привычкой есть просто, быстро, но с местным оттенком. Еда быстро возвращает карту к живым людям."},{"k":"records","t":"Достижение без фанфар. Для дороги интересны не только официальные рекорды, но и придорожные чудеса: странная вывеска, старый ангар, большой мост, необычный поворот истории. Это как дорожная специя: немного — и эфир просыпается."},{"k":"food","t":"После дороги — к еде. В {REGION} вкус часто связан с {WATER}, жарой, длинными поездками и привычкой есть просто, быстро, но с местным оттенком. Для стоянки это одна из самых человеческих тем."},{"k":"people","t":"Кто держит округ. Обычная жизнь вокруг стоянки часто интереснее буклета: смены на складах, школьные автобусы, местные рынки, ремонтные боксы и короткие поездки между районами. Для долгой остановки такая человеческая нить важнее очередной сухой справки."},{"k":"wildlife","t":"Зелёная сторона дороги. На стоянке природа слышится не как лекция, а как фон: влажный воздух, птица над водой, шелест травы и редкое движение в тени. Это хороший бесплатный слой, потому что он связан с территорией напрямую."},{"k":"weather","t":"Воздух вокруг. {WEATHER} Для дальнего маршрута это маленький прогноз настроения: будет ли дорога казаться тяжёлой, влажной, спокойной или открытой. Это короткая, но полезная нить перед следующей историей."},{"k":"crafts","t":"Что делают руками. Ремесленная нить помогает услышать округ не как набор названий, а как рабочее место, где всё сделано чьими-то руками. Дорога уважает тех, кто умеет чинить и делать."},{"k":"wildlife","t":"Живая природа. Если смотреть шире, дорога проходит не через пустоту, а через живой коридор: деревья, вода, насекомые, птицы и сезонная миграция рядом. Это хороший бесплатный слой, потому что он связан с территорией напрямую."},{"k":"food","t":"Что здесь едят. Дорожная еда — не только фастфуд. Это рынки, сезонные фрукты, рыба, барбекю, пекарни, закусочные у съездов и блюда, которые держатся за региональную привычку. Хороший дорожный эфир иногда начинается с вопроса: что здесь едят?"},{"k":"literature","t":"Если слушать как рассказ. У дороги есть своя литература: маленькие города, ночные стоянки, влажный воздух, реки, окраины, люди между большим городом и тихим районом. Это хороший режим для ночи, когда факты должны звучать мягче."},{"k":"mystery","t":"Загадка рядом. Если рядом есть вода, лес, старая дорога или бывшая железная линия, у местных рассказов появляется сцена: туман, шум ночью, странный свет или забытое название. Дорога любит такие истории, особенно когда мотор уже молчит."},{"k":"land","t":"Под ногами. Ландшафт кажется спокойным только на первый взгляд. На самом деле он постоянно диктует, где жить, где работать, где строить и где лучше не спешить. Так место становится понятнее без единой платной генерации."},{"k":"music","t":"Ритм округа. Дорога хорошо слышит музыку региона: радиостанции, старые клубы, церковные хоры, кантри-площадки, латиноамериканские ритмы или блюзовые следы. Для спокойного эфира это мягкая смена угла без выдуманных фактов."},{"k":"land","t":"О земле. В {REGION} земля читается через {LAND}. Именно это решает, где задерживается вода, где строят дороги и почему одни участки растут быстрее других. Это не громкая история, но она держит всю карту."},{"k":"people","t":"Имена и дела. {COUNTYLINE} держится не на одной достопримечательности, а на людях, которые каждый день возят детей, чинят машины, принимают грузы, работают в больницах, школах и сервисах. Именно люди превращают географию в место, где кто-то живёт."},{"k":"native","t":"До современных дорог. До округов, трасс и пригородов эта земля уже имела маршруты, имена, воду, охотничьи места, поселения и память народов, которые знали её не как карту, а как дом. Дорога здесь моложе земли и её памяти."},{"k":"news","t":"Свежая повестка. Даже один заголовок может показать, чем живёт место сегодня. Но без статьи лучше не фантазировать — достаточно назвать тему и связать её с территорией. Главное — не пересказывать лишнего без источника."},{"k":"literature","t":"Если слушать как рассказ. У дороги есть своя литература: маленькие города, ночные стоянки, влажный воздух, реки, окраины, люди между большим городом и тихим районом. Для дальнего водителя такой слой может держать эфир часами."},{"k":"music","t":"Музыка вокруг карты. Если в открытых источниках найдётся музыкант или песня, WikiRadio может уйти в эту ветку; если нет — держать музыкальный ракурс через регион и его сцены. Дорога всегда была хорошим радиоприёмником для местной музыки."},{"k":"food","t":"Еда у дороги. В {REGION} вкус часто связан с {WATER}, жарой, длинными поездками и привычкой есть просто, быстро, но с местным оттенком. Еда быстро возвращает карту к живым людям."},{"k":"food","t":"После дороги — к еде. Если рядом есть вода, фермы или порт, кухня обычно это помнит: рыба, цитрусы, овощи, копчёности, специи или простые блюда для людей в пути. Хороший дорожный эфир иногда начинается с вопроса: что здесь едят?"},{"k":"life","t":"Как здесь живут. Обычная жизнь не хуже достопримечательности. Она показывает, почему округ растёт, где людям удобно жить и как дорога становится частью каждого дня. Здесь место становится человеческим."},{"k":"people","t":"Кто держит округ. {COUNTYLINE} держится не на одной достопримечательности, а на людях, которые каждый день возят детей, чинят машины, принимают грузы, работают в больницах, школах и сервисах. Это не эффектная легенда, зато настоящее содержание места."},{"k":"people","t":"Люди вокруг дороги. Округ становится понятным, когда смотришь не только на историю, но и на тех, кто сегодня делает его обычным, рабочим, живым местом. Это не эффектная легенда, зато настоящее содержание места."},{"k":"records","t":"Необычная отметка. У каждого округа есть свои маленькие рекорды: кто-то первым построил школу, где-то дольше держалась старая ферма, где-то появился необычный парк или музей. Так бесплатный диктор не засыпает в общих словах."},{"k":"music","t":"О местном звуке. Дорога хорошо слышит музыку региона: радиостанции, старые клубы, церковные хоры, кантри-площадки, латиноамериканские ритмы или блюзовые следы. Иногда место запоминается именно звуком, а не видом."},{"k":"economy","t":"Работа вокруг стоянки. У каждого дорожного места есть бытовая экономика: где водитель заправился, где местный житель купил продукты, где курьер забрал груз и где мастер открыл бокс. Для Road Radio такая тема почти родная: экономика часто начинается у съезда."},{"k":"sky","t":"Погодное небо. Для {REGION} небо связано с землёй: где вода, там влажность; где открытая равнина, там ветер; где жарко, там облака быстро становятся событием. Для бесплатного эфира это один из самых честных источников."},{"k":"records","t":"Рекорды и странности. Для дороги интересны не только официальные рекорды, но и придорожные чудеса: странная вывеска, старый ангар, большой мост, необычный поворот истории. Главное — не выдумывать рекорд, а брать безопасный масштаб шире."},{"k":"land","t":"Под ногами. Открытая земля, лесные пятна и низины складываются в маршрутный рисунок, который водитель чувствует ещё до того, как увидит название города. Это не громкая история, но она держит всю карту."},{"k":"wildlife","t":"Живой мир вокруг. Если смотреть шире, дорога проходит не через пустоту, а через живой коридор: деревья, вода, насекомые, птицы и сезонная миграция рядом. Такая история не требует громкого открытия — достаточно внимательно посмотреть вокруг."},{"k":"mystery","t":"Странная история. Если рядом есть вода, лес, старая дорога или бывшая железная линия, у местных рассказов появляется сцена: туман, шум ночью, странный свет или забытое название. У каждой карты есть тёмный угол, но не каждый нужно раздувать."},{"k":"people","t":"Человеческая нить. Округ становится понятным, когда смотришь не только на историю, но и на тех, кто сегодня делает его обычным, рабочим, живым местом. Для долгой остановки такая человеческая нить важнее очередной сухой справки."},{"k":"native","t":"Память первых народов. Коренная история не должна звучать как формальность. Она объясняет старые названия, тропы у воды, места сбора, торговые пути и то, почему некоторые земли остаются особенными. Уважительный масштаб лучше, чем случайная конкретика без источника."},{"k":"records","t":"Необычная отметка. Странности хороши тем, что вытаскивают место из серой справки: у округа появляется характер, даже если вокруг обычная парковка и влажный воздух. Это как дорожная специя: немного — и эфир просыпается."},{"k":"people","t":"Повседневная карта. Обычная жизнь вокруг стоянки часто интереснее буклета: смены на складах, школьные автобусы, местные рынки, ремонтные боксы и короткие поездки между районами. Так радио остаётся рядом с человеком, а не только с картой."},{"k":"place","t":"Точка на карте. {PLACE} лучше слушать не как одну вывеску, а как узел: рядом идут {ROADPART}, живёт {COUNTY}, а за обычными кварталами чувствуется {CORRIDOR}. Именно такие детали делают бесплатный эфир живым даже без платного диктора."},{"k":"sky","t":"Облака и свет. Если сейчас светло, детали вокруг становятся резче; если темнеет, место уходит в звук: шины, ветер, редкие птицы, далёкий двигатель. Так обычная погода превращается в часть истории места."},{"k":"weather","t":"Климатическая пауза. {WEATHER} Небо здесь работает как часть географии — оно меняет свет на асфальте, поведение птиц, видимость и ритм стоянки. Хорошее дорожное радио не отделяет факты от воздуха вокруг."},{"k":"life","t":"Между домом и дорогой. Если слушать место дольше пяти минут, начинают проявляться бытовые детали: погода, шум, соседние названия, машины, вывески, привычные маршруты. Для стоянки это честный и спокойный материал."},{"k":"road","t":"О том, что держит путь. Старые дороги часто остаются в форме кварталов и мостов. Новые трассы добавляют к ним логистику, пригородный рост и быстрые короткие поездки. У дороги есть память, даже когда мотор молчит."},{"k":"road","t":"Пока колёса отдыхают. {ROADLINE} Вокруг дороги быстро появляются склады, заправки, мотели, ремонтные зоны и короткие местные маршруты — водитель видит этот слой раньше туриста. Для Road Radio это честная тема: место читается через поток."},{"k":"oddity","t":"Дорожная диковина. Дорога хорошо ловит странные детали: неожиданный мост, большой ангар, смешную вывеску, старый мотель, необычную коллекцию или район, выросший слишком быстро. Главное — не путать её с выдумкой."},{"k":"life","t":"Бытовая карта. Если слушать место дольше пяти минут, начинают проявляться бытовые детали: погода, шум, соседние названия, машины, вывески, привычные маршруты. Обычная жизнь — тоже история, просто без фанфар."},{"k":"people","t":"О людях. Округ становится понятным, когда смотришь не только на историю, но и на тех, кто сегодня делает его обычным, рабочим, живым местом. Это не эффектная легенда, зато настоящее содержание места."},{"k":"records","t":"Рекорды и странности. Рекорд не всегда выглядит как огромная табличка. Иногда это самый старый объект округа, редкая птица, необычный музей, быстрый рост района или первая для штата дорога. Главное — не выдумывать рекорд, а брать безопасный масштаб шире."},{"k":"news","t":"Что попадает в новости. Городская заметка — это маленький снимок времени. Через неё место звучит не как музей, а как живой район, где прямо сейчас что-то происходит. Так эфир остаётся современным без платной модели."},{"k":"weather","t":"Погода у точки. {WEATHER} В таких условиях место слышится иначе: тише в жару, резче перед грозой, мягче после дождя и просторнее при лёгком ветре. Это короткая, но полезная нить перед следующей историей."},{"k":"history","t":"Старая карта. Если поднять взгляд от стоянки к округу, видно, как прошлое стало инфраструктурой: где был первый путь, там часто появляется новая дорога и работа. Так история становится полезной, а не декоративной."},{"k":"people","t":"Человеческая нить. В таких местах человек обычно виден через инфраструктуру: парковки у магазинов, окна офисов, вывески клиник, школьные поля и грузовые ворота складов. Это не эффектная легенда, зато настоящее содержание места."},{"k":"films","t":"Если смотреть как кино. Для стоянки киношный взгляд полезен: он заставляет увидеть не только место, но и сцену — кто здесь проходит, куда едет, что остаётся за кадром. Это не выдумка о съёмках, а способ смотреть на территорию через киноязык."},{"k":"films","t":"Фильмы и эта земля. Кино любит места, где видно сразу несколько слоёв: старый центр, новый пригород, вода, трасса, небо и обычная жизнь без декораций. Это не выдумка о съёмках, а способ смотреть на территорию через киноязык."},{"k":"road","t":"Пока колёса отдыхают. {ROADLINE} Вокруг дороги быстро появляются склады, заправки, мотели, ремонтные зоны и короткие местные маршруты — водитель видит этот слой раньше туриста. На паузе это особенно заметно: всё вокруг словно собрано ради движения."},{"k":"records","t":"Факт с краю карты. Странности хороши тем, что вытаскивают место из серой справки: у округа появляется характер, даже если вокруг обычная парковка и влажный воздух. Главное — не выдумывать рекорд, а брать безопасный масштаб шире."},{"k":"life","t":"Как здесь живут. У таких мест есть свой темп: утром поток к работе, днём сервисы и доставка, вечером магазины и школы, ночью редкие фары и работа трассы. Для стоянки это честный и спокойный материал."},{"k":"history","t":"Историческая нить. Прошлое не обязано быть громким. Иногда достаточно понять, что сегодняшняя развязка стоит на месте старого маршрута, а новый район повторяет старую логику земли. На стоянке этот слой хорошо слушается без спешки."},{"k":"food","t":"О вкусе места. Для водителя еда — часть географии: одно меню говорит, что рядом побережье; другое — что вокруг фермы; третье — что трасса кормит весь район. Хороший дорожный эфир иногда начинается с вопроса: что здесь едят?"},{"k":"life","t":"Повседневная волна. Обычная жизнь не хуже достопримечательности. Она показывает, почему округ растёт, где людям удобно жить и как дорога становится частью каждого дня. Здесь место становится человеческим."},{"k":"native","t":"Коренные земли. До округов, трасс и пригородов эта земля уже имела маршруты, имена, воду, охотничьи места, поселения и память народов, которые знали её не как карту, а как дом. Дорога здесь моложе земли и её памяти."},{"k":"place","t":"Округ в деталях. У этой точки есть несколько слоёв: ближайшее название, округ, погода, дорога и привычные маршруты людей, которые каждый день ездят через {PLACE}. Именно такие детали делают бесплатный эфир живым даже без платного диктора."},{"k":"records","t":"Факт с краю карты. Если открытая карта не даёт громкой достопримечательности, странности можно искать шире: мосты, аэропорты, коллекции, старые вокзалы, природные явления и редкие местные привычки. Главное — не выдумывать рекорд, а брать безопасный масштаб шире."},{"k":"people","t":"Имена и дела. Обычная жизнь вокруг стоянки часто интереснее буклета: смены на складах, школьные автобусы, местные рынки, ремонтные боксы и короткие поездки между районами. Для долгой остановки такая человеческая нить важнее очередной сухой справки."},{"k":"economy","t":"Чем место живёт. Если смотреть с дороги, экономика места выглядит не как график, а как набор ворот, вывесок, разгрузок, стоянок и людей, которые держат эту систему каждый день. Поэтому рабочий слой — один из самых честных в бесплатном эфире."},{"k":"place","t":"О месте. Здесь важно не искать одну открытку. Интерес появляется в связке: {WATER}, {LAND}, ближайшие районы и путь к большому городу. Именно такие детали делают бесплатный эфир живым даже без платного диктора."},{"k":"oddity","t":"Странная деталь. Для длинной стоянки маленькие странности спасают эфир от учебника: карта вдруг становится характером, а не таблицей. Маленькая странность иногда лучше большой лекции."},{"k":"mystery","t":"Странная история. Загадочный эфир лучше держать честно: не выдавать легенду за факт, но признавать, что люди часто объясняют пустые места историями. Главное — держать границу между байкой и фактом."},{"k":"economy","t":"Что держит район. Пригородный рост меняет округ тихо: бывшие поля становятся кварталами, старые дороги получают новые съезды, а рядом появляются сервисы для людей и грузов. Для Road Radio такая тема почти родная: экономика часто начинается у съезда."},{"k":"oddity","t":"Необычный угол. Дорога хорошо ловит странные детали: неожиданный мост, большой ангар, смешную вывеску, старый мотель, необычную коллекцию или район, выросший слишком быстро. Маленькая странность иногда лучше большой лекции."},{"k":"road","t":"О том, что держит путь. Если позже маршрут продолжится тем же курсом, окружающая территория будет меняться не скачком, а полосами: вода, жильё, сервисы, открытая земля, снова городские огни. Так дорога становится не фоном, а главным объяснением места."},{"k":"literature","t":"Страница рядом. У дороги есть своя литература: маленькие города, ночные стоянки, влажный воздух, реки, окраины, люди между большим городом и тихим районом. Это хороший режим для ночи, когда факты должны звучать мягче."},{"k":"food","t":"После дороги — к еде. Даже без конкретного ресторана можно услышать вкус территории: климат, миграции, старые фермы, придоро
