на из самых человеческих тем."},{"k":"food","t":"О вкусе места. Если рядом есть вода, фермы или порт, кухня обычно это помнит: рыба, цитрусы, овощи, копчёности, специи или простые блюда для людей в пути. Хороший дорожный эфир иногда начинается с вопроса: что здесь едят?"},{"k":"records","t":"Достижение без фанфар. Для дороги интересны не только официальные рекорды, но и придорожные чудеса: странная вывеска, старый ангар, большой мост, необычный поворот истории. Так бесплатный диктор не засыпает в общих словах."},{"k":"food","t":"Кухня и климат. В {REGION} вкус часто связан с {WATER}, жарой, длинными поездками и привычкой есть просто, быстро, но с местным оттенком. Так место становится ощутимым не только глазами, но и вкусом."},{"k":"life","t":"Повседневная волна. У таких мест есть свой темп: утром поток к работе, днём сервисы и доставка, вечером магазины и школы, ночью редкие фары и работа трассы. Обычная жизнь — тоже история, просто без фанфар."},{"k":"history","t":"Старая карта. Если поднять взгляд от стоянки к округу, видно, как прошлое стало инфраструктурой: где был первый путь, там часто появляется новая дорога и работа. Даже без конкретной даты становится понятно, почему место выросло именно здесь."},{"k":"road","t":"О дороге. Когда машина стоит, трасса всё равно остаётся частью эфира: она объясняет, почему рядом есть эти кварталы, эти магазины и этот темп округа. У дороги есть память, даже когда мотор молчит."},{"k":"music","t":"Музыка вокруг карты. Звук региона меняется вместе с дорогой: один округ даёт церковное пение, другой — рок у бара, третий — латиноамериканский ритм у рынка. Иногда место запоминается именно звуком, а не видом."},{"k":"films","t":"Кино и экран. Экран часто выбирает не знаменитый вид, а удобную правду: аэропорт, склад, старую улицу, придорожный мотель или район, где жизнь выглядит без грима. Дорога сама по себе уже готовая сцена."},{"k":"native","t":"Память первых народов. Названия округов и рек иногда сохраняют то, что менялось вокруг: язык, племена, союзы, конфликты, переселения и попытки удержать связь с землёй. Уважительный масштаб лучше, чем случайная конкретика без источника."},{"k":"land","t":"Рельеф и почва. В такой местности дорога словно идёт по старому договору с землёй: обходит низины, использует сухие гряды и тянется туда, где проще держать поток. Это не громкая история, но она держит всю карту."},{"k":"music","t":"Звучание места. Дорога хорошо слышит музыку региона: радиостанции, старые клубы, церковные хоры, кантри-площадки, латиноамериканские ритмы или блюзовые следы. Так музыка становится способом слышать карту, а не просто темой из списка."},{"k":"news","t":"Хроника округа. Местные новости чаще всего рождаются из простых вещей: погода, трафик, школы, строительство, вода, спорт, аэропорт, решения властей и жизнь районов. Главное — не пересказывать лишнего без источника."},{"k":"crafts","t":"Ремесло рядом. Ремесло почти всегда начинается с того, что даёт место: дерево, глина, металл, ткань, вода, фермы, старые склады или люди, которые умеют чинить и делать. Так бесплатный эфир получает осязаемость."},{"k":"crafts","t":"Материалы места. Материалы региона часто диктуют работу: влажность меняет древесину, песчаная почва влияет на строительство, вода требует лодок, а дорога — ремонта и металла. Это тихая, но крепкая тема для долгой стоянки."},{"k":"sports","t":"Игры и дороги. Если открытые источники дают команду или атлета, эфир берёт их; если нет — смотрит шире на спортивную культуру региона и то, как она связана с дорогами и водой. Так тема получает движение, даже когда машина стоит."},{"k":"history","t":"Из старой истории. Если поднять взгляд от стоянки к округу, видно, как прошлое стало инфраструктурой: где был первый путь, там часто появляется новая дорога и работа. Даже без конкретной даты становится понятно, почему место выросло именно здесь."},{"k":"crafts","t":"Что делают руками. Материалы региона часто диктуют работу: влажность меняет древесину, песчаная почва влияет на строительство, вода требует лодок, а дорога — ремонта и металла. Так бесплатный эфир получает осязаемость."},{"k":"crafts","t":"Ремесло рядом. Ремесленная нить помогает услышать округ не как набор названий, а как рабочее место, где всё сделано чьими-то руками. Руки часто рассказывают о месте честнее вывески."},{"k":"sky","t":"Погодное небо. Если сейчас светло, детали вокруг становятся резче; если темнеет, место уходит в звук: шины, ветер, редкие птицы, далёкий двигатель. Для бесплатного эфира это один из самых честных источников."},{"k":"records","t":"Необычная отметка. У каждого округа есть свои маленькие рекорды: кто-то первым построил школу, где-то дольше держалась старая ферма, где-то появился необычный парк или музей. Главное — не выдумывать рекорд, а брать безопасный масштаб шире."},{"k":"place","t":"Местность вокруг. {PLACE} лучше слушать не как одну вывеску, а как узел: рядом идут {ROADPART}, живёт {COUNTY}, а за обычными кварталами чувствуется {CORRIDOR}. Именно такие детали делают бесплатный эфир живым даже без платного диктора."},{"k":"weather","t":"Небо сейчас. {WEATHER} В таких условиях место слышится иначе: тише в жару, резче перед грозой, мягче после дождя и просторнее при лёгком ветре. Так погода становится частью рассказа, а не отдельной строкой на экране."},{"k":"native","t":"Коренные земли. Названия округов и рек иногда сохраняют то, что менялось вокруг: язык, племена, союзы, конфликты, переселения и попытки удержать связь с землёй. Дорога здесь моложе земли и её памяти."},{"k":"news","t":"Что попадает в новости. Даже один заголовок может показать, чем живёт место сегодня. Но без статьи лучше не фантазировать — достаточно назвать тему и связать её с территорией. Для долгой стоянки такие вставки дают ощущение настоящего времени."},{"k":"place","t":"Рядом с этой стоянкой. {PLACE} лучше слушать не как одну вывеску, а как узел: рядом идут {ROADPART}, живёт {COUNTY}, а за обычными кварталами чувствуется {CORRIDOR}. Именно такие детали делают бесплатный эфир живым даже без платного диктора."},{"k":"records","t":"Рекорды и странности. Если открытая карта не даёт громкой достопримечательности, странности можно искать шире: мосты, аэропорты, коллекции, старые вокзалы, природные явления и редкие местные привычки. Главное — не выдумывать рекорд, а брать безопасный масштаб шире."},{"k":"native","t":"До современных дорог. Коренная история не должна звучать как формальность. Она объясняет старые названия, тропы у воды, места сбора, торговые пути и то, почему некоторые земли остаются особенными. Дорога здесь моложе земли и её памяти."},{"k":"road","t":"Линия маршрута. Большая дорога всегда меняет маленькие места: сначала появляется поток, потом сервисы, потом склады, потом новые районы и уже потом — новая повседневность. У дороги есть память, даже когда мотор молчит."},{"k":"films","t":"Экранная нитка. Если слушатель любит фильмы, бесплатный эфир может уходить от точки к региону: какие пейзажи здесь снимают, какие дороги выглядят кинематографично и почему. Когда фактов мало, такой ракурс держит эфир без фальши."},{"k":"oddity","t":"Факт с улыбкой. Дорога хорошо ловит странные детали: неожиданный мост, большой ангар, смешную вывеску, старый мотель, необычную коллекцию или район, выросший слишком быстро. Дорога любит места, которые слегка подмигивают."},{"k":"sports","t":"Спортивная нить. Спорт в округах часто живёт не только на больших аренах: школьные поля, бейсбольные площадки, рыбалка, гонки, беговые клубы и водные тренировки держат местную энергию. Местная игра часто показывает район лучше официальной справки."},{"k":"weather","t":"Погода у точки. {WEATHER} На стоянке это не справочная строка: воздух меняет темп, звук дороги, ощущение кабины и даже то, как воспринимается ближайшая вода. Для стоянки иногда именно это и есть главный факт минуты."},{"k":"native","t":"Глубокий слой карты. Этот слой лучше слушать спокойно: не как музейную вставку, а как напоминание, что современная стоянка стоит на земле с гораздо более длинной историей. Так карта получает глубину, а не только современные дороги."},{"k":"people","t":"Повседневная карта. Обычная жизнь вокруг стоянки часто интереснее буклета: смены на складах, школьные автобусы, местные рынки, ремонтные боксы и короткие поездки между районами. Это не эффектная легенда, зато настоящее содержание места."},{"k":"weather","t":"Воздух вокруг. {WEATHER} Пока машина стоит, именно погода делает точку реальной: не название, а температура, ветер, свет и влажность вокруг. Хорошее дорожное радио не отделяет факты от воздуха вокруг."},{"k":"sports","t":"Спортивная нить. Для дорожного эфира спорт хорош тем, что показывает выходной день: куда едут семьи, где собираются подростки, где шумят трибуны и какие места становятся центром района. Для длинной паузы спорт добавляет человеческий шум без выдумки."},{"k":"land","t":"О земле. В такой местности дорога словно идёт по старому договору с землёй: обходит низины, использует сухие гряды и тянется туда, где проще держать поток. Так место становится понятнее без единой платной генерации."},{"k":"music","t":"Сцена и дорога. Звук региона меняется вместе с дорогой: один округ даёт церковное пение, другой — рок у бара, третий — латиноамериканский ритм у рынка. Так музыка становится способом слышать карту, а не просто темой из списка."},{"k":"records","t":"Факт с краю карты. Такие факты лучше звучат коротко: что выделяется, почему это редкость, как оно связано с местом и что водитель может представить прямо сейчас. Главное — не выдумывать рекорд, а брать безопасный масштаб шире."},{"k":"weather","t":"Воздух вокруг. {WEATHER} На стоянке это не справочная строка: воздух меняет темп, звук дороги, ощущение кабины и даже то, как воспринимается ближайшая вода. Это короткая, но полезная нить перед следующей историей."},{"k":"oddity","t":"Маленькая причуда. У округа почти всегда есть маленькая причуда, которую не заметишь в общей статье: редкий парк, странное название, забытый объект, непривычная кухня или местная байка. Маленькая странность иногда лучше большой лекции."},{"k":"road","t":"Линия маршрута. Старые дороги часто остаются в форме кварталов и мостов. Новые трассы добавляют к ним логистику, пригородный рост и быстрые короткие поездки. Для Road Radio это честная тема: место читается через поток."},{"k":"native","t":"До современных дорог. Если точных местных данных мало, безопаснее говорить шире: о регионе, воде, сезонных маршрутах и уважении к народам, которые жили здесь до современных границ. Это важный слой бесплатного эфира, если говорить аккуратно и без выдуманных деталей."},{"k":"history","t":"До сегодняшних дорог. Водитель слышит историю иначе: не через музейную витрину, а через мосты, насыпь, старую центральную улицу и внезапно сохранившееся название района. Это прошлое не уводит от дороги, а объясняет её."},{"k":"native","t":"История старше округа. Многие американские дороги проходят поверх гораздо более старых путей. Под асфальтом часто лежит память о тропах, реках, переходах и местах, где люди останавливались веками. Дорога здесь моложе земли и её памяти."},{"k":"life","t":"Обычный день округа. Если слушать место дольше пяти минут, начинают проявляться бытовые детали: погода, шум, соседние названия, машины, вывески, привычные маршруты. Для стоянки это честный и спокойный материал."},{"k":"mystery","t":"Карта подмигнула. Иногда загадка — это не привидение, а исчезнувшая дорога, закрытый мост, старый ангар или район, который вырос поверх другой истории. Главное — держать границу между байкой и фактом."},{"k":"people","t":"Кто держит округ. Если говорить о людях честно, не нужно придумывать героев. Достаточно увидеть, как округ каждый день собирается из работы, дороги, еды, медицины и жилья. Так радио остаётся рядом с человеком, а не только с картой."},{"k":"literature","t":"Литературная нить. Долгая стоянка похожа на главу без спешки: сначала погода, потом местные названия, потом люди, потом большая тема, к которой относится этот край. Так бесплатное радио остаётся живым даже после всех местных справок."},{"k":"land","t":"О земле. Открытая земля, лесные пятна и низины складываются в маршрутный рисунок, который водитель чувствует ещё до того, как увидит название города. Это не громкая история, но она держит всю карту."},{"k":"crafts","t":"Работа руками. Ремесло почти всегда начинается с того, что даёт место: дерево, глина, металл, ткань, вода, фермы, старые склады или люди, которые умеют чинить и делать. Дорога уважает тех, кто умеет чинить и делать."},{"k":"weather","t":"Погода у точки. {WEATHER} Такая погода сразу объясняет часть территории: где нужна тень, почему земля быстро мокнет или сохнет, и как водители чувствуют место без карты. Для стоянки иногда именно это и есть главный факт минуты."},{"k":"history","t":"Из старой истории. Если поднять взгляд от стоянки к округу, видно, как прошлое стало инфраструктурой: где был первый путь, там часто появляется новая дорога и работа. Это прошлое не уводит от дороги, а объясняет её."},{"k":"water","t":"Берега вокруг. Для водителя вода видна не только как озеро. Она прячется в кюветах, под мостами, в мокрой земле после грозы и в том, как быстро меняется воздух у кабины. Для дальнобойщика это не романтика, а практическая география вокруг колёс."},{"k":"people","t":"Люди вокруг дороги. Обычная жизнь вокруг стоянки часто интереснее буклета: смены на складах, школьные автобусы, местные рынки, ремонтные боксы и короткие поездки между районами. Для долгой остановки такая человеческая нить важнее очередной сухой справки."},{"k":"sports","t":"От стоянки — к игре. Спорт объясняет округ через привычки: кто встаёт рано на рыбалку, кто едет на игру, кто тренируется после смены и где город собирается в выходные. Так тема получает движение, даже когда машина стоит."},{"k":"literature","t":"Книги и дорога. У дороги есть своя литература: маленькие города, ночные стоянки, влажный воздух, реки, окраины, люди между большим городом и тихим районом. Это хороший режим для ночи, когда факты должны звучать мягче."},{"k":"oddity","t":"Дорожная диковина. Если источники молчат, можно искать странность в самой географии: почему дорога делает изгиб, почему район вырос у воды, почему аэропорт стоит именно здесь. Вот за такие углы дорожное радио и цепляется."},{"k":"land","t":"О земле. Открытая земля, лесные пятна и низины складываются в маршрутный рисунок, который водитель чувствует ещё до того, как увидит название города. На длинной стоянке такие детали начинают работать лучше экскурсионной суеты."},{"k":"records","t":"Достижение без фанфар. Если открытая карта не даёт громкой достопримечательности, странности можно искать шире: мосты, аэропорты, коллекции, старые вокзалы, природные явления и редкие местные привычки. Так бесплатный диктор не засыпает в общих словах."},{"k":"place","t":"Рядом с этой стоянкой. {PLACE} лучше слушать не как одну вывеску, а как узел: рядом идут {ROADPART}, живёт {COUNTY}, а за обычными кварталами чувствуется {CORRIDOR}. Так появляется нормальное чувство места, а не сухая строка из справочника."},{"k":"oddity","t":"Странная деталь. У округа почти всегда есть маленькая причуда, которую не заметишь в общей статье: редкий парк, странное название, забытый объект, непривычная кухня или местная байка. Маленькая странность иногда лучше большой лекции."},{"k":"mystery","t":"Местная легенда. Для долгой стоянки тайна работает мягко: не пугать, а показать, как обычный округ хранит странные рассказы на краях своей официальной карты. Так эфир получает ночной поворот без дешёвой мистики."},{"k":"sports","t":"Спорт вокруг. Даже тихая стоянка может стоять рядом с местом, где через час начнётся игра, тренировка, турнир или обычная школьная жизнь. Для длинной паузы спорт добавляет человеческий шум без выдумки."},{"k":"water","t":"После дождя это особенно заметно. В {REGION} вода редко бывает декорацией: {WATER} определяют, где стоят дома, как идут дороги и почему часть земли остаётся зелёной. Поэтому разговор о воде — это разговор о том, как вообще держится эта местность."},{"k":"crafts","t":"Материалы места. Материалы региона часто диктуют работу: влажность меняет древесину, песчаная почва влияет на строительство, вода требует лодок, а дорога — ремонта и металла. Руки часто рассказывают о месте честнее вывески."},{"k":"life","t":"Между домом и дорогой. Пригородный район часто кажется одинаковым только на скорости. На стоянке видно больше: где люди гуляют, где стоит сервис, где начинается новый квартал. Так эфир держится рядом с настоящим днём, а не только с прошлым."},{"k":"sports","t":"Спорт вокруг. Спорт объясняет округ через привычки: кто встаёт рано на рыбалку, кто едет на игру, кто тренируется после смены и где город собирается в выходные. Так тема получает движение, даже когда машина стоит."},{"k":"water","t":"Водная сторона. Вода объясняет карту лучше, чем кажется: она притягивает старые маршруты, парки, рыбалку, мосты, дренаж и целые районы у берега. На стоянке это слышится медленно: влажность, птицы, ливни и плоская земля рядом."},{"k":"wildlife","t":"О птицах и зверях. Для {REGION} характерны {NATURE}. Даже у дороги эта природа не исчезает: она держится у воды, в канавах, лесных пятнах и тихих зелёных коридорах. У дороги тоже есть экология, просто она не всегда выглядит как заповедник."},{"k":"records","t":"Достижение без фанфар. Рекорд не всегда выглядит как огромная табличка. Иногда это самый старый объект округа, редкая птица, необычный музей, быстрый рост района или первая для штата дорога. У каждой карты есть свои странные углы."},{"k":"records","t":"Факт с краю карты. У каждого округа есть свои маленькие рекорды: кто-то первым построил школу, где-то дольше держалась старая ферма, где-то появился необычный парк или музей. У каждой карты есть свои странные углы."},{"k":"land","t":"Рельеф и почва. В {REGION} земля читается через {LAND}. Именно это решает, где задерживается вода, где строят дороги и почему одни участки растут быстрее других. На длинной стоянке такие детали начинают работать лучше экскурсионной суеты."},{"k":"water","t":"Река и низины. Для водителя вода видна не только как озеро. Она прячется в кюветах, под мостами, в мокрой земле после грозы и в том, как быстро меняется воздух у кабины. Поэтому разговор о воде — это разговор о том, как вообще держится эта местность."},{"k":"weather","t":"Ветер и свет. {WEATHER} Такая погода сразу объясняет часть территории: где нужна тень, почему земля быстро мокнет или сохнет, и как водители чувствуют место без карты. Для стоянки иногда именно это и есть главный факт минуты."},{"k":"native","t":"История старше округа. Коренная история не должна звучать как формальность. Она объясняет старые названия, тропы у воды, места сбора, торговые пути и то, почему некоторые земли остаются особенными. Уважительный масштаб лучше, чем случайная конкретика без источника."},{"k":"wildlife","t":"Природа рядом. Для {REGION} характерны {NATURE}. Даже у дороги эта природа не исчезает: она держится у воды, в канавах, лесных пятнах и тихих зелёных коридорах. У дороги тоже есть экология, просто она не всегда выглядит как заповедник."},{"k":"literature","t":"Страница рядом. У дороги есть своя литература: маленькие города, ночные стоянки, влажный воздух, реки, окраины, люди между большим городом и тихим районом. Так бесплатное радио остаётся живым даже после всех местных справок."},{"k":"sports","t":"Игры и дороги. Спорт в округах часто живёт не только на больших аренах: школьные поля, бейсбольные площадки, рыбалка, гонки, беговые клубы и водные тренировки держат местную энергию. Местная игра часто показывает район лучше официальной справки."},{"k":"water","t":"Река и низины. В {REGION} вода редко бывает декорацией: {WATER} определяют, где стоят дома, как идут дороги и почему часть земли остаётся зелёной. На стоянке это слышится медленно: влажность, птицы, ливни и плоская земля рядом."},{"k":"economy","t":"Экономика без витрины. Если смотреть с дороги, экономика места выглядит не как график, а как набор ворот, вывесок, разгрузок, стоянок и людей, которые держат эту систему каждый день. Это не романтика, а реальная география занятости вокруг дороги."},{"k":"literature","t":"Литературная нить. Долгая стоянка похожа на главу без спешки: сначала погода, потом местные названия, потом люди, потом большая тема, к которой относится этот край. Для дальнего водителя такой слой может держать эфир часами."},{"k":"music","t":"Музыка вокруг карты. Дорога хорошо слышит музыку региона: радиостанции, старые клубы, церковные хоры, кантри-площадки, латиноамериканские ритмы или блюзовые следы. Дорога всегда была хорошим радиоприёмником для местной музыки."},{"k":"sports","t":"Местная скорость. Для дорожного эфира спорт хорош тем, что показывает выходной день: куда едут семьи, где собираются подростки, где шумят трибуны и какие места становятся центром района. Для длинной паузы спорт добавляет человеческий шум без выдумки."},{"k":"weather","t":"Небо сейчас. {WEATHER} На стоянке это не справочная строка: воздух меняет темп, звук дороги, ощущение кабины и даже то, как воспринимается ближайшая вода. Так погода становится частью рассказа, а не отдельной строкой на экране."},{"k":"oddity","t":"Карта умеет удивлять. Иногда странность места — не музей, а сочетание вещей: аэропорт рядом с болотом, старый район у новой трассы, огромная парковка возле тихого озера или название, которое пережило прежнюю жизнь. Дорога любит места, которые слегка подмигивают."},{"k":"people","t":"Кто держит округ. {COUNTYLINE} держится не на одной достопримечательности, а на людях, которые каждый день возят детей, чинят машины, принимают грузы, работают в больницах, школах и сервисах. Именно люди превращают географию в место, где кто-то живёт."},{"k":"news","t":"Из местной хроники. Местные новости чаще всего рождаются из простых вещей: погода, трафик, школы, строительство, вода, спорт, аэропорт, решения властей и жизнь районов. Местная хроника хорошо связывает карту с сегодняшним днём."},{"k":"films","t":"Экранная нитка. Даже если конкретная съёмка проходила в другом городе, визуальный язык региона узнаётся: свет, влажность, низкая земля, дорожные сервисы и большие парковки. Когда фактов мало, такой ракурс держит эфир без фальши."},{"k":"music","t":"Ритм округа. Места у трасс часто собирают музыку практично: где есть бар, фестиваль, школьное поле или городская площадь, там появляется своя сцена. Для спокойного эфира это мягкая смена угла без выдуманных фактов."},{"k":"wildlife","t":"О птицах и зверях. Если смотреть шире, дорога проходит не через пустоту, а через живой коридор: деревья, вода, насекомые, птицы и сезонная миграция рядом. Для спокойного эфира этого уже достаточно: место становится живым."},{"k":"weather","t":"Небо сейчас. {WEATHER} Для дальнего маршрута это маленький прогноз настроения: будет ли дорога казаться тяжёлой, влажной, спокойной или открытой. Так погода становится частью рассказа, а не отдельной строкой на экране."},{"k":"road","t":"Трасса рядом. {ROADLINE} Вокруг дороги быстро появляются склады, заправки, мотели, ремонтные зоны и короткие местные маршруты — водитель видит этот слой раньше туриста. У дороги есть память, даже когда мотор молчит."},{"k":"literature","t":"Если слушать как рассказ. Писатели часто замечают то, что водитель понимает сразу: как город начинается с заправки, как небо меняется после дождя и как дорога делает место временным домом. Так бесплатное радио остаётся живым даже после всех местных справок."},{"k":"oddity","t":"Странная деталь. Дорога хорошо ловит странные детали: неожиданный мост, большой ангар, смешную вывеску, старый мотель, необычную коллекцию или район, выросший слишком быстро. Вот за такие углы дорожное радио и цепляется."},{"k":"music","t":"Музыкальная нить. Звук региона меняется вместе с дорогой: один округ даёт церковное пение, другой — рок у бара, третий — латиноамериканский ритм у рынка. Дорога всегда была хорошим радиоприёмником для местной музыки."},{"k":"water","t":"Берега вокруг. Для водителя вода видна не только как озеро. Она прячется в кюветах, под мостами, в мокрой земле после грозы и в том, как быстро меняется воздух у кабины. Такой факт не кричит, но он объясняет половину карты."},{"k":"sky","t":"Смотрим выше карты. На стоянке небо становится частью отдыха: оно задаёт темп, помогает понять время и напоминает, что карта — это не только дороги, но и воздух над ними. Для бесплатного эфира это один из самых честных источников."},{"k":"economy","t":"Экономика без витрины. У каждого дорожного места есть бытовая экономика: где водитель заправился, где местный житель купил продукты, где курьер забрал груз и где мастер открыл бокс. Поэтому рабочий слой — один из самых честных в бесплатном эфире."},{"k":"sky","t":"Небо над точкой. Небо меняет дорогу быстрее, чем кажется: облака, свет, влажность, грозовые фронты и вечерняя тень способны превратить тот же самый съезд в другое место. Так обычная погода превращается в часть истории места."},{"k":"native","t":"До шоссе. До округов, трасс и пригородов эта земля уже имела маршруты, имена, воду, охотничьи места, поселения и память народов, которые знали её не как карту, а как дом. Уважительный масштаб лучше, чем случайная конкретика без источника."},{"k":"land","t":"Как устроена местность. Почва и высота часто объясняют больше, чем рекламные щиты: где ставят склады, где оставляют парк, где после дождя вода стоит дольше всего. Это не громкая история, но она держит всю карту."},{"k":"weather","t":"Климатическая пауза. {WEATHER} Такая погода сразу объясняет часть территории: где нужна тень, почему земля быстро мокнет или сохнет, и как водители чувствуют место без карты. Для стоянки иногда именно это и есть главный факт минуты."},{"k":"films","t":"Экранная нитка. Экран часто выбирает не знаменитый вид, а удобную правду: аэропорт, склад, старую улицу, придорожный мотель или район, где жизнь выглядит без грима. Когда фактов мало, такой ракурс держит эфир без фальши."},{"k":"native","t":"До современных дорог. Названия округов и рек иногда сохраняют то, что менялось вокруг: язык, племена, союзы, конфликты, переселения и попытки удержать связь с землёй. Это важный слой бесплатного эфира, если говорить аккуратно и без выдуманных деталей."},{"k":"wildlife","t":"О птицах и зверях. Для {REGION} характерны {NATURE}. Даже у дороги эта природа не исчезает: она держится у воды, в канавах, лесных пятнах и тихих зелёных коридорах. Такая история не требует громкого открытия — достаточно внимательно посмотреть вокруг."},{"k":"sky","t":"Погодное небо. На стоянке небо становится частью отдыха: оно задаёт темп, помогает понять время и напоминает, что карта — это не только дороги, но и воздух над ними. Для бесплатного эфира это один из самых честных источников."},{"k":"place","t":"Рядом с этой стоянкой. Здесь важно не искать одну открытку. Интерес появляется в связке: {WATER}, {LAND}, ближайшие районы и путь к большому городу. Так появляется нормальное чувство места, а не сухая строка из справочника."},{"k":"economy","t":"Работа вокруг стоянки. Если смотреть с дороги, экономика места выглядит не как график, а как набор ворот, вывесок, разгрузок, стоянок и людей, которые держат эту систему каждый день. Для Road Radio такая тема почти родная: экономика часто начинается у съезда."},{"k":"people","t":"О людях. Если говорить о людях честно, не нужно придумывать героев. Достаточно увидеть, как округ каждый день собирается из работы, дороги, еды, медицины и жилья. Именно люди превращают географию в место, где кто-то живёт."},{"k":"sky","t":"Погодное небо. Небо меняет дорогу быстрее, чем кажется: облака, свет, влажность, грозовые фронты и вечерняя тень способны превратить тот же самый съезд в другое место. Для бесплатного эфира это один из самых честных источников."},{"k":"land","t":"Рельеф и почва. Открытая земля, лесные пятна и низины складываются в маршрутный рисунок, который водитель чувствует ещё до того, как увидит название города. Земля обычно молчит, но именно она расставляет остальные факты."},{"k":"land","t":"География без витрины. В такой местности дорога словно идёт по старому договору с землёй: обходит низины, использует сухие гряды и тянется туда, где проще держать поток. Это не громкая история, но она держит всю карту."},{"k":"place","t":"Местность вокруг. Здесь важно не искать одну открытку. Интерес появляется в связке: {WATER}, {LAND}, ближайшие районы и путь к большому городу. Именно такие детали делают бесплатный эфир живым даже без платного диктора."},{"k":"oddity","t":"Маленькая причуда. Если источники молчат, можно искать странность в самой географии: почему дорога делает изгиб, почему район вырос у воды, почему аэропорт стоит именно здесь. Маленькая странность иногда лучше большой лекции."},{"k":"literature","t":"Страница рядом. У дороги есть своя литература: маленькие города, ночные стоянки, влажный воздух, реки, окраины, люди между большим городом и тихим районом. Книга здесь становится не отвлечением, а продолжением территории."},{"k":"films","t":"Кадр у дороги. Такие территории часто попадают на экран не как открытка, а как настоящая Америка: пригороды, мокрый асфальт, аэропорты, старые фасады, парковки и длинные дороги между районами. Дорога сама по себе уже готовая сцена."},{"k":"wildlife","t":"О птицах и зверях. Для {REGION} характерны {NATURE}. Даже у дороги эта природа не исчезает: она держится у воды, в канавах, лесных пятнах и тихих зелёных коридорах. Это хороший бесплатный слой, потому что он связан с территорией напрямую."},{"k":"crafts","t":"Что делают руками. В дорожных округах ручная работа видна в мастерских, ремонтных боксах, рынках, ярмарках, гаражах, маленьких производствах и семейных делах. Так бесплатный эфир получает осязаемость."},{"k":"wildlife","t":"Живой мир вокруг. Если смотреть шире, дорога проходит не через пустоту, а через живой коридор: деревья, вода, насекомые, птицы и сезонная миграция рядом. У дороги тоже есть экология, просто она не всегда выглядит как заповедник."},{"k":"sky","t":"Облака и свет. Небо меняет дорогу быстрее, чем кажется: облака, свет, влажность, грозовые фронты и вечерняя тень способны превратить тот же самый съезд в другое место. Иногда небо рассказывает больше, чем указатель."},{"k":"wildlife","t":"О птицах и зверях. Даже обычный придорожный зелёный участок работает как маленький мост между городом и дикой территорией округа. У дороги тоже есть экология, просто она не всегда выглядит как заповедник."},{"k":"films","t":"Фильмы и эта земля. Кино любит места, где видно сразу несколько слоёв: старый центр, новый пригород, вода, трасса, небо и обычная жизнь без декораций. Дорога сама по себе уже готовая сцена."},{"k":"crafts","t":"Работа руками. В дорожных округах ручная работа видна в мастерских, ремонтных боксах, рынках, ярмарках, гаражах, маленьких производствах и семейных делах. Так бесплатный эфир получает осязаемость."},{"k":"records","t":"Достижение без фанфар. Такие факты лучше звучат коротко: что выделяется, почему это редкость, как оно связано с местом и что водитель может представить прямо сейчас. Это как дорожная специя: немного — и эфир просыпается."},{"k":"economy","t":"Рабочий округ. У каждого дорожного места есть бытовая экономика: где водитель заправился, где местный житель купил продукты, где курьер забрал груз и где мастер открыл бокс. Для Road Radio такая тема почти родная: экономика часто начинается у съезда."},{"k":"native","t":"Глубокий слой карты. Коренная история не должна звучать как формальность. Она объясняет старые названия, тропы у воды, места сбора, торговые пути и то, почему некоторые земли остаются особенными. Это важный слой бесплатного эфира, если говорить аккуратно и без выдуманных деталей."},{"k":"history","t":"О времени до нас. До современных съездов и районов здесь почти всегда были более старые причины: вода, земля, торговый путь, ферма, пристань, железная дорога или административный центр округа. Это прошлое не уводит от дороги, а объясняет её."},{"k":"people","t":"Повседневная карта. Округ становится понятным, когда смотришь не только на историю, но и на тех, кто сегодня делает его обычным, рабочим, живым местом. Это не эффектная легенда, зато настоящее содержание места."},{"k":"music","t":"Музыкальная нить. Места у трасс часто собирают музыку практично: где есть бар, фестиваль, школьное поле или городская площадь, там появляется своя сцена. Дорога всегда была хорошим радиоприёмником для местной музыки."},{"k":"news","t":"Хроника округа. Если свежих заголовков нет, хронику можно расширить до типичных тем округа: погода, транспорт, школьные события, рост жилья, природные зоны и решения по инфраструктуре. Для долгой стоянки такие вставки дают ощущение настоящего времени."},{"k":"land","t":"География без витрины. В такой местности дорога словно идёт по старому договору с землёй: обходит низины, использует сухие гряды и тянется туда, где проще держать поток. Так место становится понятнее без единой платной генерации."},{"k":"land","t":"Под ногами. Ландшафт кажется спокойным только на первый взгляд. На самом деле он постоянно диктует, где жить, где работать, где строить и где лучше не спешить. Земля обычно молчит, но именно она расставляет остальные факты."},{"k":"native","t":"Память первых народов. Этот слой лучше слушать спокойно: не как музейную вставку, а как напоминание, что современная стоянка стоит на земле с гораздо более длинной историей. Так карта получает глубину, а не только современные дороги."},{"k":"literature","t":"Место в тексте. У дороги есть своя литература: маленькие города, ночные стоянки, влажный воздух, реки, окраины, люди между большим городом и тихим районом. Так бесплатное радио остаётся живым даже после всех местных справок."},{"k":"water","t":"О воде. Вода объясняет карту лучше, чем кажется: она притягивает старые маршруты, парки, рыбалку, мосты, дренаж и целые районы у берега. Поэтому разговор о воде — это разговор о том, как вообще держится эта местность."},{"k":"native","t":"Глубокий слой карты. Названия округов и рек иногда сохраняют то, что менялось вокруг: язык, племена, союзы, конфликты, переселения и попытки удержать связь с землёй. Дорога здесь моложе земли и её памяти."},{"k":"food","t":"После дороги — к еде. Дорожная еда — не только фастфуд. Это рынки, сезонные фрукты, рыба, барбекю, пекарни, закусочные у съездов и блюда, которые держатся за региональную привычку. Еда быстро возвращает карту к живым людям."},{"k":"news","t":"Что попадает в новости. Если свежих заголовков нет, хронику можно расширить до типичных тем округа: погода, транспорт, школьные события, рост жилья, природные зоны и решения по инфраструктуре. Для долгой стоянки такие вставки дают ощущение настоящего времени."}];

    history:["Старая карта. До современных районов здесь были вода, земля, маршруты, фермы, пристани, железная дорога или административный центр. Поэтому прошлое лучше слышно через дороги и названия, чем через сухие даты.","Исторический слой. {COUNTY} читается через старые маршруты, воду, первые поселения и транспорт. Когда появляются мосты, станции и дороги, вокруг них постепенно собирается городская жизнь."],

    food:["О вкусе места. В {REGION} еда часто идёт за водой, дорогой и сезонностью: фрукты, рыба, барбекю, закусочные у съездов, рынки и кухни тех, кто переехал сюда из других мест.","Еда у дороги. По закусочным и рынкам район слышно не хуже, чем по карте: что здесь растёт, кто сюда приехал, где идут рабочие смены и куда заезжают водители."],

  // ==== DISTANCE-QUESTION INTERCEPTOR ====
  // Questions about distance / how far / what's ahead never reach the model — otherwise it
  // "honestly" explains it has no map. Code answers warmly instead, with zero meta-talk.
  const isDistanceQuestion=q=>{
    if(!q)return false;
    const s=q.toLowerCase();
    // ru + en triggers for distance / travel-time / what's-ahead
    return /скольк\w*\s+(ещё|еще|до|ехать|идти|км|килом|мил|минут|час)|как\s+(далеко|долго)|далеко ли|сколько\s+мил|через сколько|доехать|дойти|добрать|путь\s+до|расстоян\w+\s+до|что\s+(там\s+)?(впереди|дальше)|что\s+ждёт\s+впереди|how\s+(far|long)|how\s+many\s+(miles|minutes|km)|distance\s+to|what'?s\s+ahead|miles\s+to/.test(s);
  };
  const distanceAnswer=()=>{
    const isRu=langRef.current==="ru";
    const city=(locDataRef.current&&locDataRef.current.city)||(isRu?"этих краях":"this area");
    const ruSet=[
      `О, тут я вам не помощник по цифрам — расстояния не моя стихия. Зато про само это место, про ${city} и его округу, расскажу с удовольствием. Что вам интереснее — люди, история или природа этих мест?`,
      `За точными милями — это не ко мне, я по другой части. А вот чем живёт ${city} и что тут вокруг любопытного — это я вам с радостью. О чём рассказать?`,
      `Цифры да версты оставим навигатору. Моё дело — истории этих мест. Хотите, расскажу что-нибудь стоящее про ${city}?`,
    ];
    const enSet=[
      `Ah, I'm no good with the numbers — distances aren't my thing. But the place itself, ${city} and all around it, that I'll gladly tell you about. People, history, or nature — what sounds good?`,
      `Exact miles aren't my department. What's worth knowing about ${city} and these parts, though — that I've got plenty of. What would you like to hear?`,
      `Leave the mileage to the navigator. Stories about this place are my job. Want a good one about ${city}?`,
    ];
    const set=isRu?ruSet:enSet;
    return set[Math.floor(Math.random()*set.length)];
  };
  // Single entry point: intercept distance questions, otherwise ask the model.
  const answerQuestion=async q=>{
    if(isDistanceQuestion(q))return{story:distanceAnswer()};
    return await callClaude(buildSys(true,q,false),q,false);
  };

  const finishCall=()=>{   // user pressed "I'm done"
    userDoneRef.current=true;
    closeCall(callTextRef.current.trim());
  };

  const closeCall=async(spoken)=>{
    try{callRecRef.current&&callRecRef.current.stop();}catch{}
    setCallPhase("closing");callPhaseRef.current="closing";setMicTranscript("");
    const isRu=langRef.current==="ru";
    let answer="";
    if(spoken&&spoken.trim()){
      // This button is ONLY a question about the current place. Answer it; do NOT save as a preference.
      try{
        const res=await answerQuestion(spoken);
        answer=(res&&res.story)?res.story:"";
        qaHistRef.current=[...qaHistRef.current,{q:spoken,a:answer}].slice(-5);
      }catch{}
    }
    setCallMode(false);setCallPhase("idle");callPhaseRef.current="idle";
    // Speak the DJ's answer on air, then resume the show.
    if(answer){
      const g=++loopGenRef.current;
      await speak(answer);
      pausedRef.current=false;setPaused(false);
      if(runRef.current){loopBusyRef.current=false;loopGenRef.current++;const g2=loopGenRef.current;setTimeout(()=>{if(runRef.current&&loopGenRef.current===g2)loopRef.current?.(false,false);},500);}
    }else{
      pausedRef.current=false;setPaused(false);
      if(runRef.current){loopBusyRef.current=false;loopGenRef.current++;const g=loopGenRef.current;setTimeout(()=>{if(runRef.current&&loopGenRef.current===g)loopRef.current?.(false,false);},500);}
    }
  };

  const cancelCall=()=>{
    userDoneRef.current=true;
    try{callRecRef.current&&callRecRef.current.stop();}catch{}
    hardStop();setCallMode(false);setCallPhase("idle");callPhaseRef.current="idle";setMicTranscript("");
    pausedRef.current=false;setPaused(false);
    if(runRef.current){loopBusyRef.current=false;loopGenRef.current++;const g=loopGenRef.current;setTimeout(()=>{if(runRef.current&&loopGenRef.current===g)loopRef.current?.(false,false);},500);}
  };

  const startVoice=()=>{
    hardStop();                              // kill narrator instantly (triple cancel)
    loopGenRef.current++;                     // freeze the running loop generation
    if(loopRef.current?.scheduled)clearTimeout(loopRef.current.scheduled);
    try{
      const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
      if(!SR){setQMode(true);return;}
      const rec=new SR();
      rec.lang=L[lang]?.tts||"en-US";
      rec.continuous=false;rec.interimResults=true;
      rec.onstart=()=>setMicState("listening");
      rec.onresult=e=>{
        const interim=Array.from(e.results).map(r=>r[0].transcript).join("");
        setMicTranscript(interim);
        if(e.results[e.results.length-1].isFinal){
          const q=e.results[e.results.length-1][0].transcript;
          setMicState("processing");setMicTranscript("");
          answerQuestion(q).then(res=>{
            if(res.prefs)addListenerPref(res.prefs);
            setStory(res.story||res);setStatus("ready");startCd(55);
            setMicState("idle");nextRef.current=null;
            const isRu=langRef.current==="ru";
            const back=isRu?" Возвращаемся к дороге.":" Back to the road.";
            loopGenRef.current++;const g=loopGenRef.current;
            speak((res.story||res)+back).then(()=>{
              setTimeout(()=>{if(runRef.current&&!parkedRef.current&&loopGenRef.current===g)loopRef.current?.(false,false);},800);
            });
          }).catch(()=>setMicState("idle"));
        }
      };
      rec.onerror=()=>{setMicState("idle");setMicTranscript("");};
      rec.onend=()=>setMicState(s=>s==="listening"?"idle":s);
      rec.start();
    }catch{setQMode(true);}
  };

  const sendQ=async()=>{
    if(!qText.trim())return;
    hardStop();loopGenRef.current++;
    if(loopRef.current?.scheduled)clearTimeout(loopRef.current.scheduled);
    setQMode(false);setStatus("loading");
    try{
      const res=await answerQuestion(qText);
      if(res.prefs)addListenerPref(res.prefs);
      setStory(res.story||res);setQText("");setStatus("ready");startCd(55);nextRef.current=null;
      const isRu=langRef.current==="ru";
      const back=isRu?" ... Возвращаемся к дороге.":" ... Back to the road.";
      loopGenRef.current++;const g=loopGenRef.current;
      await speak((res.story||res)+back);
      await new Promise(r=>setTimeout(r,800));
      if(runRef.current&&!parkedRef.current&&loopGenRef.current===g)loopRef.current?.(false,false);else if(!runRef.current)setStatus("idle");
    }catch{setStatus("idle");}
  };

  const saveKey=()=>{
    const k=apiInput.trim();
    if(!k.startsWith("sk-ant")){setErr("Key must start with sk-ant...");return;}
    localStorage.setItem(KEY_STORE,k);setErr("");
    if(!localStorage.getItem("rr_onboarded"))setScreen("onboard");else setScreen("setup");
  };

  const finishOnboard=()=>{localStorage.setItem("rr_onboarded","1");setScreen("setup");};

  const installApp=async()=>{
    if(deferredPrompt){await deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{setDeferredPrompt(null);});}
    else{
      const ua=navigator.userAgent;
      if(/iphone|ipad|ipod/i.test(ua))alert(isRu?"Чтобы вынести значок на экран: нажмите кнопку «Поделиться» внизу Safari → «На экран Домой».":"In Safari: tap Share → Add to Home Screen.");
      else alert(isRu?"Чтобы вынести значок:\nменю браузера (⋮ справа вверху) → «Установить приложение» или «Добавить на главный экран».":"Open browser menu (⋮) → Install app / Add to Home screen.");
    }
    localStorage.setItem("rr_install_ok","1");setShowInstall(false);
  };

  const openTTSSettings=()=>{
    const ua=navigator.userAgent;
    if(/android/i.test(ua)){
      // Try to jump straight to the Text-to-Speech settings page.
      try{window.location.href="intent:#Intent;action=com.android.settings.TTS_SETTINGS;end";}catch{}
      setTimeout(()=>{
        alert(isRu
          ?"Если настройки не открылись сами:\nНастройки телефона → Общие настройки → Преобразование текста в речь (или «Язык и ввод» → «Синтез речи»). Там можно докачать мужские/женские голоса."
          :"If settings didn't open:\nPhone Settings → General management → Text-to-speech output (or Language & input → Text-to-speech). There you can download male/female voices.");
      },1200);
    }
    else{alert(isRu?"iOS: Настройки → Универсальный доступ → Аудиоматериалы → Синтез речи → Голоса":"iOS: Settings → Accessibility → Spoken Content → Voices");}
  };

  const isMain=screen==="main";
  const isRu=lang==="ru";
  const dotCls=!isMain?"off":status==="loading"?"ld":"on";
  const stTxt=!isMain?(isRu?"ГОТОВ":"READY"):status==="loading"?(isRu?"ЗАГРУЗКА":"LOADING"):(isRu?"В ЭФИРЕ":"ON AIR");
  const wBadge=weather?`${getWI(weather.code)} ${weather.temp}°F`:null;
  const bmObj=BCASTS.find(b=>b.id===bcastMode)||BCASTS[0];
  const slogan=isRu?"Ваш живой гид в дороге.":"Your living guide on the road.";
  const hwDisplay=locData.highway&&locData.highway!=="unknown"?`${locData.highway}${locData.state?" · "+locData.state:""}`:locData.state||"";
  const curVoices=voices.filter(v=>v.lang.startsWith((L[lang]?.tts||"en-US").split("-")[0]));
  // Voices for THIS language first, then everything else, so the user always sees something to pick.
  const voiceChoices=(()=>{
    const langPart=(L[lang]?.tts||"en-US").split("-")[0];
    const mine=voices.filter(v=>v.lang.startsWith(langPart));
    const rest=voices.filter(v=>!v.lang.startsWith(langPart));
    return [...mine,...rest];
  })();
  const voiceLabel=v=>{
    const n=(v.name||"").toLowerCase();
    let g="";
    if(/female|женск|woman|girl|samantha|victoria|karen|tessa|moira|fiona|milena|alena|katya|alyona|zira|google.*(female)?/.test(n)&&!/male/.test(n))g=isRu?" ♀ жен.":" ♀ F";
    if(/\bmale\b|мужск|man|david|alex|daniel|fred|yuri|pavel|dmitri/.test(n))g=isRu?" ♂ муж.":" ♂ M";
    const short=v.name.replace(/google /i,"").replace(/microsoft /i,"");
    return `${short}${g} · ${v.lang}`;
  };
  const previewVoice=name=>{
    try{
      const s=window.speechSynthesis;if(!s)return;
      s.cancel();
      const u=new SpeechSynthesisUtterance(isRu?"Здравствуйте, вы на Дорожном Радио. Вот как звучит этот голос.":"Hello, you're on Road Radio. This is how this voice sounds.");
      const v=voices.find(x=>x.name===name);if(v){u.voice=v;u.lang=v.lang;}
      u.rate=voiceRateRef.current||0.92;
      s.speak(u);
    }catch{}
  };

  // ONBOARDING STEPS
  const obSteps=[
    {title:isRu?"Выберите язык":"Choose Language",sub:isRu?"На каком языке рассказывать?":"What language should I speak?",
     items:LK.map(k=>({id:k,icon:L[k].lb,label:L[k].lb,val:lang})),
     onSel:id=>setLang(id),selVal:lang},
    {title:isRu?"Как вы едете?":"How are you traveling?",sub:"",
     items:TRAVEL.map(m=>({id:m.id,icon:m.icon,label:isRu?m.ru:m.en})),
     onSel:id=>setTravelMode(id),selVal:travelMode},
    {title:isRu?"Режим эфира":"Broadcast Mode",sub:"",
     items:BCASTS.map(b=>({id:b.id,icon:b.icon,label:isRu?b.ru:b.en})),
     onSel:id=>setBcastMode(id),selVal:bcastMode},
    {title:isRu?"Установите как приложение":"Install as App",sub:"install",items:[],onSel:()=>{},selVal:""},
  ];
  const curOb=obSteps[obStep]||obSteps[0];

  return(
    <div className="app">
      {splash&&(
        <div className="splash">
          <div className="sp-logo">Road <em>Radio</em></div>
          <div className="sp-ver">{VER}</div>
          <div className="sp-line"/>
          <div className="sp-tag">{slogan}</div>
          <div className="sp-dots"><div className="sp-dot"/><div className="sp-dot"/><div className="sp-dot"/></div>
        </div>
      )}

      {showInstall&&!splash&&(
        <div className="install-banner">
          <div className="install-txt"><b>{isRu?"📱 Установить Road Radio":"📱 Install Road Radio"}</b><br/>{isRu?"Работает как приложение без браузера":"Works like an app without browser"}</div>
          <button className="install-btn" onClick={installApp}>{isRu?"Установить":"Install"}</button>
          <button className="install-x" onClick={()=>{setShowInstall(false);localStorage.setItem("rr_install_ok","1");}}>×</button>
        </div>
      )}

      {settingsOpen&&(
        <div className="overlay" onClick={e=>{if(e.target.className==="overlay")setSettingsOpen(false);}}>
          <div className="sheet">
            <div className="sheet-title">⚙️ {isRu?"Настройки":"Settings"}</div>
            <div className="set-sect">{isRu?"Режим эфира":"Broadcast Mode"}</div>
            <div className="bcast-grid">
              {BCASTS.map(b=>(
                <div key={b.id} className={`bcast-btn${bcastMode===b.id?" sel":""}`} onClick={()=>setBcastMode(b.id)}>
                  <div className="bcast-icon">{b.icon}</div>
                  <div><div className="bcast-name">{isRu?b.ru:b.en}</div><div className="bcast-desc">{isRu?b.descRu:b.desc}</div></div>
                </div>
              ))}
            </div>
            {bcastMode==="teacher"&&(
              <div style={{margin:"4px 2px 10px"}}>
                <div style={{fontSize:"14px",color:"#cfe0f0",marginBottom:"6px"}}>{isRu?"Какой язык учить:":"Language to learn:"}</div>
                <select className="langsel" style={{width:"100%",padding:"12px",fontSize:"15px"}} value={learnLang} onChange={e=>setLearnLang(e.target.value)}>
                  {LK.filter(k=>k!==lang).map(k=><option key={k} value={k}>{L[k].lb}</option>)}
                </select>
                <div style={{fontSize:"12px",color:"#8a98ad",marginTop:"5px"}}>{isRu?"Ведущий будет вставлять ключевые фразы на этом языке.":"The host will weave key phrases in this language."}</div>
              </div>
            )}
            <div className="set-sect">{isRu?"Способ передвижения":"Travel Mode"}</div>
            <div className="mode-grid">
              {TRAVEL.map(m=>(
                <div key={m.id} className={`mode-btn${travelMode===m.id?" sel":""}`} onClick={()=>setTravelMode(m.id)}>
                  <span className="mode-icon">{m.icon}</span>
                  <div className="mode-lbl">{isRu?m.ru:m.en}</div>
                </div>
              ))}
            </div>
            <div className="set-sect">{isRu?"Голос диктора":"Host voice"}</div>
            {voiceChoices.length===0&&<div style={{fontSize:"14px",color:"#9aabbf",padding:"4px 2px 8px"}}>{isRu?"Голоса телефона ещё загружаются... откройте меню заново через секунду.":"Phone voices still loading... reopen this menu in a second."}</div>}
            <div className="voice-collapse" onClick={()=>setVoiceListOpen(o=>!o)}>
              <span>🎙 {selVoice?voiceLabel(voiceChoices.find(v=>v.name===selVoice)||{name:selVoice,lang:""}):(isRu?"По умолчанию":"Default")}</span>
              <span>{voiceListOpen?"▲":"▼"}</span>
            </div>
            {voiceListOpen&&(
            <div className="voice-list">
              <div className={`voice-row${selVoice===""?" sel":""}`}>
                <div className="voice-pick" onClick={()=>{setSelVoice("");setVoiceListOpen(false);}}>{selVoice===""?"●":"○"} {isRu?"По умолчанию":"Default"}</div>
              </div>
              {voiceChoices.map(v=>(
                <div key={v.name} className={`voice-row${selVoice===v.name?" sel":""}`}>
                  <div className="voice-pick" onClick={()=>{setSelVoice(v.name);setVoiceListOpen(false);}}>
                    {selVoice===v.name?"●":"○"} {voiceLabel(v)}
                  </div>
                  <button className="voice-play" onClick={()=>previewVoice(v.name)}>▶</button>
                </div>
              ))}
            </div>
            )}
            <button className="tts-btn" onClick={openTTSSettings}>⚙️ {isRu?"Докачать голоса в настройках телефона →":"Add more voices in phone settings →"}</button>
            <div className="set-sect">{isRu?"Скорость голоса":"Voice speed"}</div>
            <div style={{padding:"4px 2px 10px"}}>
              <div style={{fontSize:"13px",color:"#9aabbf",marginBottom:"6px"}}>{isRu?`Темп речи: ${voiceRate.toFixed(2)}× ${voiceRate<0.85?"(медленнее)":voiceRate>1.05?"(быстрее)":"(норма)"}`:`Speech rate: ${voiceRate.toFixed(2)}×`}</div>
              <input type="range" min="0.7" max="1.5" step="0.05" value={voiceRate} onChange={e=>setVoiceRate(parseFloat(e.target.value))} style={{width:"100%"}}/>
              <button className="tts-btn" style={{marginTop:"6px"}} onClick={()=>previewVoice(selVoice)}>▶ {isRu?"Проверить голос":"Test voice"}</button>
            </div>
            <div className="set-sect">{isRu?"О чём рассказывать":"What to talk about"}</div>
            <div style={{fontSize:"13px",color:"#9aabbf",margin:"0 2px 8px"}}>{isRu?"Зелёное — рассказывает. Нажмите, чтобы выключить (станет серым).":"Green = on. Tap to turn a topic off."}</div>
            <div className="topic-grid">
              <div className={`topic-item${topicHistory?" on2":""}`} onClick={()=>guardTopicOff(topicHistory,()=>setTopicHistory(v=>!v))}><div className="topic-check on">{topicHistory?"✓":""}</div><div className="topic-lbl">{isRu?"История места":"Local history"}</div></div>
              <div className={`topic-item${topicWildlife?" on2":""}`} onClick={()=>guardTopicOff(topicWildlife,()=>setTopicWildlife(v=>!v))}><div className="topic-check on">{topicWildlife?"✓":""}</div><div className="topic-lbl">{isRu?"Животные (и древние)":"Wildlife (& ancient)"}</div></div>
              <div className={`topic-item${topicGeology?" on2":""}`} onClick={()=>guardTopicOff(topicGeology,()=>setTopicGeology(v=>!v))}><div className="topic-check on">{topicGeology?"✓":""}</div><div className="topic-lbl">{isRu?"Природа и геология":"Land & geology"}</div></div>
              <div className={`topic-item${topicCulture?" on2":""}`} onClick={()=>guardTopicOff(topicCulture,()=>setTopicCulture(v=>!v))}><div className="topic-check on">{topicCulture?"✓":""}</div><div className="topic-lbl">{isRu?"Культура и быт":"Culture & life"}</div></div>
              <div className={`topic-item${topicFilms?" on2":""}`} onClick={()=>guardTopicOff(topicFilms,()=>setTopicFilms(v=>!v))}><div className="topic-check on">{topicFilms?"✓":""}</div><div className="topic-lbl">{isRu?"Где снимали фильмы":"Movie locations"}</div></div>
              <div className={`topic-item${topicFamous?" on2":""}`} onClick={()=>guardTopicOff(topicFamous,()=>setTopicFamous(v=>!v))}><div className="topic-check on">{topicFamous?"✓":""}</div><div className="topic-lbl">{isRu?"Знаменитости":"Famous people"}</div></div>
              <div className={`topic-item${topicPhoto?" on2":""}`} onClick={()=>guardTopicOff(topicPhoto,()=>setTopicPhoto(v=>!v))}><div className="topic-check on">{topicPhoto?"✓":""}</div><div className="topic-lbl">{isRu?"Фотозоны по пути":"Photo spots ahead"}</div></div>
              {[["music",isRu?"Музыка":"Music"],["sports",isRu?"Спорт":"Sports"],["politics",isRu?"Политика":"Politics"],["crime",isRu?"Криминал/детектив":"True crime"],["war",isRu?"Войны и битвы":"Wars & battles"],["native",isRu?"Индейцы":"Native heritage"],["architecture",isRu?"Архитектура":"Architecture"],["economy",isRu?"Промышленность":"Industry"],["legends",isRu?"Легенды":"Legends"],["food",isRu?"Еда и напитки":"Food & drink"]].map(([k,lbl])=>(
                <div key={k} className={`topic-item${isOn(k)?" on2":""}`} onClick={()=>guardTopicOff(isOn(k),()=>toggleMore(k))}><div className="topic-check on">{isOn(k)?"✓":""}</div><div className="topic-lbl">{lbl}</div></div>
              ))}
            </div>
            <div className="set-sect">{isRu?"Заправки":"Fuel stops"}</div>
            <div className={`topic-item${fuelAlerts?" on2":""}`} style={{marginBottom:"8px"}} onClick={()=>setFuelAlerts(v=>!v)}><div className="topic-check on">{fuelAlerts?"✓":""}</div><div className="topic-lbl">{isRu?"Предупреждать о заправках":"Warn about fuel stops"}</div></div>
            {fuelAlerts&&(
              <div style={{padding:"4px 2px 8px"}}>
                <div style={{fontSize:"13px",color:"#9aabbf",marginBottom:"6px"}}>{isRu?`Предупреждать, если до заправки больше: ${fuelMiles} миль`:`Warn if next fuel is over: ${fuelMiles} mi`}</div>
                <input type="range" min="10" max="80" step="5" value={fuelMiles} onChange={e=>setFuelMiles(parseInt(e.target.value))} style={{width:"100%"}}/>
              </div>
            )}
            <div className="set-sect">{isRu?"На остановках":"At stops"}</div>
            <div className={`topic-item${neverPark?" on2":""}`} style={{marginBottom:"8px"}} onClick={()=>setNeverPark(v=>!v)}><div className="topic-check on">{neverPark?"✓":""}</div><div className="topic-lbl">{isRu?"Не спрашивать — рассказывать даже стоя":"Don't ask — keep talking when stopped"}</div></div>
            <div className="set-sect">{isRu?"Мои пожелания диктору":"My requests to the host"}</div>
            <div style={{fontSize:"13px",color:"#9aabbf",margin:"0 2px 8px"}}>{isRu?"Скажите голосом или впишите, как вести эфир: «реже говори впереди вас», «больше про опасных животных». Диктор будет это учитывать.":"Say or type how to run the show: 'mention forks less', 'more about dangerous animals'. The host will follow these."}</div>
            {favs.length>0&&(
              <div style={{margin:"0 2px 10px"}}>
                {favs.map((f,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:"8px",background:"#0d1828",border:"1px solid #24364f",borderRadius:"10px",padding:"10px 12px",marginBottom:"6px"}}>
                    <div style={{flex:1,fontSize:"14px",color:"#dce8f5"}}>{i+1}. {f}</div>
                    <button onClick={()=>removeFav(i)} style={{background:"#3a1414",color:"#ff8a8a",border:"1px solid #5a2222",borderRadius:"8px",padding:"6px 10px",fontSize:"14px",cursor:"pointer"}}>✕</button>
                  </div>
                ))}
                <button className="tts-btn" style={{marginTop:"4px"}} onClick={clearFavs}>🧹 {isRu?"Очистить все пожелания":"Clear all requests"}</button>
              </div>
            )}
            <div style={{display:"flex",gap:"8px",margin:"0 2px 8px"}}>
              <input value={favText} onChange={e=>setFavText(e.target.value)} placeholder={isRu?"Впишите пожелание…":"Type a request…"} style={{flex:1,padding:"12px",fontSize:"14px",background:"#0a1422",border:"1px solid #24364f",borderRadius:"10px",color:"#fff"}}/>
              <button onClick={()=>{addFav(favText);setFavText("");}} style={{background:"#13351f",color:"#7ef0a8",border:"1px solid #1e5a34",borderRadius:"10px",padding:"0 16px",fontSize:"15px",fontWeight:700,cursor:"pointer"}}>+</button>
            </div>
            <button className={`tts-btn${favRec?" rec":""}`} onClick={()=>{
              try{
                const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
                if(!SR){alert(isRu?"Голосовой ввод не поддерживается — впишите текстом.":"Voice input unsupported — type instead.");return;}
                const rec=new SR();rec.lang=L[langRef.current]?.tts||"en-US";rec.interimResults=false;rec.continuous=false;
                setFavRec(true);
                rec.onresult=e=>{const t=e.results[0][0].transcript;addFav(t);};
                rec.onend=()=>setFavRec(false);rec.onerror=()=>setFavRec(false);
                rec.start();
              }catch{setFavRec(false);}
            }}>🎙 {favRec?(isRu?"Говорите…":"Speak…"):(isRu?"Наговорить пожелание":"Say a request")}</button>
            <div className="set-sect">{isRu?"Установка":"Install"}</div>
            <button className="tts-btn" onClick={installApp}>📱 {isRu?"Добавить на главный экран":"Add to Home Screen"}</button>
            <button className="bigbtn green" style={{marginTop:"18px"}} onClick={()=>setSettingsOpen(false)}>✓ {isRu?"Сохранить":"Save"}</button>
          </div>
        </div>
      )}

      <div className="hdr">
        <div className="logo-wrap">
          <div className="logo">Road <em>Radio</em></div>
          <div className="logo-ver">{VER}</div>
        </div>
        <div className="hdr-r">
          <button className="setbtn" onClick={()=>setSettingsOpen(true)}>⚙️</button>
          <select className="langsel" value={lang} onChange={e=>setLang(e.target.value)}>
            {LK.map(k=><option key={k} value={k}>{L[k].lb}</option>)}
          </select>
          <div className="pill"><div className={`dot ${dotCls}`}/><span className="ptxt">{stTxt}</span></div>
        </div>
      </div>

      {screen==="apikey"&&(
        <div className="keyscreen">
          <div className="key-icon">🔑</div>
          <div className="key-title">One-Time Setup</div>
          <div className="key-sub">Get free API key at<br/><a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a><br/>Free $5 — ~200 hours of stories</div>
          <div style={{width:"100%"}}><label className="flabel">Paste Anthropic API key</label><input className="kinput" value={apiInput} onChange={e=>setApiInput(e.target.value)} placeholder="sk-ant-api03-..."/></div>
          <button className="bigbtn blue" onClick={async()=>{try{const t=await navigator.clipboard.readText();if(t&&t.trim())setApiInput(t.trim());else setErr(isRu?"Буфер пуст — скопируйте ключ сначала":"Clipboard empty — copy the key first");}catch{setErr(isRu?"Не удалось прочитать буфер. Вставьте вручную.":"Couldn't read clipboard. Paste manually.");}}}>📋 {isRu?"Вставить из буфера":"Paste from clipboard"}</button>
          {err&&<div className="errbox">⚠ {err}</div>}
          <button className="bigbtn green" onClick={saveKey}>✓ Save & Start →</button>
          <div style={{fontSize:"14px",color:"#9aabbf",textAlign:"center"}}>{isRu?"Хранится только на вашем телефоне. Не чистите данные сайта, чтобы ключ не слетел.":"Stored only on your device. Don't clear site data or the key is lost."}</div>
        </div>
      )}

      {screen==="onboard"&&(
        <div className="onboard">
          <div className="ob-progress">
            {obSteps.map((_,i)=><div key={i} className={`ob-step${i<obStep?" done":i===obStep?" active":""}`}/>)}
          </div>
          <div className="ob-title">{curOb.title}</div>
          {curOb.sub&&curOb.sub!=="install"&&<div className="ob-sub">{curOb.sub}</div>}
          {curOb.sub==="install"?(
            <div className="ob-install">
              <div className="ob-install-icon">📱</div>
              <div className="ob-install-title">{isRu?"Рекомендуем!":"We Recommend!"}</div>
              <div className="ob-install-text">{isRu?"Установите Road Radio на главный экран телефона. Будет работать как приложение — без браузерной строки, быстрее, удобнее.":"Install Road Radio to your home screen. Works like a real app — no browser bar, faster, better."}</div>
              <button className="ob-install-btn" onClick={installApp}>{isRu?"📱 Установить на экран":"📱 Add to Home Screen"}</button>
            </div>
          ):(
            <div className="ob-grid">
              {curOb.items.slice(0,8).map(it=>(
                <div key={it.id} className={`ob-item${curOb.selVal===it.id?" sel":""}`} onClick={()=>curOb.onSel(it.id)}>
                  <span className="ob-item-icon">{it.icon}</span>
                  <div className="ob-item-lbl">{it.label}</div>
                </div>
              ))}
            </div>
          )}
          <div className="ob-actions">
            <button className="ob-skip" onClick={finishOnboard}>{isRu?"Пропустить всё →":"Skip all →"}</button>
            <button className="ob-next" onClick={()=>obStep<obSteps.length-1?setObStep(s=>s+1):finishOnboard()}>
              {obStep<obSteps.length-1?(isRu?"Далее →":"Next →"):(isRu?"Начать!":"Start!")}
            </button>
          </div>
        </div>
      )}

      {screen==="setup"&&(
        <div className="setup">
          <div className="s-hero"><div className="s-icon">📻</div><div className="s-title">Road Radio</div><div className="s-sub">{slogan}</div></div>
          {needsReview&&(
            <div className="review-banner" onClick={()=>{setSettingsOpen(true);localStorage.setItem("rr_review",String(Date.now()));setNeedsReview(false);}}>
              ⚙️ {isRu?"Давно не заглядывали в настройки. Проверить, всё ли по вкусу? →":"Haven't checked your settings in a while. Tap to review →"}
            </div>
          )}
          <button className={`geobtn${geoOk?" ok":""}`} onClick={getGeo}>{geoOk?(isRu?"✓ Местоположение найдено!":"✓ Location Detected!"):(isRu?"📍 Определить местоположение":"📍 Auto-Detect My Location")}</button>
          {err&&<div className="errbox">⚠ {err}</div>}
          <button className="bigbtn green" style={{marginTop:"8px"}} onClick={startTour}>▶ {isRu?"Начать тур":"Start Tour"}</button>
          <div className="sep">{isRu?"или введите вручную":"or enter manually"}</div>
          <div><label className="flabel">📍 {isRu?"Координаты":"Coordinates (lat, lng)"}</label><input className="finput" value={coordInput} onChange={e=>setCoordInput(e.target.value)} placeholder="35.4615, -97.6882"/></div>
          <div><label className="flabel">🏁 {isRu?"Куда едете?":"Destination?"}</label><input className="finput" value={destination} onChange={e=>setDestination(e.target.value)} placeholder={isRu?"Лос-Анджелес, CA":"Los Angeles, CA"}/></div>
          <div className="changekey" onClick={()=>{if(confirm(isRu?"Сменить API-ключ? Текущий будет удалён.":"Change API key? The current one will be removed.")){localStorage.removeItem(KEY_STORE);setApiInput("");setScreen("apikey");}}}>{isRu?"Сменить API-ключ":"Change API key"}</div>
        </div>
      )}

      {screen==="main"&&(
        <>
          {djMode?(
            <div className={`dj-zone${radioFocus?" focus":""}`} onClick={()=>{if(radioFocus)revealMenu();}}>
              <canvas ref={djCanvasRef} className="dj-canvas"/>
              {radioFocus?(
                <div className="focus-col">
                  <div className="fc-item"><div className="fc-v">{weather?`${weather.temp}°`:"—"}</div><div className="fc-l">°F</div></div>
                </div>
              ):(
                <>
                  <div className="dj-top"><div className="bcast-badge">{bmObj.icon}</div>{wBadge&&<div className="weather-badge">{wBadge}</div>}</div>
                  <div className="dj-info">
                    {hwDisplay&&<div className="dj-hw">{hwDisplay}</div>}
                    <div className="dj-loc">{locData.name||locData.city||"On the road..."}</div>
                    {coords&&<div className="dj-crd">{coords.lat.toFixed(4)}°N / {Math.abs(coords.lng).toFixed(4)}°W</div>}
                  </div>
                </>
              )}
              {radioFocus&&<div className="focus-hint">{isRu?"коснитесь — меню":"tap for menu"}</div>}
            </div>
          ):(
            <div className="road-bg">
              <canvas ref={roadCanvasRef} className="road-canvas"/>
              <div className="road-over"/>
              <div className="road-top"><div className="bcast-badge">{bmObj.icon}</div>{wBadge&&<div className="weather-badge">{wBadge}</div>}</div>
              <div className="road-bot">
                {hwDisplay&&<div className="road-hw">{hwDisplay}</div>}
                <div className="road-loc">{locData.name||locData.city||"On the road..."}</div>
                {coords&&<div className="road-crd">{coords.lat.toFixed(4)}°N / {Math.abs(coords.lng).toFixed(4)}°W</div>}
                {nearbyPOI.length>0&&<div className="road-poi">📍 {nearbyPOI.slice(0,4).join(" · ")}</div>}
              </div>
            </div>
          )}

          {!radioFocus&&(<>
          <div className="dash">
            <div className="gauge"><div className="gv t">{weather?`${weather.temp}°`:"—"}</div><div className="gl">°F</div></div>
          </div>

          <div className="sa">
            <div className="airbar">
              <div className="airlbl">{status==="ready"&&<div className="airdot"/>}{isRu?"В ЭФИРЕ":"ON AIR"}</div>
              <div className="timeinfo">{timeStr}</div>
            </div>
            {showTxt&&story&&<div className="stxt">{story}</div>}
            {debugOn&&debugLine&&<div style={{margin:"6px 14px",padding:"6px 10px",background:"#0a0f1a",border:"1px solid #244",borderRadius:8,fontSize:12,color:"#6fa",fontFamily:"monospace",wordBreak:"break-word"}}>{debugLine}</div>}
            {debugOn&&<div style={{margin:"4px 14px",padding:"6px 10px",background:"#0a0f1a",border:"1px solid #354",borderRadius:8,fontSize:12,color:"#fc8",fontFamily:"monospace"}}>🎫 токены: вход {tokenDisp.in} · выход {tokenDisp.out} · всего {tokenDisp.in+tokenDisp.out}</div>}
            {micTranscript&&<div className="mic-transcript">🎤 {micTranscript}</div>}
          </div>
          </>)}

          {parked&&(
            <div className="parked-modal">
              <div className="parked-title">{isRu?"Вы остановились":"You've stopped"}</div>
              <div className="parked-sub">{isRu?"Продолжать рассказ об этом месте?":"Continue listening about this place?"}</div>
              <div className="parked-btns">
                <button className="parked-btn go" onClick={()=>{setParked(false);parkedRef.current=false;tourAckRef.current=true;stationaryModeRef.current=true;pausedRef.current=false;setPaused(false);loopBusyRef.current=false;hardStop();loopGenRef.current++;const g=loopGenRef.current;setStatus("loading");setTimeout(()=>{if(runRef.current&&loopGenRef.current===g)loopRef.current?.(false,true);},250);}}>{isRu?"✓ Продолжить":"✓ Continue"}</button>
                <button className="parked-btn wait" onClick={()=>{setParked(false);parkedRef.current=false;tourAckRef.current=true;stationaryModeRef.current=false;stoppedSince.current=Date.now();loopGenRef.current++;hardStop();setStatus("ready");}}>{isRu?"⏸ Подождать":"⏸ Wait"}</button>
              </div>
            </div>
          )}

          {err&&<div className="errbox" style={{margin:"0 14px 6px"}}>⚠ {err}</div>}

          {qMode&&(
            <div style={{padding:"8px 14px",borderTop:"2px solid #1e2d45"}}>
              <div className="qa">
                <input className="qi" value={qText} onChange={e=>setQText(e.target.value)} placeholder={isRu?"Спросите или скажите как вести эфир...":"Ask, or tell me how to host..."} onKeyDown={e=>e.key==="Enter"&&sendQ()} autoFocus/>
                <div className="qbs">
                  <button className="qbtn send" onClick={sendQ}>{isRu?"Спросить":"Ask"}</button>
                  <button className="qbtn cancel" onClick={()=>{setQMode(false);setQText("");}}>{isRu?"Отмена":"Cancel"}</button>
                </div>
              </div>
            </div>
          )}

          {callMode&&(
            <div className="call-overlay">
              <div className="call-card">
                <div className="call-ava">📻</div>
                <div className="call-title">{isRu?"Дорожное Радио":"Road Radio"}</div>
                <div className="call-phase">
                  {callPhase==="greeting"&&(isRu?"📞 Соединение...":"📞 Connecting...")}
                  {callPhase==="listening"&&(isRu?"🔴 Говорите — диджей слушает":"🔴 Speak — the DJ is listening")}
                  {callPhase==="closing"&&(isRu?"✓ Принято":"✓ Got it")}
                  {callPhase==="type"&&(isRu?"Микрофон недоступен — напишите:":"Mic unavailable — type instead:")}
                </div>
                {micTranscript&&<div className="call-transcript">{micTranscript}</div>}
                {callPhase==="type"&&(
                  <div className="qa" style={{marginTop:"10px"}}>
                    <input className="qi" value={qText} onChange={e=>setQText(e.target.value)} placeholder={isRu?"Ваши пожелания диджею...":"Your message to the DJ..."} autoFocus/>
                    <button className="qbtn send" onClick={()=>{const t=qText;setQText("");userDoneRef.current=true;closeCall(t);}}>{isRu?"Отправить":"Send"}</button>
                  </div>
                )}
                <div className="call-btns">
                  {callPhase==="listening"&&<button className="call-done" onClick={finishCall}>{isRu?"✓ Я сказал всё":"✓ I'm done"}</button>}
                  <button className="call-hang" onClick={cancelCall}>{isRu?"✖ Положить трубку":"✖ Hang up"}</button>
                </div>
              </div>
            </div>
          )}

          {radioFocus?(
            <div className="bottom-ctrl focus-ctrl">
              <button className="callbtn" onClick={(e)=>{e.stopPropagation();openCall();}}>📞 {isRu?"Спросить про это место":"Ask about this place"}</button>
              <button className="roadwatch-btn" onClick={(e)=>{e.stopPropagation();if(coordsRef.current){const{lat,lng}=coordsRef.current;const ts=new Date().toISOString();const data=JSON.parse(localStorage.getItem("rr_roadwatch")||"[]");data.push({lat,lng,ts,type:"roadkill"});localStorage.setItem("rr_roadwatch",JSON.stringify(data.slice(-100)));alert(isRu?"✓ Отметка сохранена":"✓ Marked");}}}>⚠️ ROADWATCH</button>
            </div>
          ):(
          <div className="bottom-ctrl">
            <div className="main-btns">
              <button className="mbtn stop" onClick={stop}>{isRu?"■ Стоп":"■ Stop"}</button>
              <button className={`mbtn pause${paused?" on":""}`} onClick={togglePause}>{paused?(isRu?"▶ Дальше":"▶ Resume"):(isRu?"⏸ Пауза":"⏸ Pause")}</button>
              <button className="mbtn skip" onClick={skipTopic}>{isRu?"⏭ Сменить тему":"⏭ Skip topic"}</button>
            </div>
            <button className="callbtn" onClick={openCall}>📞 {isRu?"Спросить про это место":"Ask about this place"}</button>
            <button className={`favbtn${favRec?" rec":""}`} onClick={()=>{
              try{
                const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
                if(!SR){setSettingsOpen(true);return;}
                const rec=new SR();rec.lang=L[langRef.current]?.tts||"en-US";rec.interimResults=false;rec.continuous=false;
                setFavRec(true);
                rec.onresult=e=>{const t=e.results[0][0].transcript;addFav(t);if(t)alert(isRu?"✓ Пожелание добавлено: "+t:"✓ Added: "+t);};
                rec.onend=()=>setFavRec(false);rec.onerror=()=>setFavRec(false);
                rec.start();
              }catch{setFavRec(false);}
            }}>⭐ {favRec?(isRu?"Говорите пожелание…":"Say your request…"):(isRu?"Добавить пожелание диктору":"Add a request to the host")}</button>
            <div className="sec-btns">
              <button className={`sbtn big${showTxt?" act":""}`} onClick={()=>{setShowTxt(t=>{const n=!t;if(n)setRadioFocus(false);return n;});}}>{showTxt?(isRu?"📄 Текст ✓":"📄 Text ✓"):(isRu?"📄 Текст":"📄 Text")}</button>
              <button className={`sbtn big${debugOn?" act":""}`} onClick={()=>setDebugOn(d=>!d)}>{debugOn?"🐞 Debug ✓":"🐞 Debug"}</button>
              <button className={`sbtn big${wikiMode?" act":""}`} onClick={()=>{setWikiMode(w=>!w);batchQRef.current=[];nextRef.current=null;bufferRef.current=[];}}>{wikiMode?"📚 WikiRadio ✓":"📚 WikiRadio"}</button>
              {debugOn&&<button className={`sbtn big${localAiMode?" act":""}`} title={localAiStatus} onClick={toggleLocalAiBeta}>{localAiMode?"🧠 Local AI ✓":"🧠 Local AI (Lab)"}</button>}
              <button className={`sbtn big${provider==="gemini"?" act":""}`} onClick={()=>{
                if(provider==="haiku"){
                  let gk=localStorage.getItem("rr_gemini_key")||"";
                  if(!gk){gk=prompt(isRu?"Вставь Gemini API-ключ (aistudio.google.com → Get API key):":"Paste Gemini API key (aistudio.google.com → Get API key):")||"";if(!gk)return;localStorage.setItem("rr_gemini_key",gk.trim());}
                  localStorage.setItem("rr_provider","gemini");setProvider("gemini");
                }else{localStorage.setItem("rr_provider","haiku");setProvider("haiku");}
              }}>{provider==="gemini"?"🤖 Gemini ✓":"🤖 Haiku"}</button>
              <button className="sbtn big" onClick={downloadAirLog}>{isRu?"⬇ Лог эфира":"⬇ Air log"}</button>
              <button className="sbtn big" onClick={()=>{revealMenu();setRadioFocus(true);}}>{isRu?"📻 Только радио":"📻 Radio only"}</button>
              <button className="sbtn" onClick={()=>setSettingsOpen(true)}>⚙️</button>
            </div>
            <button className="roadwatch-btn" onClick={()=>{if(coordsRef.current){const{lat,lng}=coordsRef.current;const ts=new Date().toISOString();const data=JSON.parse(localStorage.getItem("rr_roadwatch")||"[]");data.push({lat,lng,ts,type:"roadkill"});localStorage.setItem("rr_roadwatch",JSON.stringify(data.slice(-100)));alert(isRu?"✓ Отметка сохранена":"✓ Marked");}}}>
              ⚠️ ROADWATCH
            </button>
            <div className="wakeinfo">{wakeLock?(isRu?"🔆 Экран включён":"🔆 Screen on"):(isRu?"⚠ Экран может погаснуть":"⚠ Screen may turn off")}{localAiMode?` · 🧠 ${localAiStatus}`:""}</div>
          </div>
          )}
        </>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
