<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Road Radio AI</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#05070f;height:100%;overscroll-behavior:none;}
body{font-family:'Inter',sans-serif;color:#fff;}
.app{min-height:100vh;background:#05070f;display:flex;flex-direction:column;max-width:500px;margin:0 auto;position:relative;}
.hdr{padding:12px 16px;border-bottom:2px solid #2a3550;display:flex;align-items:center;justify-content:space-between;background:#080b15;position:sticky;top:0;z-index:99;}
.logo{font-family:'Orbitron',monospace;font-size:14px;font-weight:900;letter-spacing:2px;color:#ff6b35;}
.logo em{color:#4a9eff;font-style:normal;}
.hdr-r{display:flex;align-items:center;gap:8px;}
.langsel{background:#0d1525;border:2px solid #4a9eff;border-radius:8px;padding:5px 8px;color:#4a9eff;font-family:'Orbitron',monospace;font-size:9px;font-weight:700;cursor:pointer;outline:none;}
.setbtn{background:#0d1525;border:2px solid #2a3550;border-radius:8px;padding:5px 10px;color:#aabbcc;font-size:16px;cursor:pointer;outline:none;}
.pill{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;border:2px solid #2a3550;background:#0d1525;}
.dot{width:9px;height:9px;border-radius:50%;}
.dot.on{background:#00e87a;box-shadow:0 0 10px #00e87a;animation:pulse 1.5s infinite;}
.dot.ld{background:#f5c842;box-shadow:0 0 8px #f5c842;animation:pulse .8s infinite;}
.dot.off{background:#334466;}
.ptxt{font-family:'Orbitron',monospace;font-size:9px;font-weight:700;letter-spacing:2px;color:#aabbcc;text-transform:uppercase;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* SETTINGS OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:flex-end;}
.settings-box{background:#080b15;border-top:2px solid #2a3550;border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:500px;margin:0 auto;}
.set-title{font-family:'Orbitron',monospace;font-size:14px;font-weight:900;color:#ff6b35;margin-bottom:18px;letter-spacing:2px;}
.set-subtitle{font-size:13px;color:#778899;margin-bottom:14px;}
.set-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.set-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#0d1525;border:2px solid #2a3550;border-radius:10px;cursor:pointer;}
.set-item.on{border-color:#cc3333;background:#1a0808;}
.set-check{width:20px;height:20px;border-radius:5px;background:#1a2535;border:2px solid #334455;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.set-item.on .set-check{background:#cc3333;border-color:#cc3333;}
.set-label{font-size:13px;color:#aabbcc;font-weight:600;}
.set-item.on .set-label{color:#ff9090;}

/* INPUTS */
.flabel{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:2px;color:#4a9eff;text-transform:uppercase;margin-bottom:9px;display:block;}
.finput{background:#0d1525;border:2px solid #ffffff;border-radius:12px;padding:16px 18px;color:#ffffff;font-size:18px;outline:none;width:100%;}
.finput::placeholder{color:#556688;font-size:15px;}
.finput:focus{border-color:#4a9eff;}
.kinput{background:#0d1525;border:2px solid #ffffff;border-radius:12px;padding:15px 18px;color:#ffffff;font-size:13px;font-family:monospace;outline:none;width:100%;letter-spacing:1px;}
.kinput::placeholder{color:#556688;}
.kinput:focus{border-color:#4a9eff;}
.keyscreen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:20px;text-align:center;}
.key-icon{font-size:56px;}
.key-title{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:#ff6b35;letter-spacing:2px;}
.key-sub{font-size:16px;color:#aabbcc;line-height:1.7;}
.key-sub a{color:#4a9eff;text-decoration:none;}
.setup{flex:1;padding:22px 18px;display:flex;flex-direction:column;gap:16px;}
.s-hero{text-align:center;}
.s-icon{font-size:50px;margin-bottom:8px;}
.s-title{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:#ff6b35;letter-spacing:2px;margin-bottom:5px;}
.s-sub{font-size:16px;color:#aabbcc;line-height:1.5;}
.geobtn{background:#0d1828;border:2px solid #4a9eff;border-radius:12px;padding:16px;color:#4a9eff;font-size:14px;font-weight:700;cursor:pointer;width:100%;}
.geobtn.ok{border-color:#00e87a;color:#00e87a;background:#081810;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.dirhint{font-size:13px;color:#778899;margin-top:6px;}
.errbox{padding:14px 16px;background:#200808;border:2px solid #cc2020;border-radius:10px;color:#ff9090;font-size:15px;font-weight:600;}
.bigbtn{border-radius:14px;padding:18px;font-size:15px;font-weight:700;cursor:pointer;width:100%;letter-spacing:1px;border:none;}
.bigbtn.green{background:linear-gradient(135deg,#0d3a0d,#1a6a1a);color:#00e87a;border:2px solid #2a6a2a;}
.bigbtn.blue{background:#0d1828;color:#4a9eff;border:2px solid #2a4a80;}
.sep{display:flex;align-items:center;gap:12px;color:#667788;font-size:14px;}
.sep:before,.sep:after{content:'';flex:1;height:1px;background:#2a3550;}

/* MAIN */
.imgzone{position:relative;height:185px;background:#0d1020;overflow:hidden;flex-shrink:0;}
.locimg{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .8s;}
.locimg.on{opacity:.75;}
.imgover{position:absolute;inset:0;background:linear-gradient(to top,rgba(5,7,15,1) 0%,rgba(5,7,15,.15) 65%,transparent 100%);}
.imgbot{position:absolute;bottom:0;left:0;right:0;padding:12px 18px;}
.locname{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:2px;color:#ff6b35;text-transform:uppercase;margin-bottom:3px;}
.loccrd{font-family:'Orbitron',monospace;font-size:9px;color:#aabbcc;letter-spacing:1px;}
.imgtop{position:absolute;top:0;left:0;right:0;padding:10px 14px;display:flex;justify-content:flex-end;}
.weather-badge{background:rgba(5,7,15,.75);border:1px solid #2a3550;border-radius:20px;padding:5px 12px;font-family:'Orbitron',monospace;font-size:10px;color:#f5c842;letter-spacing:1px;}
.imgsp{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:36px;opacity:.2;animation:spin 4s linear infinite;}

.dash{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px 14px;border-bottom:2px solid #2a3550;}
.gauge{text-align:center;padding:12px 4px;background:#0d1525;border:2px solid #2a3550;border-radius:10px;}
.gv{font-family:'Orbitron',monospace;font-size:22px;font-weight:700;color:#00e87a;line-height:1;}
.gv.d{font-size:20px;color:#4a9eff;}
.gv.t{font-size:18px;color:#f5c842;}
.gl{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1.5px;color:#778899;text-transform:uppercase;margin-top:5px;}

.sa{flex:1;padding:16px 18px 10px;overflow-y:auto;}
.airbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.airlbl{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:3px;color:#778899;text-transform:uppercase;display:flex;align-items:center;gap:7px;}
.airdot{width:7px;height:7px;border-radius:50%;background:#ff6b35;animation:pulse 1.4s infinite;}
.timeinfo{font-family:'Orbitron',monospace;font-size:9px;color:#445566;letter-spacing:1px;}
.stxt{font-size:20px;line-height:1.85;color:#ffffff;font-style:italic;animation:fadeUp .5s ease;}
.ldtxt{color:#778899;font-family:'Orbitron',monospace;font-size:12px;display:flex;align-items:center;gap:10px;letter-spacing:1px;}
.sp{display:inline-block;animation:spin 1s linear infinite;}
.pgrow{display:flex;align-items:center;gap:10px;margin-top:12px;}
.pglbl{font-family:'Orbitron',monospace;font-size:9px;color:#889aaa;white-space:nowrap;}
.pgbar{flex:1;height:3px;background:#1a2535;border-radius:2px;overflow:hidden;}
.pgfill{height:100%;background:linear-gradient(to right,#ff6b35,#f5c842);border-radius:2px;transition:width 1s linear;}

/* CONTROLS */
.togrow{padding:8px 14px;display:flex;gap:8px;border-top:2px solid #2a3550;}
.tog{flex:1;padding:10px 4px;background:#0d1525;border:2px solid #2a3550;border-radius:9px;font-size:11px;color:#aabbcc;cursor:pointer;text-align:center;font-weight:600;}
.tog.act{background:#0a1a30;border-color:#4a9eff;color:#4a9eff;}
.tog.spk.going{border-color:#00e87a;color:#00e87a;background:#081810;}
.tog.wake.act{border-color:#f5c842;color:#f5c842;background:#151005;}
.wakeinfo{font-size:10px;color:#445566;text-align:center;padding:4px 0;}

/* VOICE BUTTON */
.voice-area{padding:8px 14px;border-top:2px solid #2a3550;}
.mic-btn{width:100%;padding:16px;background:#0d1828;border:2px solid #4a9eff;border-radius:12px;color:#4a9eff;font-family:'Orbitron',monospace;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:10px;}
.mic-btn.listening{background:#1a0808;border-color:#ff4444;color:#ff4444;animation:pulse .8s ease-in-out infinite;}
.mic-btn.processing{background:#080e1a;border-color:#f5c842;color:#f5c842;}

.qa{padding:8px 14px;border-top:2px solid #2a3550;}
.qi{width:100%;background:#0d1525;border:2px solid #ffffff;border-radius:10px;padding:12px 15px;color:#ffffff;font-size:16px;outline:none;margin-bottom:8px;}
.qi::placeholder{color:#556688;}
.qi:focus{border-color:#4a9eff;}
.qbs{display:flex;gap:8px;}
.ctrl{padding:12px 14px 22px;display:flex;gap:10px;border-top:2px solid #2a3550;}
.btn{flex:1;padding:16px;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:1px;}
.btn:active{transform:scale(.96);}
.bstop{background:linear-gradient(135deg,#2e0d0d,#5a1a1a);color:#ff9090;border:2px solid #5a2020;}
.bq{flex:.55;background:#0d1525;color:#4a9eff;border:2px solid #2a4a70;font-size:10px;}
.bsend{background:#0d1e3a;color:#88bbff;border:2px solid #2a4a80;}
.bcancel{background:#0d1020;color:#8899aa;border:2px solid #2a3550;flex:.5;}
</style>
</head>

  {id:"towns",en:"Towns & cities",ru:"Города и сёла"},
  {id:"road",en:"Road & infrastructure",ru:"Дороги и мосты"},
  {id:"humor",en:"Humor & jokes",ru:"Юмор и шутки"},
];

const toDir=h=>{if(h==null||isNaN(h))return"—";const d=["N","NE","E","SE","S","SW","W","NW"];return d[Math.round(((h%360)+360)%360/45)%8];};
const toMph=ms=>ms&&ms>0?Math.round(ms*2.237):0;
const getTimeOfDay=()=>{const h=new Date().getHours();if(h>=5&&h<12)return"morning";if(h>=12&&h<17)return"afternoon";if(h>=17&&h<21)return"evening";return"night";};
const getTimeStr=()=>{const now=new Date();return now.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});};

function App(){
  const saved=localStorage.getItem(KEY_STORE)||"";
  const savedEx=JSON.parse(localStorage.getItem(EX_STORE)||"[]");
  const autoL=(navigator.language||"en").split("-")[0].toLowerCase();
  const [screen,setScreen]=useState(saved?"setup":"apikey");
  const [apiInput,setApiInput]=useState("");
  const [lang,setLang]=useState(L[autoL]?autoL:"en");
  const [coordInput,setCoordInput]=useState("");
  const [speedVal,setSpeedVal]=useState("65");
  const [headVal,setHeadVal]=useState("90");
  const [geoOk,setGeoOk]=useState(false);
  const [coords,setCoords]=useState(null);
  const [status,setStatus]=useState("idle");
  const [story,setStory]=useState("");
  const [locName,setLocName]=useState("");
  const [imgSeed,setImgSeed]=useState(1);
  const [imgLoaded,setImgLoaded]=useState(false);
  const [err,setErr]=useState("");
  const [qMode,setQMode]=useState(false);
  const [qText,setQText]=useState("");
  const [showTxt,setShowTxt]=useState(true);
  const [cd,setCd]=useState(0);
  const [speaking,setSpeaking]=useState(false);
  const [wakeLock,setWakeLock]=useState(false);
  const [weather,setWeather]=useState(null);
  const [micState,setMicState]=useState("idle");
  const [settingsOpen,setSettingsOpen]=useState(false);
  const [excluded,setExcluded]=useState(savedEx);
  const [timeStr,setTimeStr]=useState(getTimeStr());

  const runRef=useRef(false);
  const histRef=useRef([]);
  const loopRef=useRef(null);
  const coordsRef=useRef(null);
  const cdRef=useRef(null);
  const wlRef=useRef(null);
  const langRef=useRef(lang);
  const excludedRef=useRef(excluded);
  const recogRef=useRef(null);
  const weatherRef=useRef(null);

  useEffect(()=>{langRef.current=lang;},[lang]);
  useEffect(()=>{excludedRef.current=excluded;},[excluded]);
  useEffect(()=>{if(coords)coordsRef.current=coords;},[coords]);
  useEffect(()=>{const t=setInterval(()=>setTimeStr(getTimeStr()),30000);return()=>clearInterval(t);},[]);

  const T=k=>(L[lang]?.ui||L.en.ui)[k]||L.en.ui[k]||k;

  const fetchWeather=async(lat,lng)=>{
    try{
      const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true&current=temperature_2m,windspeed_10m,precipitation_probability&temperature_unit=fahrenheit&windspeed_unit=mph&timezone=auto`);
      const d=await r.json();
      const w={temp:Math.round(d.current_weather?.temperature||d.current?.temperature_2m||70),wind:Math.round(d.current_weather?.windspeed||d.current?.windspeed_10m||0),code:d.current_weather?.weathercode||0,is_day:d.current_weather?.is_day??1,precip:d.current?.precipitation_probability||0};
      setWeather(w);weatherRef.current=w;
    }catch{}
  };

  const requestWake=async()=>{try{if("wakeLock" in navigator){wlRef.current=await navigator.wakeLock.request("screen");setWakeLock(true);wlRef.current.addEventListener("release",()=>setWakeLock(false));}}catch{}};
  useEffect(()=>{const h=()=>{if(document.visibilityState==="visible"&&runRef.current)requestWake();};document.addEventListener("visibilitychange",h);return()=>document.removeEventListener("visibilitychange",h);},[]);

  const startCd=s=>{setCd(s);if(cdRef.current)clearInterval(cdRef.current);cdRef.current=setInterval(()=>setCd(p=>{if(p<=1){clearInterval(cdRef.current);return 0;}return p-1;}),1000);};

  const speak=text=>new Promise(res=>{
    try{
      const s=window.speechSynthesis;
      if(!s){res();return;}
      s.cancel();
      const tl=L[langRef.current]?.tts||"en-US";
      const u=new SpeechSynthesisUtterance(text);
      u.lang=tl;u.rate=0.85;u.pitch=1.0;
      try{const vs=s.getVoices();const v=vs.find(x=>x.lang===tl)||vs.find(x=>x.lang.startsWith(tl.split("-")[0]))||vs[0];if(v)u.voice=v;}catch{}
      setSpeaking(true);
      u.onend=u.onerror=()=>{setSpeaking(false);res();};
      s.speak(u);
    }catch{setSpeaking(false);res();}
  });

  const buildPrompt=(c,isQuestion,question)=>{
    const al=L[langRef.current]?.ai||"English";
    const tod=getTimeOfDay();
    const hr=new Date().getHours();
    const isNight=tod==="night"||tod==="evening";
    const w=weatherRef.current;
    const exTopics=excludedRef.current;
    const exStr=exTopics.length>0?`\nDO NOT mention: ${exTopics.join(", ")}.`:"";
    const weatherStr=w?`Current weather: ${getWC(w.code)} ${w.temp}°F, wind ${w.wind} mph.`:"";
    const timeCtx=`Time: ${hr}:00 (${tod}).${isNight?" It is DARK outside — the driver cannot see the landscape clearly.":""}`;

    if(isQuestion){
      return{
        system:`You are Road Radio AI — a warm, knowledgeable road companion like Nikolai Drozdov. The driver just asked you a question while driving. Answer warmly and conversationally in 2-3 sentences. Then say you're returning to the road tour. CRITICAL: Respond entirely in ${al}.
Reply ONLY valid JSON: {"story":"answer + transition back to road","location":"current location name","image":"2-3 english words"}`,
        msg:question
      };
    }

    return{
      system:`You are Road Radio AI — a warm, soulful road companion. Think Nikolai Drozdov from "In the Animal World" — genuinely excited, knowledgeable, never dry.

${timeCtx}
${weatherStr}
Position: ${c.lat.toFixed(5)}°N, ${c.lng.toFixed(5)}°W. Speed: ${toMph(c.speed)||65} mph. Heading: ${toDir(c.heading)}.
${exStr}

THE DRIVER IS IN A MOVING CAR. They experience the world through the WINDSHIELD.
${isNight?"NIGHT DRIVING: Don't say 'you can see' — say 'if it were daylight, you'd see...' or describe what lights/silhouettes are visible.":"Describe what is VISIBLE through the windshield right now."}

STYLE RULES:
- Warm, personal, like a wise friend pointing things out: "Look over there..." / "Did you know..."
- Use "..." between sentences for natural pauses
- SHORT sentences. Natural rhythm.
- Always name specific things: river names, town names, highway numbers, exit numbers
- If a river or bridge is 1-3 miles ahead: start building excitement NOW
- Rotate topics naturally: landscape → history → wildlife → upcoming attraction → road fact
- End EVERY story with a teaser: "...and just ahead..." or "...keep an eye out for..."
- NEVER mention geology layers or rock ages
- NEVER invent animals not found in this region
- 3-4 sentences ONLY. Make every word count.
- CRITICAL: Every single word must be in ${al}.

Reply ONLY valid JSON: {"story":"3-4 sentences with ... pauses","location":"exact location name in English","image":"2-3 english words for landscape photo"}`,
      msg:`What do I see right now and what's coming up ahead?`
    };
  };

  const callClaude=async(system,userMsg)=>{
    const key=localStorage.getItem(KEY_STORE);
    const msgs=[...histRef.current.slice(-4),{role:"user",content:userMsg}];
    const r=await fetch(PROXY,{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:400,system,messages:msgs})});
    if(!r.ok)throw new Error(await r.text());
    const data=await r.json();
    let txt=data.content?.[0]?.text??"{}";
    txt=txt.replace(/```json|```/g,"").trim();
    try{const p=JSON.parse(txt);histRef.current=[...msgs,{role:"assistant",content:txt}];return p;}
    catch{histRef.current=[...msgs,{role:"assistant",content:txt}];return{story:txt,location:"On the road",image:"highway"};}
  };

  const loop=async()=>{
    if(!runRef.current)return;
    const c=coordsRef.current;
    if(!c)return;
    setStatus("loading");
    try{
      const {system,msg}=buildPrompt(c,false,null);
      const res=await callClaude(system,msg);
      if(!runRef.current)return;
      setStory(res.story||"");
      setLocName(res.location||"");
      const seed=Math.round(Math.abs(c.lat*1000+c.lng*1000))%9000+1000;
      setImgSeed(seed);setImgLoaded(false);
      setStatus("ready");startCd(50);
      if(res.story)await speak(res.story);
      await new Promise(r=>setTimeout(r,Math.max(0,50000)));
      if(runRef.current)loopRef.current?.();
    }catch(e){
      setErr((e.message||"Connection error").slice(0,100));
      runRef.current=false;setStatus("idle");
    }
  };
  loopRef.current=loop;

  const getGeo=()=>{
    if(!navigator.geolocation){setErr("Geolocation not supported");return;}
    setErr("");
    navigator.geolocation.getCurrentPosition(pos=>{
      const c={lat:pos.coords.latitude,lng:pos.coords.longitude,speed:pos.coords.speed||0,heading:pos.coords.heading};
      setCoordInput(`${c.lat.toFixed(6)}, ${c.lng.toFixed(6)}`);
      if(c.speed)setSpeedVal(String(toMph(c.speed)));
      if(c.heading)setHeadVal(String(Math.round(c.heading)));
      coordsRef.current=c;setGeoOk(true);
      fetchWeather(c.lat,c.lng);
    },()=>setErr("Location denied. Enter manually."),{enableHighAccuracy:true,timeout:12000});
  };

  const parseCoords=()=>{
    const m=coordInput.trim().match(/(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)/);
    if(!m)return null;
    return{lat:parseFloat(m[1]),lng:parseFloat(m[2]),speed:0,heading:parseFloat(headVal)||90};
  };

  const startGeoWatch=()=>{
    if(!navigator.geolocation)return;
    let weatherTimer=0;
    navigator.geolocation.watchPosition(pos=>{
      const c={lat:pos.coords.latitude,lng:pos.coords.longitude,speed:pos.coords.speed||0,heading:pos.coords.heading};
      coordsRef.current=c;setCoords(c);
      weatherTimer++;
      if(weatherTimer%60===0)fetchWeather(c.lat,c.lng);
    },()=>{},{enableHighAccuracy:true,maximumAge:5000});
  };

  const startTour=async()=>{
    let c=coordsRef.current||parseCoords();
    if(!c){setErr("Tap Auto-Detect or enter coordinates");return;}
    coordsRef.current=c;setCoords(c);
    runRef.current=true;histRef.current=[];
    setErr("");setStory("");
    setScreen("main");startGeoWatch();
    await requestWake();
    fetchWeather(c.lat,c.lng);
    setTimeout(()=>loopRef.current?.(),300);
  };

  const stop=()=>{
    runRef.current=false;
    try{window.speechSynthesis?.cancel();}catch{}
    setSpeaking(false);setStatus("idle");
    try{wlRef.current?.release();}catch{}
    setWakeLock(false);
    if(cdRef.current)clearInterval(cdRef.current);
    setScreen("setup");
  };

  const startVoice=()=>{
    try{
      const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
      if(!SR){setQMode(true);return;}
      const rec=new SR();
      rec.lang=L[lang]?.tts||"en-US";
      rec.continuous=false;rec.interimResults=false;
      rec.onstart=()=>setMicState("listening");
      rec.onresult=async e=>{
        const q=e.results[0][0].transcript;
        setMicState("processing");
        try{window.speechSynthesis?.cancel();}catch{}
        const c=coordsRef.current;
        const {system}=buildPrompt(c,true,q);
        try{
          const res=await callClaude(system,q);
          setStory(res.story||res);setStatus("ready");startCd(50);
          setMicState("idle");
          if(res.story)await speak(res.story);
          await new Promise(r=>setTimeout(r,2000));
          if(runRef.current)loopRef.current?.();
        }catch{setMicState("idle");}
      };
      rec.onerror=()=>setMicState("idle");
      rec.onend=()=>{if(micState==="listening")setMicState("idle");};
      rec.start();
      recogRef.current=rec;
    }catch{setQMode(true);}
  };

  const stopVoice=()=>{
    try{recogRef.current?.stop();}catch{}
  };

  const sendQ=async()=>{
    if(!qText.trim())return;
    try{window.speechSynthesis?.cancel();}catch{}
    setQMode(false);setStatus("loading");
    try{
      const c=coordsRef.current;
      const {system}=buildPrompt(c,true,qText);
      const res=await callClaude(system,qText);
      setStory(res.story||res);setQText("");setStatus("ready");startCd(50);
      if(res.story)await speak(res.story);
      await new Promise(r=>setTimeout(r,2000));
      if(runRef.current)loopRef.current?.();else setStatus("idle");
    }catch{setStatus("idle");}
  };

  const saveKey=()=>{
    const k=apiInput.trim();
    if(!k.startsWith("sk-ant")){setErr(T("ke"));return;}
    localStorage.setItem(KEY_STORE,k);setErr("");setScreen("setup");
  };

  const toggleExclude=id=>{
    const n=excluded.includes(id)?excluded.filter(x=>x!==id):[...excluded,id];
    setExcluded(n);localStorage.setItem(EX_STORE,JSON.stringify(n));
  };

  const isMain=screen==="main";
  const dotCls=!isMain?"off":status==="loading"?"ld":"on";
  const stTxt=!isMain?T("rdy"):status==="loading"?T("load"):T("air");
  const imgUrl=`https://picsum.photos/seed/${imgSeed}/700/300`;
  const weatherBadge=weather?`${getWC(weather.code)} ${weather.temp}°F`:null;
  const tod=getTimeOfDay();

  return(
    <div className="app">
      {settingsOpen&&(
        <div className="overlay" onClick={e=>{if(e.target.className==="overlay")setSettingsOpen(false);}}>
          <div className="settings-box">
            <div className="set-title">{T("setTitle")}</div>
            <div className="set-subtitle" style={{color:"#778899",fontSize:"13px",marginBottom:"14px"}}>
              {lang==="ru"?"Отметьте темы, которые вам НЕ интересны:":"Check topics you do NOT want to hear:"}
            </div>
            <div className="set-grid">
              {TOPICS.map(t=>(
                <div key={t.id} className={`set-item${excluded.includes(t.id)?" on":""}`} onClick={()=>toggleExclude(t.id)}>
                  <div className="set-check">{excluded.includes(t.id)?"✕":""}</div>
                  <div className="set-label">{lang==="ru"?t.ru:t.en}</div>
                </div>
              ))}
            </div>
            <button className="bigbtn green" onClick={()=>setSettingsOpen(false)}>{T("setClose")}</button>
          </div>
        </div>
      )}

      <div className="hdr">
        <div className="logo">Road <em>Radio</em> AI</div>
        <div className="hdr-r">
          <button className="setbtn" onClick={()=>setSettingsOpen(true)}>⚙️</button>
          <select className="langsel" value={lang} onChange={e=>setLang(e.target.value)}>
            {LK.map(k=><option key={k} value={k}>{L[k].lb}</option>)}
          </select>
          <div className="pill">
            <div className={`dot ${dotCls}`}/>
            <span className="ptxt">{stTxt}</span>
          </div>
        </div>
      </div>

      {screen==="apikey"&&(
        <div className="keyscreen">
          <div className="key-icon">🔑</div>
          <div className="key-title">{T("kt")}</div>
          <div className="key-sub">{T("ks")}<br/><a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a><br/>{T("kc")}</div>
          <div style={{width:"100%"}}>
            <div className="flabel">{T("kl")}</div>
            <input className="kinput" value={apiInput} onChange={e=>setApiInput(e.target.value)} placeholder="sk-ant-api03-..."/>
          </div>
          {err&&<div className="errbox">⚠ {err}</div>}
          <button className="bigbtn green" onClick={saveKey}>{T("ksv")}</button>
          <div style={{fontSize:"13px",color:"#667788",textAlign:"center"}}>{T("kn")}</div>
        </div>
      )}

      {screen==="setup"&&(
        <div className="setup">
          <div className="s-hero">
            <div className="s-icon">🛣️</div>
            <div className="s-title">Road Radio AI</div>
            <div className="s-sub">{T("title")}</div>
          </div>
          <button className={`geobtn${geoOk?" ok":""}`} onClick={getGeo}>{geoOk?T("geoOk"):T("geo")}</button>
          <div className="sep">{T("manual")}</div>
          <div>
            <label className="flabel">{T("coords")}</label>
            <input className="finput" value={coordInput} onChange={e=>setCoordInput(e.target.value)} placeholder="35.4615, -97.6882"/>
          </div>
          <div className="row2">
            <div>
              <label className="flabel">{T("speed")}</label>
              <input className="finput" type="number" value={speedVal} onChange={e=>setSpeedVal(e.target.value)}/>
            </div>
            <div>
              <label className="flabel">{T("hdg")}</label>
              <input className="finput" type="number" value={headVal} onChange={e=>setHeadVal(e.target.value)}/>
              <div className="dirhint">{T("hint")}</div>
            </div>
          </div>
          {err&&<div className="errbox">⚠ {err}</div>}
          <button className="bigbtn blue" onClick={()=>{localStorage.removeItem(KEY_STORE);setApiInput("");setScreen("apikey");}}>{T("chKey")}</button>
          <button className="bigbtn green" onClick={startTour}>{T("start")}</button>
        </div>
      )}

      {screen==="main"&&(
        <>
          <div className="imgzone">
            {!imgLoaded&&<div className="imgsp">🌄</div>}
            <img className={`locimg${imgLoaded?" on":""}`} src={imgUrl} alt="" onLoad={()=>setImgLoaded(true)} onError={e=>{e.target.src=`https://picsum.photos/700/300?random=${imgSeed}`;}}/>
            <div className="imgover"/>
            {weatherBadge&&<div className="imgtop"><div className="weather-badge">{weatherBadge}</div></div>}
            <div className="imgbot">
              <div className="locname">{locName||"..."}</div>
              {coords&&<div className="loccrd">{coords.lat.toFixed(4)}°N / {Math.abs(coords.lng).toFixed(4)}°W</div>}
            </div>
          </div>

          <div className="dash">
            <div className="gauge"><div className="gv">{toMph(coords?.speed)||parseInt(speedVal)||"—"}</div><div className="gl">MPH</div></div>
            <div className="gauge"><div className="gv d">{toDir(coords?.heading)}</div><div className="gl">DIR</div></div>
            <div className="gauge"><div className="gv t">{weather?`${weather.temp}°`:"—"}</div><div className="gl">°F</div></div>
          </div>

          <div className="sa">
            <div className="airbar">
              <div className="airlbl">{status==="ready"&&<div className="airdot"/>}{status==="loading"?T("gen"):T("air")}</div>
              <div className="timeinfo">{timeStr} · {tod}</div>
            </div>
            {status==="loading"&&<div className="ldtxt"><span className="sp">◌</span>&nbsp;{T("prep")}</div>}
            {showTxt&&story&&status!=="loading"&&<div className="stxt">{story}</div>}
            {!showTxt&&story&&status!=="loading"&&<div className="ldtxt">🔊</div>}
            {story&&status==="ready"&&(
              <div className="pgrow">
                <span className="pglbl">⟳ {T("nxt")}</span>
                <div className="pgbar"><div className="pgfill" style={{width:`${Math.max(0,(1-cd/50)*100)}%`}}/></div>
                <span className="pglbl">{cd}s</span>
              </div>
            )}
          </div>

          <div className="wakeinfo">{wakeLock?T("scrOn"):T("scrOff")}</div>

          <div className="togrow">
            <div className={`tog${showTxt?" act":""}`} onClick={()=>setShowTxt(t=>!t)}>{showTxt?T("tOn"):T("tOff")}</div>
            <div className={`tog spk${speaking?" going":""}`} onClick={()=>story&&speak(story)}>{speaking?T("spk"):T("rpl")}</div>
            <div className={`tog wake${wakeLock?" act":""}`} onClick={()=>wakeLock?wlRef.current?.release():requestWake()}>{wakeLock?T("awk"):T("wk")}</div>
          </div>

          <div className="voice-area">
            <button
              className={`mic-btn${micState==="listening"?" listening":micState==="processing"?" processing":""}`}
              onMouseDown={startVoice} onTouchStart={startVoice}
              onMouseUp={stopVoice} onTouchEnd={stopVoice}
              onClick={micState==="idle"?undefined:undefined}
            >
              {micState==="listening"?T("micL"):micState==="processing"?T("micP"):T("mic")}
            </button>
          </div>

          {err&&<div className="errbox" style={{margin:"0 14px 8px"}}>⚠ {err}</div>}

          {qMode&&(
            <div className="qa">
              <input className="qi" value={qText} onChange={e=>setQText(e.target.value)} placeholder={T("qph")} onKeyDown={e=>e.key==="Enter"&&sendQ()} autoFocus/>
              <div className="qbs">
                <button className="btn bsend" style={{flex:1,padding:"11px"}} onClick={sendQ}>{T("send")}</button>
                <button className="btn bcancel" style={{padding:"11px"}} onClick={()=>{setQMode(false);setQText("");}}>{T("cnl")}</button>
              </div>
            </div>
          )}

          <div className="ctrl">
            <button className="btn bstop" onClick={stop}>{T("stop")}</button>
            <button className="btn bq" onClick={()=>setQMode(t=>!t)}>{T("ask")}</button>
          </div>
        </>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
