<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Road Radio">
<link rel="manifest" href='data:application/manifest+json,{"name":"Road Radio","short_name":"Road Radio","start_url":".","scope":".","display":"standalone","orientation":"portrait","background_color":"%23100c1e","theme_color":"%23100c1e","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22512%22 height=%22512%22%3E%3Crect width=%22512%22 height=%22512%22 fill=%22%23100c1e%22/%3E%3Ctext x=%2250%25%22 y=%2258%25%22 font-size=%22300%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22%3E%F0%9F%93%BB%3C/text%3E%3C/svg%3E","sizes":"512x512","type":"image/svg+xml","purpose":"any maskable"}]}'>
<title>Road Radio</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#0a0a14;height:100%;overscroll-behavior:none;}
body{font-family:'Inter',sans-serif;color:#fff;}
.app{min-height:100vh;background:linear-gradient(165deg,#1e1838 0%,#16122a 45%,#100c1e 100%);display:flex;flex-direction:column;max-width:500px;margin:0 auto;}

/* SPLASH */
.splash{position:fixed;inset:0;background:#0a0a14;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;animation:splashOut 0.5s ease forwards 2.8s;}
@keyframes splashOut{to{opacity:0;pointer-events:none;}}
.sp-logo{font-family:'Orbitron',monospace;font-size:40px;font-weight:900;color:#ff6b35;letter-spacing:3px;}
.sp-logo em{color:#4a9eff;font-style:normal;}
.sp-ver{font-family:'Orbitron',monospace;font-size:14px;color:#7a8ba0;letter-spacing:4px;margin-top:-8px;}
.sp-line{width:0;height:2px;background:linear-gradient(to right,#ff6b35,#4a9eff);border-radius:2px;animation:lineG .9s ease .2s forwards;}
@keyframes lineG{to{width:140px}}
.sp-tag{font-size:18px;color:#aabbcc;letter-spacing:1px;text-align:center;opacity:0;animation:fadeI .6s ease .8s forwards;}
@keyframes fadeI{to{opacity:1}}
.sp-dots{display:flex;gap:8px;margin-top:6px;}
.sp-dot{width:9px;height:9px;border-radius:50%;animation:dotP 1.4s ease-in-out infinite;}
.sp-dot:nth-child(1){background:#ff6b35;}
.sp-dot:nth-child(2){background:#f5c842;animation-delay:.2s;}
.sp-dot:nth-child(3){background:#4a9eff;animation-delay:.4s;}
@keyframes dotP{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.6);opacity:1}}

/* INSTALL BANNER */
.install-banner{background:#0d1828;border-bottom:2px solid #4a9eff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.install-txt{font-size:14px;color:#aabbcc;flex:1;}
.install-txt b{color:#4a9eff;}
.install-btn{background:#4a9eff;color:#0a0a14;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
.install-x{background:none;border:none;color:#9aabbf;font-size:20px;cursor:pointer;padding:4px;}

/* HEADER */
.hdr{padding:12px 16px;border-bottom:2px solid #1e2d45;display:flex;align-items:center;justify-content:space-between;background:#060912;position:sticky;top:0;z-index:98;}
.logo-wrap{display:flex;flex-direction:column;}
.logo{font-family:'Orbitron',monospace;font-size:17px;font-weight:900;letter-spacing:2px;color:#ff6b35;}
.logo em{color:#4a9eff;font-style:normal;}
.logo-ver{font-family:'Orbitron',monospace;font-size:15px;color:#ffffff;letter-spacing:3px;margin-top:2px;opacity:1;font-weight:700;}
.hdr-r{display:flex;align-items:center;gap:8px;}
.langsel{background:#0d1525;border:2px solid #4a9eff;border-radius:8px;padding:6px 9px;color:#4a9eff;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;cursor:pointer;outline:none;}
.setbtn{background:#0d1525;border:2px solid #1e2d45;border-radius:8px;padding:6px 12px;color:#aabbcc;font-size:18px;cursor:pointer;outline:none;}
.pill{display:flex;align-items:center;gap:6px;padding:6px 13px;border-radius:20px;border:2px solid #1e2d45;background:#0d1525;}
.dot{width:10px;height:10px;border-radius:50%;}
.dot.on{background:#00e87a;box-shadow:0 0 10px #00e87a;animation:pulse 1.5s infinite;}
.dot.ld{background:#f5c842;box-shadow:0 0 8px #f5c842;animation:pulse .8s infinite;}
.dot.off{background:#334466;}
.ptxt{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:2px;color:#aabbcc;text-transform:uppercase;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ONBOARDING */
.onboard{flex:1;display:flex;flex-direction:column;padding:24px 20px;gap:0;}
.ob-progress{display:flex;gap:6px;margin-bottom:28px;}
.ob-step{flex:1;height:3px;border-radius:2px;background:#1e2d45;}
.ob-step.done{background:#ff6b35;}
.ob-step.active{background:#4a9eff;}
.ob-title{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:#ff6b35;letter-spacing:2px;margin-bottom:8px;}
.ob-sub{font-size:16px;color:#aabbcc;margin-bottom:24px;line-height:1.6;}
.ob-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:auto;}
.ob-item{padding:16px 12px;background:#0d1525;border:2px solid #1e2d45;border-radius:12px;cursor:pointer;text-align:center;transition:all .15s;}
.ob-item.sel{border-color:#ff6b35;background:#1a0c05;}
.ob-item-icon{font-size:28px;display:block;margin-bottom:6px;}
.ob-item-lbl{font-size:14px;font-weight:700;color:#aabbcc;}
.ob-item.sel .ob-item-lbl{color:#ff6b35;}
.ob-actions{display:flex;gap:10px;margin-top:24px;}
.ob-skip{flex:1;padding:16px;background:transparent;border:2px solid #1e2d45;border-radius:12px;color:#9aabbf;font-size:15px;cursor:pointer;}
.ob-next{flex:2;padding:16px;background:linear-gradient(135deg,#0d3a0d,#1a6a1a);border:2px solid #2a6a2a;border-radius:12px;color:#00e87a;font-size:16px;font-weight:700;cursor:pointer;}
.ob-install{background:#0d1828;border:2px solid #4a9eff;border-radius:14px;padding:20px;text-align:center;margin-bottom:20px;}
.ob-install-icon{font-size:48px;margin-bottom:12px;}
.ob-install-title{font-family:'Orbitron',monospace;font-size:16px;color:#4a9eff;margin-bottom:8px;letter-spacing:1px;}
.ob-install-text{font-size:14px;color:#778899;line-height:1.6;margin-bottom:16px;}
.ob-install-btn{width:100%;padding:16px;background:#4a9eff;border:none;border-radius:12px;color:#0a0a14;font-size:16px;font-weight:700;cursor:pointer;}

/* OVERLAY / SETTINGS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:flex;align-items:flex-end;}
.sheet{background:#060912;border-top:2px solid #1e2d45;border-radius:20px 20px 0 0;padding:24px 18px 34px;width:100%;max-width:500px;margin:0 auto;max-height:90vh;overflow-y:auto;}
.sheet-title{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;color:#ff6b35;margin-bottom:20px;letter-spacing:2px;}
.set-sect{font-family:'Orbitron',monospace;font-size:12px;color:#8a9bb0;letter-spacing:2px;text-transform:uppercase;margin:18px 0 10px;}
.bcast-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.bcast-btn{padding:13px 12px;background:#0d1525;border:2px solid #1e2d45;border-radius:12px;cursor:pointer;display:flex;align-items:center;gap:10px;}
.bcast-btn.sel{border-color:#aa66ff;background:#0d0a1a;}
.bcast-icon{font-size:22px;flex-shrink:0;}
.bcast-name{font-size:14px;font-weight:700;color:#aabbcc;}
.bcast-desc{font-size:12px;color:#8a9bb0;margin-top:2px;}
.bcast-btn.sel .bcast-name{color:#cc88ff;}
.mode-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.mode-btn{padding:14px 4px;background:#0d1525;border:2px solid #1e2d45;border-radius:10px;text-align:center;cursor:pointer;}
.mode-btn.sel{border-color:#ff6b35;background:#1a0c05;}
.mode-icon{font-size:24px;display:block;margin-bottom:5px;}
.mode-lbl{font-family:'Orbitron',monospace;font-size:8px;color:#778899;letter-spacing:1px;text-transform:uppercase;}
.mode-btn.sel .mode-lbl{color:#ff6b35;}
.voice-sel{width:100%;background:#0d1525;border:2px solid #4a9eff;border-radius:10px;padding:12px 14px;color:#4a9eff;font-size:14px;outline:none;margin-top:4px;}
.tts-btn{width:100%;padding:14px;background:#0d1828;border:2px solid #4a9eff;border-radius:10px;color:#4a9eff;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;}
.tts-btn.rec{border-color:#ff5a5a;color:#ff8a8a;background:#1c0d0d;}
.voice-list{display:flex;flex-direction:column;gap:6px;margin-bottom:6px;max-height:300px;overflow-y:auto;}
.voice-collapse{display:flex;justify-content:space-between;align-items:center;background:#0d1525;border:2px solid #2a4a80;border-radius:10px;padding:14px 14px;color:#cfe0f0;font-size:15px;cursor:pointer;margin-bottom:6px;}
.voice-row{display:flex;align-items:center;gap:8px;background:#0d1525;border:2px solid #1e2d45;border-radius:10px;padding:2px 4px 2px 0;}
.voice-row.sel{border-color:#3fb950;background:#0d1a0d;}
.voice-pick{flex:1;padding:13px 12px;color:#cfe0f0;font-size:15px;cursor:pointer;}
.voice-row.sel .voice-pick{color:#7af0a0;font-weight:700;}
.voice-play{width:48px;height:42px;flex-shrink:0;border:none;border-radius:8px;background:#13233f;color:#7ac0ff;font-size:16px;cursor:pointer;}
.voice-play:active{background:#1e3a60;}
.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.topic-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#0d1525;border:2px solid #1e2d45;border-radius:10px;cursor:pointer;}
.topic-item.on{border-color:#cc3333;background:#1a0808;}
.topic-check{width:22px;height:22px;border-radius:6px;background:#1a2535;border:2px solid #334455;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;color:#fff;}
.topic-item.on .topic-check{background:#cc3333;border-color:#cc3333;}
.topic-item.on2{border-color:#3fb950;background:#0d1a0d;}
.topic-item.on2 .topic-check.on{background:#3fb950;border-color:#3fb950;}
.topic-lbl{font-size:14px;color:#aabbcc;font-weight:600;}
.topic-item.on .topic-lbl{color:#ff9090;}

/* INPUTS */
.flabel{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:2px;color:#4a9eff;text-transform:uppercase;margin-bottom:10px;display:block;}
.finput{background:#0d1525;border:2px solid #fff;border-radius:12px;padding:17px 18px;color:#fff;font-size:19px;outline:none;width:100%;}
.finput::placeholder{color:#8a9bb0;font-size:16px;}
.finput:focus{border-color:#4a9eff;}
.kinput{background:#0d1525;border:2px solid #fff;border-radius:12px;padding:16px 18px;color:#fff;font-size:15px;font-family:monospace;outline:none;width:100%;letter-spacing:1px;}
.kinput::placeholder{color:#8a9bb0;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.dirhint{font-size:13px;color:#667788;margin-top:6px;}
.errbox{padding:14px;background:#1a0606;border:2px solid #aa2020;border-radius:10px;color:#ff9090;font-size:15px;font-weight:600;}
.bigbtn{border-radius:14px;padding:19px;font-size:17px;font-weight:700;cursor:pointer;width:100%;letter-spacing:1px;border:2px solid transparent;}
.bigbtn.green{background:linear-gradient(135deg,#0d3a0d,#1a6a1a);color:#00e87a;border-color:#2a6a2a;}
.bigbtn.blue{background:#0d1828;color:#4a9eff;border-color:#2a4a80;}
.sep{display:flex;align-items:center;gap:12px;color:#9aabbf;font-size:15px;}
.sep:before,.sep:after{content:'';flex:1;height:1px;background:#1e2d45;}

/* SETUP + KEY */
.keyscreen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:22px;text-align:center;}
.key-icon{font-size:60px;}
.key-title{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#ff6b35;letter-spacing:2px;}
.key-sub{font-size:17px;color:#aabbcc;line-height:1.7;}
.key-sub a{color:#4a9eff;text-decoration:none;}
.setup{flex:1;padding:22px 18px;display:flex;flex-direction:column;gap:17px;}
.s-hero{text-align:center;}
.s-icon{font-size:54px;margin-bottom:9px;}
.s-title{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#ff6b35;letter-spacing:2px;margin-bottom:6px;}
.s-sub{font-size:17px;color:#aabbcc;line-height:1.5;}
.geobtn{background:#0d1828;border:2px solid #4a9eff;border-radius:12px;padding:17px;color:#4a9eff;font-size:16px;font-weight:700;cursor:pointer;width:100%;}
.geobtn.ok{border-color:#00e87a;color:#00e87a;background:#071410;}

/* DJ AVATAR */
.dj-zone{position:relative;height:250px;overflow:hidden;flex-shrink:0;background:transparent;display:flex;align-items:center;justify-content:center;}
.dj-zone.focus{height:auto;flex:1;min-height:0;transition:none;align-items:flex-start;padding-top:6vh;}
.dj-canvas{position:absolute;left:0;top:0;width:100%;height:230px;}
.dj-zone.focus .dj-canvas{top:6vh;transform:none;}
.focus-col{position:absolute;left:0;right:0;top:8px;display:flex;flex-direction:row;justify-content:space-around;gap:8px;z-index:5;}
.fc-item{text-align:center;}
.fc-v{font-family:'Orbitron',monospace;font-size:30px;font-weight:900;color:#f3d27a;line-height:1;}
.fc-l{font-size:13px;color:#cdb87a;letter-spacing:2px;font-weight:700;}
.focus-hint{position:absolute;bottom:12px;left:0;right:0;text-align:center;font-size:13px;color:#8a7a5a;letter-spacing:1px;}
.focus-ctrl{padding:12px 14px;}
.dj-canvas{position:absolute;left:0;top:0;width:100%;height:230px;}
.dj-zone.focus .dj-canvas{top:50%;transform:translateY(-55%);}
.dj-over{display:none;}
.dj-info{position:absolute;bottom:0;left:0;right:0;padding:8px 18px;background:transparent;}
.dj-hw{font-family:'Orbitron',monospace;font-size:13px;font-weight:900;color:#00e87a;letter-spacing:2px;margin-bottom:3px;}
.dj-loc{font-family:'Orbitron',monospace;font-size:14px;color:#f0a850;text-transform:uppercase;letter-spacing:2px;margin-bottom:3px;font-weight:700;}
.dj-crd{font-family:'Orbitron',monospace;font-size:12px;color:#d8e2ee;letter-spacing:1px;}
.dj-poi{font-size:11px;color:#6aa0d8;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dj-top{position:absolute;top:0;left:0;right:0;padding:10px 14px;display:flex;justify-content:space-between;}
.weather-badge{background:rgba(6,9,18,.9);border:1px solid #1e2d45;border-radius:16px;padding:6px 14px;font-family:'Orbitron',monospace;font-size:12px;color:#f5c842;}
.bcast-badge{background:rgba(6,9,18,.9);border:1px solid #1e2d45;border-radius:16px;padding:6px 10px;font-size:18px;}

/* ROAD BG (text mode) */
.road-bg{position:relative;height:200px;overflow:hidden;flex-shrink:0;background:#04060e;}
.road-canvas{position:absolute;inset:0;width:100%;height:100%;}
.road-over{position:absolute;inset:0;background:linear-gradient(to top,rgba(5,7,15,1) 0%,rgba(5,7,15,.15) 65%,transparent 100%);}
.road-top{position:absolute;top:0;left:0;right:0;padding:10px 14px;display:flex;justify-content:space-between;}
.road-bot{position:absolute;bottom:0;left:0;right:0;padding:12px 18px;}
.road-hw{font-family:'Orbitron',monospace;font-size:13px;font-weight:900;color:#00e87a;letter-spacing:2px;margin-bottom:3px;}
.road-loc{font-family:'Orbitron',monospace;font-size:14px;color:#f0a850;text-transform:uppercase;letter-spacing:2px;margin-bottom:3px;font-weight:700;}
.road-crd{font-family:'Orbitron',monospace;font-size:12px;color:#d8e2ee;letter-spacing:1px;}
.road-poi{font-size:11px;color:#6aa0d8;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* DASH */
.dash{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:12px 14px;border-bottom:2px solid #1e2d45;}
.gauge{text-align:center;padding:14px 6px;background:#0d1525;border:2px solid #1e2d45;border-radius:12px;}
.gv{font-family:'Orbitron',monospace;font-size:30px;font-weight:900;color:#00e87a;line-height:1;}
.gv.d{font-size:26px;color:#4a9eff;}
.gv.t{font-size:24px;color:#f5c842;}
.gl{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;color:#667788;text-transform:uppercase;margin-top:6px;}

/* STORY */
.sa{flex:1;padding:16px 18px 10px;overflow-y:auto;}
.airbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.airlbl{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:3px;color:#667788;text-transform:uppercase;display:flex;align-items:center;gap:6px;}
.airdot{width:8px;height:8px;border-radius:50%;background:#ff6b35;animation:pulse 1.4s infinite;}
.timeinfo{font-family:'Orbitron',monospace;font-size:10px;color:#7a8ba0;letter-spacing:1px;}
.stxt{font-size:23px;line-height:1.85;color:#fff;font-style:italic;animation:fadeUp .5s ease;}
.ldtxt{color:#667788;font-family:'Orbitron',monospace;font-size:13px;display:flex;align-items:center;gap:10px;letter-spacing:1px;}
.spinico{display:inline-block;animation:spin 1s linear infinite;}
.pgrow{display:flex;align-items:center;gap:10px;margin-top:12px;}
.pglbl{font-family:'Orbitron',monospace;font-size:10px;color:#889aaa;white-space:nowrap;}
.pgbar{flex:1;height:3px;background:#1a2535;border-radius:2px;overflow:hidden;}
.pgfill{height:100%;background:linear-gradient(to right,#ff6b35,#f5c842);border-radius:2px;transition:width 1s linear;}
.eq{display:flex;align-items:flex-end;justify-content:center;gap:5px;height:70px;padding:14px 0 4px;}
.eq span{width:6px;height:10px;border-radius:3px;background:linear-gradient(to top,#ff6b35,#4a9eff);opacity:.45;}
.eq.live span{animation:eqp .7s ease-in-out infinite;opacity:1;}
@keyframes eqp{0%,100%{height:10px;}50%{height:54px;}}

/* MIC TRANSCRIPT */
.mic-transcript{background:#0d1828;border:1px solid #2a4a80;border-radius:10px;padding:12px 14px;margin:8px 14px;font-size:16px;color:#aabbcc;min-height:44px;max-height:120px;overflow-y:auto;font-style:italic;}

/* PARKED MODAL */
.parked-modal{position:fixed;bottom:0;left:0;right:0;max-width:500px;margin:0 auto;background:#080c18;border-top:2px solid #4a9eff;padding:22px 18px 30px;z-index:150;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.parked-title{font-family:'Orbitron',monospace;font-size:15px;color:#4a9eff;letter-spacing:2px;margin-bottom:8px;}
.parked-sub{font-size:15px;color:#aabbcc;margin-bottom:18px;}
.parked-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.parked-btn{padding:18px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:2px solid transparent;}
.parked-btn.go{background:#0d3a0d;color:#00e87a;border-color:#2a6a2a;}
.parked-btn.wait{background:#0d1828;color:#4a9eff;border-color:#2a4a80;}

/* BOTTOM CONTROLS */
.bottom-ctrl{padding:12px 14px 26px;border-top:2px solid #1e2d45;}
.main-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
.mbtn{padding:18px 8px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;text-align:center;border:2px solid transparent;}
.mbtn:active{transform:scale(.96);}
.mbtn.stop{background:linear-gradient(135deg,#2e0d0d,#5a1a1a);color:#ff9090;border-color:#5a2020;}
.mbtn.mic{background:#0d1828;color:#4a9eff;border-color:#2a4a80;font-size:16px;}
.mbtn.mic.listening{background:#1a0808;border-color:#ff4444;color:#ff4444;animation:pulse .8s infinite;}
.mbtn.mic.processing{background:#080e1a;border-color:#f5c842;color:#f5c842;}
.mbtn.djtog{background:#0d1525;color:#aa66ff;border-color:#3a2060;font-size:20px;}
.mbtn.djtog.on{border-color:#aa66ff;background:#0d0a1a;}
.sec-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

  // Wikipedia: find real articles near the coords and fetch a short extract to retell. Cached per session.
  const wikiCacheRef=useRef({});

  const fetchWiki=async(lat,lng,langCode)=>{
    try{
      const wl=(["ru","uk","es","de","fr","pt"].includes(langCode))?langCode:"en";
      const base=`https://${wl}.wikipedia.org/w/api.php`;
      // Gather candidates from progressively wider rings so a sparse area still yields variety.
      let pages=[];
      for(const radius of [10000,25000,50000,90000]){
        const u=`${base}?action=query&list=geosearch&gscoord=${lat}%7C${lng}&gsradius=${radius}&gslimit=20&format=json&origin=*`;
        try{const r=await fetch(u);const d=await r.json();const got=(d.query&&d.query.geosearch)||[];
          for(const p of got){if(!pages.find(x=>x.pageid===p.pageid))pages.push(p);}
        }catch{}
        if(pages.length>=8)break;
      }
      if(!pages.length)return null;
      const used=wikiCacheRef.current;
      // Prefer an article we have NOT used yet this session. If every nearby article is used up,
      // return null so the host talks about the wider region instead of re-reading the same page.
      let fresh=pages.find(p=>!used[p.pageid]);
      if(!fresh)return null;
      used[fresh.pageid]=true;
      const exUrl=`${base}?action=query&prop=extracts&exintro=1&explaintext=1&pageids=${fresh.pageid}&format=json&origin=*`;
      const er=await fetch(exUrl);const ed=await er.json();
      const page=ed.query&&ed.query.pages&&ed.query.pages[fresh.pageid];
      let extract=(page&&page.extract)||"";
      if(extract.length>1500)extract=extract.slice(0,1500);
      if(!extract)return null;
      wikiRecentTitlesRef.current=[...wikiRecentTitlesRef.current,fresh.title].slice(-12);
      return {title:fresh.title,dist:fresh.dist,extract};
    }catch{return null;}
  };

  const fetchPOI=async(lat,lng,hdg)=>{
    try{
      const q=`[out:json][timeout:10];(node["place"~"city|town|village|hamlet"](around:12000,${lat},${lng});way["waterway"~"river|stream"]["name"](around:6000,${lat},${lng});node["natural"~"peak|lake"](around:8000,${lat},${lng});way["bridge"="yes"]["name"](around:4000,${lat},${lng});node["historic"](around:6000,${lat},${lng});way["tourism"="theme_park"](around:9000,${lat},${lng});node["tourism"="theme_park"](around:9000,${lat},${lng});way["leisure"="park"]["name"](around:5000,${lat},${lng}););out body center qt 22;`;
      const r=await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(q)}`);
      const d=await r.json();
      const R=3958.8,rad=x=>x*Math.PI/180;
      const dist=(la,lo)=>{const dLa=rad(la-lat),dLo=rad(lo-lng);const a=Math.sin(dLa/2)**2+Math.cos(rad(lat))*Math.cos(rad(la))*Math.sin(dLo/2)**2;return 2*R*Math.asin(Math.sqrt(a));};

      const c={lat:pos.coords.latitude,lng:pos.coords.longitude,speed:pos.coords.speed||0,heading:pos.coords.heading};
      coordsRef.current=c;setCoords(c);

      if(wt%12===0)reverseGeocode(c.lat,c.lng);
    },()=>{},{enableHighAccuracy:true,maximumAge:3000});
  };

  const startTour=async()=>{
    let c=coordsRef.current||parseCoords();
    if(!c){setErr(lang==="ru"?"Нажмите автоопределение или введите координаты":"Tap auto-detect or enter coordinates");return;}
    coordsRef.current=c;setCoords(c);destRef.current=destination;
    runRef.current=true;histRef.current=[];nextRef.current=null;topicsUsedRef.current=[];saidFactsRef.current=[];bufferRef.current=[];recentStoriesRef.current=[];
    dirTopicRef.current=null;dirCountRef.current=0;dirTargetRef.current=2;dirRecentTopicsRef.current=[];dirSummariesRef.current=[];coveredEntitiesRef.current=[];dirTopicStartRef.current=0;dirForceSwitchRef.current=false;lastIntroBcastRef.current=bcastRef.current;qaHistRef.current=[];
    openerIdx.current=0;stoppedSince.current=null;fuelWarnedRef.current=0;tourAckRef.current=false;
    loopBusyRef.current=false;loopGenRef.current++;        // fresh single generation
    parkedRef.current=false;pausedRef.current=false;setPaused(false);
    setErr("");setStory("");setParked(false);
    setScreen("main");startGeoWatch();
    await requestWake();fetchWeather(c.lat,c.lng);
    // Greeting: first ever launch vs. returning driver
    const isRu=langRef.current==="ru";
    const everStarted=localStorage.getItem("rr_started");
    const hw=locDataRef.current.highway;const dir=toDirWord(coordsRef.current?.heading||90,langRef.current);
    const roadPart=hw?(isRu?` Едем по трассе ${hw} на ${dir}.`:` We're on ${hw} heading ${dir}.`):(isRu?` Едем на ${dir}.`:` Heading ${dir}.`);
    const tagline=isRu?" Я расскажу всё самое интересное о местах, мимо которых вы едете. В настройках можно выбрать один из стилей ведущего и темы для эфира по этой местности. Приятного путешествия!":" I'll tell you the most interesting things about the places you pass. In settings you can choose a host style and the topics for the broadcast in this area. Enjoy the trip!";
    const greet=everStarted
      ?(isRu?`Вы снова на Дорожном Радио.${roadPart}${tagline}`:`You're back on Road Radio.${roadPart}${tagline}`)
      :(isRu?`Здравствуйте, вы на Дорожном Радио.${roadPart}${tagline}`:`Hello, you're on Road Radio.${roadPart}${tagline}`);
    roadReminderRef.current=Date.now();
    localStorage.setItem("rr_started","1");localStorage.setItem("rr_review",String(Date.now()));setNeedsReview(false);
    const g=loopGenRef.current;
    await speak(greet);
    if(runRef.current&&loopGenRef.current===g)loopRef.current?.(false,false);
  };

  const stop=()=>{
    runRef.current=false;loopGenRef.current++;loopBusyRef.current=false;bufferRef.current=[];
    if(loopRef.current?.scheduled)clearTimeout(loopRef.current.scheduled);
    hardStop();setStatus("idle");
    try{wlRef.current?.release();}catch{}setWakeLock(false);
    if(cdRef.current)clearInterval(cdRef.current);
    setScreen("setup");
  };

  const skipTopic=()=>{
    if(!runRef.current)return;
    dirForceSwitchRef.current=true;   // director will open a new topic
    dirTopicStartRef.current=0;       // bypass minimum-dwell so the manual skip is instant
    nextRef.current=null;bufferRef.current=[];  // drop any prepared segment

    hardStop();setStatus("loading");

  };

  const pauseStartRef=useRef(0);
  const togglePause=()=>{
    if(pausedRef.current){
      // resume — shift the topic timer forward by however long we were paused, so the
      // director continues the SAME topic instead of thinking its time ran out.
      pausedRef.current=false;setPaused(false);
      if(pauseStartRef.current&&dirTopicStartRef.current){
        dirTopicStartRef.current+=(Date.now()-pauseStartRef.current);
      }
      pauseStartRef.current=0;
      if(runRef.current){loopGenRef.current++;const g=loopGenRef.current;setTimeout(()=>{if(runRef.current&&!pausedRef.current&&loopGenRef.current===g)loopRef.current?.(false,false);},400);}
    }else{
      // pause: stop talking, stop scheduling, keep all state/position
      pausedRef.current=true;setPaused(true);
      pauseStartRef.current=Date.now();
      loopGenRef.current++;
      if(loopRef.current?.scheduled)clearTimeout(loopRef.current.scheduled);
      hardStop();setStatus("ready");
    }
  };

  const openCall=async()=>{
    hardStop();loopGenRef.current++;
    if(loopRef.current?.scheduled)clearTimeout(loopRef.current.scheduled);
    nextRef.current=null;bufferRef.current=[];   // drop any queued road segment so it can't play over the answer
    pausedRef.current=true;setPaused(true);   // hold the broadcast during the call
    callTextRef.current="";userDoneRef.current=false;setMicTranscript("");
    setCallMode(true);setCallPhase("greeting");callPhaseRef.current="greeting";

    const greet=isRu
      ?"Слушаю."
      :"I'm listening.";
    await speak(greet);
    if(callPhaseRef.current!=="greeting")return;   // user cancelled
    setCallPhase("listening");callPhaseRef.current="listening";
    callListen();
  };

  // Collapse accidental repeats like "стою стою стою" and cap length so the screen can never overflow.
  const cleanTranscript=s=>{
    let out=(s||"").replace(/\s+/g," ").trim();
    // remove immediate duplicated words
    out=out.replace(/\b(\S+)(\s+\1\b)+/gi,"$1");
    // remove immediate duplicated short phrases (2-5 words)
    out=out.replace(/\b((?:\S+\s+){1,4}\S+)\s+\1\b/gi,"$1");
    if(out.length>400)out=out.slice(-400);
    return out;
  };

  const callListen=()=>{
    try{
      const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
      if(!SR){setCallPhase("type");callPhaseRef.current="type";return;}   // fall back to typing
      const rec=new SR();
      rec.lang=L[langRef.current]?.tts||"en-US";
      rec.continuous=true;rec.interimResults=true;   // one session (no repeated chime)
      let committed="";  // finals accepted this session
      rec.onresult=e=>{
        let finals="",interim="";
        for(let i=e.resultIndex;i<e.results.length;i++){
          if(e.results[i].isFinal)finals+=e.results[i][0].transcript+" ";
          else interim=e.results[i][0].transcript;
        }
        if(finals)committed=cleanTranscript(committed+" "+finals);
        setMicTranscript(cleanTranscript(callTextRef.current+" "+committed+" "+interim));
      };
      rec.onerror=()=>{};
      rec.onend=()=>{
        if(committed)callTextRef.current=cleanTranscript(callTextRef.current+" "+committed);
        committed="";
        setMicTranscript(callTextRef.current);
        // No auto-restart (restart = the repeated chime + duplicated words). The mic simply stops;
        // whatever was captured stays on screen, and the user taps "I'm done" to send.
      };
      callRecRef.current=rec;
      rec.start();
    }catch{setCallPhase("type");callPhaseRef.current="type";}
  };

  const finishCall=()=>{   // user pressed "I'm done"
    userDoneRef.current=true;
    closeCall(callTextRef.current.trim());
  };

  const closeCall=async(spoken)=>{
    try{callRecRef.current&&callRecRef.current.stop();}catch{}
    setCallPhase("closing");callPhaseRef.current="closing";setMicTranscript("");
    const isRu=langRef.current==="ru";
    let answer="";
    if(spoken&&spoken.trim()){
      // This button is ONLY a question about the current place. Answer it; do NOT save as a preference.
      try{
        const res=await callClaude(buildSys(true,spoken,false),spoken,false);
        answer=(res&&res.story)?res.story:"";

      }catch{}
    }
    setCallMode(false);setCallPhase("idle");callPhaseRef.current="idle";
    // Speak the DJ's answer on air, then resume the show.
    if(answer){
      const g=++loopGenRef.current;
      await speak(answer);
      pausedRef.current=false;setPaused(false);
      if(runRef.current){loopBusyRef.current=false;loopGenRef.current++;const g2=loopGenRef.current;setTimeout(()=>{if(runRef.current&&loopGenRef.current===g2)loopRef.current?.(false,false);},500);}
    }else{
      pausedRef.current=false;setPaused(false);
      if(runRef.current){loopBusyRef.current=false;loopGenRef.current++;const g=loopGenRef.current;setTimeout(()=>{if(runRef.current&&loopGenRef.current===g)loopRef.current?.(false,false);},500);}
    }
  };

  const cancelCall=()=>{
    userDoneRef.current=true;

  };

  const startVoice=()=>{
    hardStop();                              // kill narrator instantly (triple cancel)
    loopGenRef.current++;                     // freeze the running loop generation
    if(loopRef.current?.scheduled)clearTimeout(loopRef.current.scheduled);
    try{
      const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
      if(!SR){setQMode(true);return;}
      const rec=new SR();
      rec.lang=L[lang]?.tts||"en-US";
      rec.continuous=false;rec.interimResults=true;
      rec.onstart=()=>setMicState("listening");
      rec.onresult=e=>{
        const interim=Array.from(e.results).map(r=>r[0].transcript).join("");
        setMicTranscript(interim);

          const q=e.results[e.results.length-1][0].transcript;
          setMicState("processing");setMicTranscript("");

              setTimeout(()=>{if(runRef.current&&!parkedRef.current&&loopGenRef.current===g)loopRef.current?.(false,false);},800);

          }).catch(()=>setMicState("idle"));
        }
      };
      rec.onerror=()=>{setMicState("idle");setMicTranscript("");};
      rec.onend=()=>setMicState(s=>s==="listening"?"idle":s);
      rec.start();
    }catch{setQMode(true);}
  };

  const saveKey=()=>{

  const wBadge=weather?`${getWI(weather.code)} ${weather.temp}°F`:null;
  const bmObj=BCASTS.find(b=>b.id===bcastMode)||BCASTS[0];

  const curVoices=voices.filter(v=>v.lang.startsWith((L[lang]?.tts||"en-US").split("-")[0]));

            <div className="topic-grid">
              <div className={`topic-item${topicHistory?" on2":""}`} onClick={()=>guardTopicOff(topicHistory,()=>setTopicHistory(v=>!v))}><div className="topic-check on">{topicHistory?"✓":""}</div><div className="topic-lbl">{isRu?"История места":"Local history"}</div></div>
              <div className={`topic-item${topicWildlife?" on2":""}`} onClick={()=>guardTopicOff(topicWildlife,()=>setTopicWildlife(v=>!v))}><div className="topic-check on">{topicWildlife?"✓":""}</div><div className="topic-lbl">{isRu?"Животные (и древние)":"Wildlife (& ancient)"}</div></div>
              <div className={`topic-item${topicGeology?" on2":""}`} onClick={()=>guardTopicOff(topicGeology,()=>setTopicGeology(v=>!v))}><div className="topic-check on">{topicGeology?"✓":""}</div><div className="topic-lbl">{isRu?"Природа и геология":"Land & geology"}</div></div>
              <div className={`topic-item${topicCulture?" on2":""}`} onClick={()=>guardTopicOff(topicCulture,()=>setTopicCulture(v=>!v))}><div className="topic-check on">{topicCulture?"✓":""}</div><div className="topic-lbl">{isRu?"Культура и быт":"Culture & life"}</div></div>
              <div className={`topic-item${topicFilms?" on2":""}`} onClick={()=>guardTopicOff(topicFilms,()=>setTopicFilms(v=>!v))}><div className="topic-check on">{topicFilms?"✓":""}</div><div className="topic-lbl">{isRu?"Где снимали фильмы":"Movie locations"}</div></div>
              <div className={`topic-item${topicFamous?" on2":""}`} onClick={()=>guardTopicOff(topicFamous,()=>setTopicFamous(v=>!v))}><div className="topic-check on">{topicFamous?"✓":""}</div><div className="topic-lbl">{isRu?"Знаменитости":"Famous people"}</div></div>
              <div className={`topic-item${topicPhoto?" on2":""}`} onClick={()=>guardTopicOff(topicPhoto,()=>setTopicPhoto(v=>!v))}><div className="topic-check on">{topicPhoto?"✓":""}</div><div className="topic-lbl">{isRu?"Фотозоны по пути":"Photo spots ahead"}</div></div>
              {[["music",isRu?"Музыка":"Music"],["sports",isRu?"Спорт":"Sports"],["politics",isRu?"Политика":"Politics"],["crime",isRu?"Криминал/детектив":"True crime"],["war",isRu?"Войны и битвы":"Wars & battles"],["native",isRu?"Индейцы":"Native heritage"],["architecture",isRu?"Архитектура":"Architecture"],["economy",isRu?"Промышленность":"Industry"],["legends",isRu?"Легенды":"Legends"],["food",isRu?"Еда и напитки":"Food & drink"]].map(([k,lbl])=>(
                <div key={k} className={`topic-item${isOn(k)?" on2":""}`} onClick={()=>guardTopicOff(isOn(k),()=>toggleMore(k))}><div className="topic-check on">{isOn(k)?"✓":""}</div><div className="topic-lbl">{lbl}</div></div>
              ))}
            </div>
            <div className="set-sect">{isRu?"Заправки":"Fuel stops"}</div>
            <div className={`topic-item${fuelAlerts?" on2":""}`} style={{marginBottom:"8px"}} onClick={()=>setFuelAlerts(v=>!v)}><div className="topic-check on">{fuelAlerts?"✓":""}</div><div className="topic-lbl">{isRu?"Предупреждать о заправках":"Warn about fuel stops"}</div></div>
            {fuelAlerts&&(
              <div style={{padding:"4px 2px 8px"}}>
                <div style={{fontSize:"13px",color:"#9aabbf",marginBottom:"6px"}}>{isRu?`Предупреждать, если до заправки больше: ${fuelMiles} миль`:`Warn if next fuel is over: ${fuelMiles} mi`}</div>
                <input type="range" min="10" max="80" step="5" value={fuelMiles} onChange={e=>setFuelMiles(parseInt(e.target.value))} style={{width:"100%"}}/>
              </div>
            )}
            <div className="set-sect">{isRu?"На остановках":"At stops"}</div>
            <div className={`topic-item${neverPark?" on2":""}`} style={{marginBottom:"8px"}} onClick={()=>setNeverPark(v=>!v)}><div className="topic-check on">{neverPark?"✓":""}</div><div className="topic-lbl">{isRu?"Не спрашивать — рассказывать даже стоя":"Don't ask — keep talking when stopped"}</div></div>
            <div className="set-sect">{isRu?"Мои пожелания диктору":"My requests to the host"}</div>
            <div style={{fontSize:"13px",color:"#9aabbf",margin:"0 2px 8px"}}>{isRu?"Скажите голосом или впишите, как вести эфир: «реже говори впереди вас», «больше про опасных животных». Диктор будет это учитывать.":"Say or type how to run the show: 'mention forks less', 'more about dangerous animals'. The host will follow these."}</div>
            {favs.length>0&&(
              <div style={{margin:"0 2px 10px"}}>
                {favs.map((f,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:"8px",background:"#0d1828",border:"1px solid #24364f",borderRadius:"10px",padding:"10px 12px",marginBottom:"6px"}}>
                    <div style={{flex:1,fontSize:"14px",color:"#dce8f5"}}>{i+1}. {f}</div>
                    <button onClick={()=>removeFav(i)} style={{background:"#3a1414",color:"#ff8a8a",border:"1px solid #5a2222",borderRadius:"8px",padding:"6px 10px",fontSize:"14px",cursor:"pointer"}}>✕</button>
                  </div>
                ))}
                <button className="tts-btn" style={{marginTop:"4px"}} onClick={clearFavs}>🧹 {isRu?"Очистить все пожелания":"Clear all requests"}</button>
              </div>
            )}
            <div style={{display:"flex",gap:"8px",margin:"0 2px 8px"}}>
              <input value={favText} onChange={e=>setFavText(e.target.value)} placeholder={isRu?"Впишите пожелание…":"Type a request…"} style={{flex:1,padding:"12px",fontSize:"14px",background:"#0a1422",border:"1px solid #24364f",borderRadius:"10px",color:"#fff"}}/>
              <button onClick={()=>{addFav(favText);setFavText("");}} style={{background:"#13351f",color:"#7ef0a8",border:"1px solid #1e5a34",borderRadius:"10px",padding:"0 16px",fontSize:"15px",fontWeight:700,cursor:"pointer"}}>+</button>
            </div>
            <button className={`tts-btn${favRec?" rec":""}`} onClick={()=>{
              try{
                const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
                if(!SR){alert(isRu?"Голосовой ввод не поддерживается — впишите текстом.":"Voice input unsupported — type instead.");return;}
                const rec=new SR();rec.lang=L[langRef.current]?.tts||"en-US";rec.interimResults=false;rec.continuous=false;
                setFavRec(true);
                rec.onresult=e=>{const t=e.results[0][0].transcript;addFav(t);};
                rec.onend=()=>setFavRec(false);rec.onerror=()=>setFavRec(false);
                rec.start();
              }catch{setFavRec(false);}
            }}>🎙 {favRec?(isRu?"Говорите…":"Speak…"):(isRu?"Наговорить пожелание":"Say a request")}</button>
            <div className="set-sect">{isRu?"Установка":"Install"}</div>
            <button className="tts-btn" onClick={installApp}>📱 {isRu?"Добавить на главный экран":"Add to Home Screen"}</button>
            <button className="bigbtn green" style={{marginTop:"18px"}} onClick={()=>setSettingsOpen(false)}>✓ {isRu?"Сохранить":"Save"}</button>
          </div>
        </div>
      )}

      <div className="hdr">
        <div className="logo-wrap">
          <div className="logo">Road <em>Radio</em></div>
          <div className="logo-ver">{VER}</div>
        </div>
        <div className="hdr-r">
          <button className="setbtn" onClick={()=>setSettingsOpen(true)}>⚙️</button>
          <select className="langsel" value={lang} onChange={e=>setLang(e.target.value)}>
            {LK.map(k=><option key={k} value={k}>{L[k].lb}</option>)}
          </select>
          <div className="pill"><div className={`dot ${dotCls}`}/><span className="ptxt">{stTxt}</span></div>
        </div>
      </div>

      {screen==="apikey"&&(
        <div className="keyscreen">
          <div className="key-icon">🔑</div>
          <div className="key-title">One-Time Setup</div>
          <div className="key-sub">Get free API key at<br/><a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a><br/>Free $5 — ~200 hours of stories</div>
          <div style={{width:"100%"}}><label className="flabel">Paste Anthropic API key</label><input className="kinput" value={apiInput} onChange={e=>setApiInput(e.target.value)} placeholder="sk-ant-api03-..."/></div>
          <button className="bigbtn blue" onClick={async()=>{try{const t=await navigator.clipboard.readText();if(t&&t.trim())setApiInput(t.trim());else setErr(isRu?"Буфер пуст — скопируйте ключ сначала":"Clipboard empty — copy the key first");}catch{setErr(isRu?"Не удалось прочитать буфер. Вставьте вручную.":"Couldn't read clipboard. Paste manually.");}}}>📋 {isRu?"Вставить из буфера":"Paste from clipboard"}</button>
          {err&&<div className="errbox">⚠ {err}</div>}
          <button className="bigbtn green" onClick={saveKey}>✓ Save & Start →</button>
          <div style={{fontSize:"14px",color:"#9aabbf",textAlign:"center"}}>{isRu?"Хранится только на вашем телефоне. Не чистите данные сайта, чтобы ключ не слетел.":"Stored only on your device. Don't clear site data or the key is lost."}</div>
        </div>
      )}

      {screen==="onboard"&&(
        <div className="onboard">
          <div className="ob-progress">
            {obSteps.map((_,i)=><div key={i} className={`ob-step${i<obStep?" done":i===obStep?" active":""}`}/>)}
          </div>
          <div className="ob-title">{curOb.title}</div>
          {curOb.sub&&curOb.sub!=="install"&&<div className="ob-sub">{curOb.sub}</div>}
          {curOb.sub==="install"?(
            <div className="ob-install">
              <div className="ob-install-icon">📱</div>
              <div className="ob-install-title">{isRu?"Рекомендуем!":"We Recommend!"}</div>
              <div className="ob-install-text">{isRu?"Установите Road Radio на главный экран телефона. Будет работать как приложение — без браузерной строки, быстрее, удобнее.":"Install Road Radio to your home screen. Works like a real app — no browser bar, faster, better."}</div>
              <button className="ob-install-btn" onClick={installApp}>{isRu?"📱 Установить на экран":"📱 Add to Home Screen"}</button>
            </div>
          ):(
            <div className="ob-grid">
              {curOb.items.slice(0,8).map(it=>(
                <div key={it.id} className={`ob-item${curOb.selVal===it.id?" sel":""}`} onClick={()=>curOb.onSel(it.id)}>
                  <span className="ob-item-icon">{it.icon}</span>
                  <div className="ob-item-lbl">{it.label}</div>
                </div>
              ))}
            </div>
          )}
          <div className="ob-actions">
            <button className="ob-skip" onClick={finishOnboard}>{isRu?"Пропустить всё →":"Skip all →"}</button>
            <button className="ob-next" onClick={()=>obStep<obSteps.length-1?setObStep(s=>s+1):finishOnboard()}>
              {obStep<obSteps.length-1?(isRu?"Далее →":"Next →"):(isRu?"Начать!":"Start!")}
            </button>
          </div>
        </div>
      )}

      {screen==="setup"&&(
        <div className="setup">
          <div className="s-hero"><div className="s-icon">📻</div><div className="s-title">Road Radio</div><div className="s-sub">{slogan}</div></div>
          {needsReview&&(
            <div className="review-banner" onClick={()=>{setSettingsOpen(true);localStorage.setItem("rr_review",String(Date.now()));setNeedsReview(false);}}>
              ⚙️ {isRu?"Давно не заглядывали в настройки. Проверить, всё ли по вкусу? →":"Haven't checked your settings in a while. Tap to review →"}
            </div>
          )}
          <button className={`geobtn${geoOk?" ok":""}`} onClick={getGeo}>{geoOk?(isRu?"✓ Местоположение найдено!":"✓ Location Detected!"):(isRu?"📍 Определить местоположение":"📍 Auto-Detect My Location")}</button>
          {err&&<div className="errbox">⚠ {err}</div>}
          <button className="bigbtn green" style={{marginTop:"8px"}} onClick={startTour}>▶ {isRu?"Начать тур":"Start Tour"}</button>
          <div className="sep">{isRu?"или введите вручную":"or enter manually"}</div>
          <div><label className="flabel">📍 {isRu?"Координаты":"Coordinates (lat, lng)"}</label><input className="finput" value={coordInput} onChange={e=>setCoordInput(e.target.value)} placeholder="35.4615, -97.6882"/></div>
          <div><label className="flabel">🏁 {isRu?"Куда едете?":"Destination?"}</label><input className="finput" value={destination} onChange={e=>setDestination(e.target.value)} placeholder={isRu?"Лос-Анджелес, CA":"Los Angeles, CA"}/></div>
          <div className="row2">
            <div><label className="flabel">🚀 MPH</label><input className="finput" type="number" value={speedVal} onChange={e=>setSpeedVal(e.target.value)}/></div>
            <div><label className="flabel">🧭 {isRu?"Направление °":"Heading °"}</label><input className="finput" type="number" value={headVal} onChange={e=>setHeadVal(e.target.value)}/><div className="dirhint">N=0 · E=90 · S=180 · W=270</div></div>
          </div>
          <div className="changekey" onClick={()=>{if(confirm(isRu?"Сменить API-ключ? Текущий будет удалён.":"Change API key? The current one will be removed.")){localStorage.removeItem(KEY_STORE);setApiInput("");setScreen("apikey");}}}>{isRu?"Сменить API-ключ":"Change API key"}</div>
        </div>
      )}

      {screen==="main"&&(
        <>
          {djMode?(
            <div className={`dj-zone${radioFocus?" focus":""}`} onClick={()=>{if(radioFocus)revealMenu();}}>
              <canvas ref={djCanvasRef} className="dj-canvas"/>
              {radioFocus?(
                <div className="focus-col">
                  <div className="fc-item"><div className="fc-v">{toMph(coords?.speed)||parseInt(speedVal)||"—"}</div><div className="fc-l">MPH</div></div>
                  <div className="fc-item"><div className="fc-v">{toDir(coords?.heading)}</div><div className="fc-l">DIR</div></div>
                  <div className="fc-item"><div className="fc-v">{weather?`${weather.temp}°`:"—"}</div><div className="fc-l">°F</div></div>
                </div>
              ):(
                <>
                  <div className="dj-top"><div className="bcast-badge">{bmObj.icon}</div>{wBadge&&<div className="weather-badge">{wBadge}</div>}</div>
                  <div className="dj-info">
                    {hwDisplay&&<div className="dj-hw">{hwDisplay}</div>}
                    <div className="dj-loc">{locData.name||locData.city||"On the road..."}</div>
                    {coords&&<div className="dj-crd">{coords.lat.toFixed(4)}°N / {Math.abs(coords.lng).toFixed(4)}°W</div>}
                  </div>
                </>
              )}
              {radioFocus&&<div className="focus-hint">{isRu?"коснитесь — меню":"tap for menu"}</div>}
            </div>
          ):(
            <div className="road-bg">
              <canvas ref={roadCanvasRef} className="road-canvas"/>
              <div className="road-over"/>
              <div className="road-top"><div className="bcast-badge">{bmObj.icon}</div>{wBadge&&<div className="weather-badge">{wBadge}</div>}</div>
              <div className="road-bot">
                {hwDisplay&&<div className="road-hw">{hwDisplay}</div>}
                <div className="road-loc">{locData.name||locData.city||"On the road..."}</div>
                {coords&&<div className="road-crd">{coords.lat.toFixed(4)}°N / {Math.abs(coords.lng).toFixed(4)}°W</div>}
                {nearbyPOI.length>0&&<div className="road-poi">📍 {nearbyPOI.slice(0,4).join(" · ")}</div>}
              </div>
            </div>
          )}

          {!radioFocus&&(<>
          <div className="dash">
            <div className="gauge"><div className="gv">{toMph(coords?.speed)||parseInt(speedVal)||"—"}</div><div className="gl">MPH</div></div>
            <div className="gauge"><div className="gv d">{toDir(coords?.heading)}</div><div className="gl">DIR</div></div>
            <div className="gauge"><div className="gv t">{weather?`${weather.temp}°`:"—"}</div><div className="gl">°F</div></div>
          </div>

          <div className="sa">
            <div className="airbar">
              <div className="airlbl">{status==="ready"&&<div className="airdot"/>}{isRu?"В ЭФИРЕ":"ON AIR"}</div>
              <div className="timeinfo">{timeStr}</div>
            </div>
            {showTxt&&story&&<div className="stxt">{story}</div>}
            {micTranscript&&<div className="mic-transcript">🎤 {micTranscript}</div>}
          </div>
          </>)}

          {parked&&(
            <div className="parked-modal">
              <div className="parked-title">{isRu?"Вы остановились":"You've stopped"}</div>
              <div className="parked-sub">{isRu?"Продолжать рассказ об этом месте?":"Continue listening about this place?"}</div>
              <div className="parked-btns">
                <button className="parked-btn go" onClick={()=>{setParked(false);parkedRef.current=false;tourAckRef.current=true;pausedRef.current=false;setPaused(false);loopBusyRef.current=false;hardStop();loopGenRef.current++;const g=loopGenRef.current;setStatus("loading");setTimeout(()=>{if(runRef.current&&loopGenRef.current===g)loopRef.current?.(false,true);},250);}}>{isRu?"✓ Продолжить":"✓ Continue"}</button>
                <button className="parked-btn wait" onClick={()=>{setParked(false);parkedRef.current=false;tourAckRef.current=true;stoppedSince.current=Date.now();loopGenRef.current++;hardStop();setStatus("ready");}}>{isRu?"⏸ Подождать":"⏸ Wait"}</button>
              </div>
            </div>
          )}

          {err&&<div className="errbox" style={{margin:"0 14px 6px"}}>⚠ {err}</div>}

          {qMode&&(
            <div style={{padding:"8px 14px",borderTop:"2px solid #1e2d45"}}>
              <div className="qa">
                <input className="qi" value={qText} onChange={e=>setQText(e.target.value)} placeholder={isRu?"Спросите или скажите как вести эфир...":"Ask, or tell me how to host..."} onKeyDown={e=>e.key==="Enter"&&sendQ()} autoFocus/>
                <div className="qbs">
                  <button className="qbtn send" onClick={sendQ}>{isRu?"Спросить":"Ask"}</button>
                  <button className="qbtn cancel" onClick={()=>{setQMode(false);setQText("");}}>{isRu?"Отмена":"Cancel"}</button>
                </div>
              </div>
            </div>
          )}

          {callMode&&(
            <div className="call-overlay">
              <div className="call-card">
                <div className="call-ava">📻</div>
                <div className="call-title">{isRu?"Дорожное Радио":"Road Radio"}</div>
                <div className="call-phase">
                  {callPhase==="greeting"&&(isRu?"📞 Соединение...":"📞 Connecting...")}
                  {callPhase==="listening"&&(isRu?"🔴 Говорите — диджей слушает":"🔴 Speak — the DJ is listening")}
                  {callPhase==="closing"&&(isRu?"✓ Принято":"✓ Got it")}
                  {callPhase==="type"&&(isRu?"Микрофон недоступен — напишите:":"Mic unavailable — type instead:")}
                </div>
                {micTranscript&&<div className="call-transcript">{micTranscript}</div>}
                {callPhase==="type"&&(
                  <div className="qa" style={{marginTop:"10px"}}>
                    <input className="qi" value={qText} onChange={e=>setQText(e.target.value)} placeholder={isRu?"Ваши пожелания диджею...":"Your message to the DJ..."} autoFocus/>
                    <button className="qbtn send" onClick={()=>{const t=qText;setQText("");userDoneRef.current=true;closeCall(t);}}>{isRu?"Отправить":"Send"}</button>
                  </div>
                )}
                <div className="call-btns">
                  {callPhase==="listening"&&<button className="call-done" onClick={finishCall}>{isRu?"✓ Я сказал всё":"✓ I'm done"}</button>}
                  <button className="call-hang" onClick={cancelCall}>{isRu?"✖ Положить трубку":"✖ Hang up"}</button>
                </div>
              </div>
            </div>
          )}

          {radioFocus?(
            <div className="bottom-ctrl focus-ctrl">
              <button className="callbtn" onClick={(e)=>{e.stopPropagation();openCall();}}>📞 {isRu?"Спросить про это место":"Ask about this place"}</button>
              <button className="roadwatch-btn" onClick={(e)=>{e.stopPropagation();if(coordsRef.current){const{lat,lng}=coordsRef.current;const ts=new Date().toISOString();const data=JSON.parse(localStorage.getItem("rr_roadwatch")||"[]");data.push({lat,lng,ts,type:"roadkill"});localStorage.setItem("rr_roadwatch",JSON.stringify(data.slice(-100)));alert(isRu?"✓ Отметка сохранена":"✓ Marked");}}}>⚠️ ROADWATCH</button>
            </div>
          ):(
          <div className="bottom-ctrl">
            <div className="main-btns">
              <button className="mbtn stop" onClick={stop}>{isRu?"■ Стоп":"■ Stop"}</button>
              <button className={`mbtn pause${paused?" on":""}`} onClick={togglePause}>{paused?(isRu?"▶ Дальше":"▶ Resume"):(isRu?"⏸ Пауза":"⏸ Pause")}</button>
              <button className="mbtn skip" onClick={skipTopic}>{isRu?"⏭ Сменить тему":"⏭ Skip topic"}</button>
            </div>
            <button className="callbtn" onClick={openCall}>📞 {isRu?"Спросить про это место":"Ask about this place"}</button>
            <button className={`favbtn${favRec?" rec":""}`} onClick={()=>{
              try{
                const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
                if(!SR){setSettingsOpen(true);return;}
                const rec=new SR();rec.lang=L[langRef.current]?.tts||"en-US";rec.interimResults=false;rec.continuous=false;
                setFavRec(true);
                rec.onresult=e=>{const t=e.results[0][0].transcript;addFav(t);if(t)alert(isRu?"✓ Пожелание добавлено: "+t:"✓ Added: "+t);};
                rec.onend=()=>setFavRec(false);rec.onerror=()=>setFavRec(false);
                rec.start();
              }catch{setFavRec(false);}
            }}>⭐ {favRec?(isRu?"Говорите пожелание…":"Say your request…"):(isRu?"Добавить пожелание диктору":"Add a request to the host")}</button>
            <div className="sec-btns">
              <button className={`sbtn big${showTxt?" act":""}`} onClick={()=>{setShowTxt(t=>{const n=!t;if(n)setRadioFocus(false);return n;});}}>{showTxt?(isRu?"📄 Текст ✓":"📄 Text ✓"):(isRu?"📄 Текст":"📄 Text")}</button>
              <button className="sbtn big" onClick={()=>{revealMenu();setRadioFocus(true);}}>{isRu?"📻 Только радио":"📻 Radio only"}</button>
              <button className="sbtn" onClick={()=>setSettingsOpen(true)}>⚙️</button>
            </div>
            <button className="roadwatch-btn" onClick={()=>{if(coordsRef.current){const{lat,lng}=coordsRef.current;const ts=new Date().toISOString();const data=JSON.parse(localStorage.getItem("rr_roadwatch")||"[]");data.push({lat,lng,ts,type:"roadkill"});localStorage.setItem("rr_roadwatch",JSON.stringify(data.slice(-100)));alert(isRu?"✓ Отметка сохранена":"✓ Marked");}}}>
              ⚠️ ROADWATCH
            </button>
            <div className="wakeinfo">{wakeLock?(isRu?"🔆 Экран включён":"🔆 Screen on"):(isRu?"⚠ Экран может погаснуть":"⚠ Screen may turn off")}</div>
          </div>
          )}
        </>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
