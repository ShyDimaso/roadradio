<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Road Radio</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#05070f;height:100%;overscroll-behavior:none;}
body{font-family:'Inter',sans-serif;color:#fff;}
.app{min-height:100vh;background:#05070f;display:flex;flex-direction:column;max-width:500px;margin:0 auto;}
.splash{position:fixed;inset:0;background:#05070f;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;animation:splashOut 0.5s ease forwards 2.8s;}
@keyframes splashOut{to{opacity:0;pointer-events:none;}}
.sp-logo{font-family:'Orbitron',monospace;font-size:38px;font-weight:900;color:#ff6b35;letter-spacing:3px;}
.sp-logo em{color:#4a9eff;font-style:normal;}
.sp-line{width:0;height:2px;background:linear-gradient(to right,#ff6b35,#4a9eff);border-radius:2px;animation:lineGrow .9s ease .2s forwards;}
@keyframes lineGrow{to{width:140px}}
.sp-tag{font-size:17px;color:#aabbcc;letter-spacing:1px;text-align:center;opacity:0;animation:fadeIn .6s ease .8s forwards;}
@keyframes fadeIn{to{opacity:1}}
.sp-dots{display:flex;gap:8px;margin-top:6px;}
.sp-dot{width:9px;height:9px;border-radius:50%;animation:dotP 1.4s ease-in-out infinite;}
.sp-dot:nth-child(1){background:#ff6b35;animation-delay:0s;}
.sp-dot:nth-child(2){background:#f5c842;animation-delay:.2s;}
.sp-dot:nth-child(3){background:#4a9eff;animation-delay:.4s;}
@keyframes dotP{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.6);opacity:1}}
.hdr{padding:12px 16px;border-bottom:2px solid #1e2d45;display:flex;align-items:center;justify-content:space-between;background:#060912;position:sticky;top:0;z-index:98;}
.logo-wrap{display:flex;flex-direction:column;}
.logo{font-family:'Orbitron',monospace;font-size:17px;font-weight:900;letter-spacing:2px;color:#ff6b35;}
.logo em{color:#4a9eff;font-style:normal;}
.logo-ver{font-family:'Orbitron',monospace;font-size:9px;color:#334455;letter-spacing:2px;margin-top:1px;}
.hdr-r{display:flex;align-items:center;gap:8px;}
.langsel{background:#0d1525;border:2px solid #4a9eff;border-radius:8px;padding:6px 9px;color:#4a9eff;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;cursor:pointer;outline:none;}
.setbtn{background:#0d1525;border:2px solid #1e2d45;border-radius:8px;padding:6px 12px;color:#aabbcc;font-size:18px;cursor:pointer;outline:none;}
.pill{display:flex;align-items:center;gap:6px;padding:6px 13px;border-radius:20px;border:2px solid #1e2d45;background:#0d1525;}
.dot{width:10px;height:10px;border-radius:50%;}
.dot.on{background:#00e87a;box-shadow:0 0 10px #00e87a;animation:pulse 1.5s infinite;}
.dot.ld{background:#f5c842;box-shadow:0 0 8px #f5c842;animation:pulse .8s infinite;}
.dot.off{background:#334466;}
.ptxt{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:2px;color:#aabbcc;text-transform:uppercase;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:flex;align-items:flex-end;}
.sheet{background:#060912;border-top:2px solid #1e2d45;border-radius:20px 20px 0 0;padding:24px 18px 34px;width:100%;max-width:500px;margin:0 auto;max-height:90vh;overflow-y:auto;}
.sheet-title{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;color:#ff6b35;margin-bottom:20px;letter-spacing:2px;}
.set-sect{font-family:'Orbitron',monospace;font-size:10px;color:#445566;letter-spacing:2px;text-transform:uppercase;margin:18px 0 10px;}
.bcast-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.bcast-btn{padding:13px 12px;background:#0d1525;border:2px solid #1e2d45;border-radius:12px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .15s;}
.bcast-btn.sel{border-color:#aa66ff;background:#0d0a1a;}
.bcast-icon{font-size:22px;flex-shrink:0;}
.bcast-name{font-size:14px;font-weight:700;color:#aabbcc;}
.bcast-desc{font-size:11px;color:#445566;margin-top:2px;}
.bcast-btn.sel .bcast-name{color:#cc88ff;}
.mode-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.mode-btn{padding:14px 4px;background:#0d1525;border:2px solid #1e2d45;border-radius:10px;text-align:center;cursor:pointer;}
.mode-btn.sel{border-color:#ff6b35;background:#1a0c05;}
.mode-icon{font-size:24px;display:block;margin-bottom:5px;}
.mode-lbl{font-family:'Orbitron',monospace;font-size:8px;color:#778899;letter-spacing:1px;text-transform:uppercase;}
.mode-btn.sel .mode-lbl{color:#ff6b35;}
.voice-sel{width:100%;background:#0d1525;border:2px solid #4a9eff;border-radius:10px;padding:12px 14px;color:#4a9eff;font-size:14px;outline:none;margin-top:4px;}
.voice-help{background:#080e1a;border:1px solid #1e2d45;border-radius:10px;padding:14px;margin-top:10px;font-size:13px;color:#778899;line-height:1.7;}
.voice-help b{color:#aabbcc;}
.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.topic-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#0d1525;border:2px solid #1e2d45;border-radius:10px;cursor:pointer;}
.topic-item.on{border-color:#cc3333;background:#1a0808;}
.topic-check{width:22px;height:22px;border-radius:6px;background:#1a2535;border:2px solid #334455;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;color:#fff;}
.topic-item.on .topic-check{background:#cc3333;border-color:#cc3333;}
.topic-lbl{font-size:14px;color:#aabbcc;font-weight:600;}
.topic-item.on .topic-lbl{color:#ff9090;}
.flabel{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:2px;color:#4a9eff;text-transform:uppercase;margin-bottom:10px;display:block;}
.finput{background:#0d1525;border:2px solid #fff;border-radius:12px;padding:17px 18px;color:#fff;font-size:19px;outline:none;width:100%;}
.finput::placeholder{color:#445566;font-size:16px;}
.finput:focus{border-color:#4a9eff;}
.kinput{background:#0d1525;border:2px solid #fff;border-radius:12px;padding:16px 18px;color:#fff;font-size:15px;font-family:monospace;outline:none;width:100%;letter-spacing:1px;}
.kinput::placeholder{color:#445566;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.dirhint{font-size:13px;color:#667788;margin-top:6px;}
.errbox{padding:14px 17px;background:#1a0606;border:2px solid #aa2020;border-radius:10px;color:#ff9090;font-size:16px;font-weight:600;}
.bigbtn{border-radius:14px;padding:19px;font-size:17px;font-weight:700;cursor:pointer;width:100%;letter-spacing:1px;border:2px solid transparent;}
.bigbtn.green{background:linear-gradient(135deg,#0d3a0d,#1a6a1a);color:#00e87a;border-color:#2a6a2a;}
.bigbtn.blue{background:#0d1828;color:#4a9eff;border-color:#2a4a80;}
.sep{display:flex;align-items:center;gap:12px;color:#556677;font-size:15px;}
.sep:before,.sep:after{content:'';flex:1;height:1px;background:#1e2d45;}
.keyscreen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:24px;text-align:center;}
.key-icon{font-size:60px;}
.key-title{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#ff6b35;letter-spacing:2px;}
.key-sub{font-size:17px;color:#aabbcc;line-height:1.7;}
.key-sub a{color:#4a9eff;text-decoration:none;}
.setup{flex:1;padding:22px 18px;display:flex;flex-direction:column;gap:17px;}
.s-hero{text-align:center;}
.s-icon{font-size:54px;margin-bottom:9px;}
.s-title{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#ff6b35;letter-spacing:2px;margin-bottom:6px;}
.s-sub{font-size:17px;color:#aabbcc;line-height:1.5;}
.geobtn{background:#0d1828;border:2px solid #4a9eff;border-radius:12px;padding:17px;color:#4a9eff;font-size:16px;font-weight:700;cursor:pointer;width:100%;}
.geobtn.ok{border-color:#00e87a;color:#00e87a;background:#071410;}
.road-bg{position:relative;height:200px;overflow:hidden;flex-shrink:0;background:#04060e;}
.road-canvas{position:absolute;inset:0;width:100%;height:100%;}
.road-over{position:absolute;inset:0;background:linear-gradient(to top,rgba(5,7,15,1) 0%,rgba(5,7,15,.15) 65%,transparent 100%);}
.road-top{position:absolute;top:0;left:0;right:0;padding:10px 14px;display:flex;justify-content:space-between;align-items:flex-start;}
.weather-badge{background:rgba(6,9,18,.9);border:1px solid #1e2d45;border-radius:16px;padding:6px 14px;font-family:'Orbitron',monospace;font-size:12px;color:#f5c842;letter-spacing:1px;}
.bcast-badge{background:rgba(6,9,18,.9);border:1px solid #1e2d45;border-radius:16px;padding:6px 10px;font-size:18px;}
.road-bot{position:absolute;bottom:0;left:0;right:0;padding:12px 18px;}
.locname{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:2px;color:#ff6b35;text-transform:uppercase;margin-bottom:3px;}
.hw-line{font-family:'Orbitron',monospace;font-size:13px;font-weight:900;color:#00e87a;letter-spacing:2px;margin-bottom:3px;}
.loccrd{font-family:'Orbitron',monospace;font-size:10px;color:#aabbcc;letter-spacing:1px;}
.poi-strip{font-size:11px;color:#2a5a8a;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dash{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:12px 14px;border-bottom:2px solid #1e2d45;}
.gauge{text-align:center;padding:14px 6px;background:#0d1525;border:2px solid #1e2d45;border-radius:12px;}
.gv{font-family:'Orbitron',monospace;font-size:30px;font-weight:900;color:#00e87a;line-height:1;}
.gv.d{font-size:26px;color:#4a9eff;}
.gv.t{font-size:24px;color:#f5c842;}
.gl{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;color:#667788;text-transform:uppercase;margin-top:6px;}
.sa{flex:1;padding:16px 18px 10px;overflow-y:auto;}
.airbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.airlbl{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:3px;color:#667788;text-transform:uppercase;display:flex;align-items:center;gap:6px;}
.airdot{width:8px;height:8px;border-radius:50%;background:#ff6b35;animation:pulse 1.4s infinite;}
.timeinfo{font-family:'Orbitron',monospace;font-size:10px;color:#334455;letter-spacing:1px;}
.stxt{font-size:23px;line-height:1.85;color:#fff;font-style:italic;animation:fadeUp .5s ease;}
.ldtxt{color:#667788;font-family:'Orbitron',monospace;font-size:13px;display:flex;align-items:center;gap:10px;letter-spacing:1px;}
.spinico{display:inline-block;animation:spin 1s linear infinite;}
.pgrow{display:flex;align-items:center;gap:10px;margin-top:12px;}
.pglbl{font-family:'Orbitron',monospace;font-size:10px;color:#889aaa;white-space:nowrap;}
.pgbar{flex:1;height:3px;background:#1a2535;border-radius:2px;overflow:hidden;}
.pgfill{height:100%;background:linear-gradient(to right,#ff6b35,#f5c842);border-radius:2px;transition:width 1s linear;}
.wakeinfo{font-size:12px;color:#445566;text-align:center;padding:5px 0;}
.togrow{padding:9px 14px;display:flex;gap:9px;border-top:2px solid #1e2d45;}
.tog{flex:1;padding:12px 4px;background:#0d1525;border:2px solid #1e2d45;border-radius:10px;font-size:13px;color:#aabbcc;cursor:pointer;text-align:center;font-weight:600;}
.tog.act{background:#0a1a30;border-color:#4a9eff;color:#4a9eff;}
.tog.spk.going{border-color:#00e87a;color:#00e87a;background:#071410;}
.tog.wake.act{border-color:#f5c842;color:#f5c842;background:#120f04;}
.voice-area{padding:9px 14px;border-top:2px solid #1e2d45;}
.mic-btn{width:100%;padding:17px;background:#0d1828;border:2px solid #4a9eff;border-radius:12px;color:#4a9eff;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:10px;}
.mic-btn.listening{background:#1a0808;border-color:#ff4444;color:#ff4444;animation:pulse .8s infinite;}
.mic-btn.processing{background:#080e1a;border-color:#f5c842;color:#f5c842;}
.qa{padding:9px 14px;border-top:2px solid #1e2d45;}
.qi{width:100%;background:#0d1525;border:2px solid #fff;border-radius:10px;padding:14px 16px;color:#fff;font-size:18px;outline:none;margin-bottom:9px;}
.qi::placeholder{color:#445566;}
.qi:focus{border-color:#4a9eff;}
.qbs{display:flex;gap:9px;}
.ctrl{padding:13px 14px 26px;display:flex;gap:10px;border-top:2px solid #1e2d45;}
.btn{flex:1;padding:18px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:1px;}
.btn:active{transform:scale(.96);}
.bstop{background:linear-gradient(135deg,#2e0d0d,#5a1a1a);color:#ff9090;border:2px solid #5a2020;}
.bq{flex:.5;background:#0d1525;color:#4a9eff;border:2px solid #1e3a60;font-size:12px;}
.bsend{background:#0d1e3a;color:#88bbff;border:2px solid #1e3a70;}
.bcancel{background:#0d1020;color:#889aaa;border:2px solid #1e2d45;flex:.5;}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useRef,useEffect}=React;
const PROXY="https://corsproxy.io/?https://api.anthropic.com/v1/messages";
const KEY_STORE="rr_key_v3";
const VER="v14";

const TRAVEL=[
  {id:"car",icon:"🚗",en:"Car",ru:"Машина"},
  {id:"bus",icon:"🚌",en:"Bus/Train",ru:"Автобус"},
  {id:"bike",icon:"🚲",en:"Bike",ru:"Велосипед"},
  {id:"walk",icon:"🚶",en:"Walk",ru:"Пешком"},
];

const BCASTS=[
  {id:"normal",icon:"📻",en:"Road Radio",ru:"Обычный",desc:"Classic",descRu:"Классика",
   prompt:"You are a warm, knowledgeable road companion. Conversational, engaging, balanced mix of history, nature, and local stories."},
  {id:"night",icon:"🌌",en:"Night Drive",ru:"Ночная езда",desc:"Poetic & atmospheric",descRu:"Поэтично",
   prompt:"You are a late-night radio poet. Speak about stars, shadows, night roads, nocturnal wildlife, the quiet beauty of darkness. Slow, intimate, dreamlike."},
  {id:"trucker",icon:"🚛",en:"Trucker",ru:"Дальнобойщик",desc:"CB Radio style",descRu:"Дальнобойщик",
   prompt:"You are a veteran trucker. Speak trucker-to-trucker: mile markers, grade changes, weigh stations, rest areas, truck stops, road conditions. Mention highway numbers and exits. Practical, direct, no poetry."},
  {id:"discovery",icon:"🔍",en:"Discovery",ru:"Открытия",desc:"Science & facts",descRu:"Наука и факты",
   prompt:"You are a National Geographic narrator. Rich science: ecology, wildlife biology, geography, climate. Educational with a 'wow factor' — never dry."},
  {id:"americana",icon:"🇺🇸",en:"Americana",ru:"Американа",desc:"History & soul",descRu:"История США",
   prompt:"You are a storyteller of American history. Native heritage, frontier settlers, Route 66, oil booms, small town America. Nostalgic and proud."},
  {id:"zen",icon:"🌲",en:"Nature Zen",ru:"Природа",desc:"Peaceful",descRu:"Спокойно",
   prompt:"You are a nature meditation guide. Trees, rivers, wildlife, seasons. Calm, healing, restorative."},
  {id:"mystery",icon:"👻",en:"Mysteries",ru:"Тайны",desc:"Legends",descRu:"Легенды",
   prompt:"You are a storyteller of the strange. Local legends, ghost towns, mysterious history, Native spirit stories. Intriguing, slightly eerie."},
  {id:"funny",icon:"😄",en:"Road DJ",ru:"Весёлый DJ",desc:"Fun & humor",descRu:"С юмором",
   prompt:"You are a funny road trip DJ. Light humor, amusing facts, playful observations. Like a road trip friend who makes miles fly by."},
];

const TOPICS=[
  {id:"geology",en:"Geology",ru:"Геология"},{id:"weather",en:"Weather",ru:"Погода"},
  {id:"wildlife",en:"Wildlife",ru:"Животные"},{id:"plants",en:"Plants",ru:"Растения"},
  {id:"history",en:"History",ru:"История"},{id:"towns",en:"Towns",ru:"Города"},
  {id:"road",en:"Roads",ru:"Дороги"},{id:"humor",en:"Humor",ru:"Юмор"},
];

const L={
  en:{lb:"EN",tts:"en-US",ai:"English"},ru:{lb:"RU",tts:"ru-RU",ai:"Russian"},
  uk:{lb:"UA",tts:"uk-UA",ai:"Ukrainian"},es:{lb:"ES",tts:"es-ES",ai:"Spanish"},
  pt:{lb:"PT",tts:"pt-BR",ai:"Portuguese"},de:{lb:"DE",tts:"de-DE",ai:"German"},
  fr:{lb:"FR",tts:"fr-FR",ai:"French"},ja:{lb:"JA",tts:"ja-JP",ai:"Japanese"},
  zh:{lb:"ZH",tts:"zh-CN",ai:"Chinese"},ko:{lb:"KO",tts:"ko-KR",ai:"Korean"},
  ar:{lb:"AR",tts:"ar-SA",ai:"Arabic"},hi:{lb:"HI",tts:"hi-IN",ai:"Hindi"},
  it:{lb:"IT",tts:"it-IT",ai:"Italian"},tr:{lb:"TR",tts:"tr-TR",ai:"Turkish"},
};
const LK=["en","ru","uk","es","pt","de","fr","ja","zh","ko","ar","hi","it","tr"];
const toDir=h=>{if(h==null||isNaN(h))return"—";const d=["N","NE","E","SE","S","SW","W","NW"];return d[Math.round(((h%360)+360)%360/45)%8];};
const toLeft=h=>h==null?"?":toDir((h+90)%360);
const toRight=h=>h==null?"?":toDir((h-90+360)%360);
const toMph=ms=>ms&&ms>0?Math.round(ms*2.237):0;
const WI={0:"☀️",1:"🌤",2:"⛅",3:"☁️",45:"🌫",51:"🌦",61:"🌧",71:"❄️",80:"🌧",95:"⛈"};
const getWI=c=>{const k=Object.keys(WI).map(Number).sort((a,b)=>b-a).find(k=>c>=k);return WI[k]||"☀️";};

function App(){
  const saved=localStorage.getItem(KEY_STORE)||"";
  const autoL=(navigator.language||"en").split("-")[0].toLowerCase();
  const [splash,setSplash]=useState(true);
  const [screen,setScreen]=useState(saved?"setup":"apikey");
  const [apiInput,setApiInput]=useState("");
  const [lang,setLang]=useState(L[autoL]?autoL:"en");
  const [coordInput,setCoordInput]=useState("");
  const [speedVal,setSpeedVal]=useState("65");
  const [headVal,setHeadVal]=useState("90");
  const [destination,setDestination]=useState("");
  const [geoOk,setGeoOk]=useState(false);
  const [coords,setCoords]=useState(null);
  const [status,setStatus]=useState("idle");
  const [story,setStory]=useState("");
  const [locData,setLocData]=useState({name:"",highway:"",county:"",state:"",city:""});
  const [nearbyPOI,setNearbyPOI]=useState([]);
  const [err,setErr]=useState("");
  const [qMode,setQMode]=useState(false);
  const [qText,setQText]=useState("");
  const [showTxt,setShowTxt]=useState(true);
  const [cd,setCd]=useState(0);
  const [speaking,setSpeaking]=useState(false);
  const [wakeLock,setWakeLock]=useState(false);
  const [weather,setWeather]=useState(null);
  const [micState,setMicState]=useState("idle");
  const [settingsOpen,setSettingsOpen]=useState(false);
  const [excluded,setExcluded]=useState(JSON.parse(localStorage.getItem("rr_excl_v2")||"[]"));
  const [travelMode,setTravelMode]=useState(localStorage.getItem("rr_mode_v1")||"car");
  const [bcastMode,setBcastMode]=useState(localStorage.getItem("rr_bcast_v1")||"normal");
  const [voices,setVoices]=useState([]);
  const [selVoice,setSelVoice]=useState("");
  const [timeStr,setTimeStr]=useState("");
  const canvasRef=useRef(null);
  const runRef=useRef(false);
  const histRef=useRef([]);
  const loopRef=useRef(null);
  const coordsRef=useRef(null);
  const cdRef=useRef(null);
  const wlRef=useRef(null);
  const langRef=useRef(lang);
  const bcastRef=useRef(bcastMode);
  const travelRef=useRef(travelMode);
  const destRef=useRef(destination);
  const nextRef=useRef(null);
  const fetchingNext=useRef(false);
  const excludedRef=useRef(excluded);
  const locDataRef=useRef(locData);

  useEffect(()=>{const t=setTimeout(()=>setSplash(false),3300);return()=>clearTimeout(t);},[]);
  useEffect(()=>{langRef.current=lang;},[lang]);
  useEffect(()=>{bcastRef.current=bcastMode;localStorage.setItem("rr_bcast_v1",bcastMode);},[bcastMode]);
  useEffect(()=>{travelRef.current=travelMode;localStorage.setItem("rr_mode_v1",travelMode);},[travelMode]);
  useEffect(()=>{destRef.current=destination;},[destination]);
  useEffect(()=>{if(coords)coordsRef.current=coords;},[coords]);
  useEffect(()=>{excludedRef.current=excluded;localStorage.setItem("rr_excl_v2",JSON.stringify(excluded));},[excluded]);

  // Canvas animation
  useEffect(()=>{
    if(!canvasRef.current)return;
    const cv=canvasRef.current;
    const ctx=cv.getContext('2d');
    cv.width=500;cv.height=200;
    let f=0,raf;
    const draw=()=>{
      f++;
      const bm=bcastRef.current;
      const hr=new Date().getHours();
      const night=hr>=21||hr<6;
      const c1=night||bm==="night"?"#020408":bm==="zen"?"#061008":bm==="mystery"?"#080412":"#04060f";
      const c2=night||bm==="night"?"#060c18":bm==="zen"?"#0a180c":bm==="mystery"?"#0e0820":"#080c1a";
      const g=ctx.createLinearGradient(0,0,0,200);g.addColorStop(0,c1);g.addColorStop(1,c2);
      ctx.fillStyle=g;ctx.fillRect(0,0,500,200);
      if(night||bm==="night"||bm==="mystery"){
        for(let i=0;i<80;i++){
          ctx.fillStyle=`rgba(255,255,255,${.15+.5*Math.sin(f*.02+i*.7)})`;
          ctx.beginPath();ctx.arc((i*97+f*.04)%500,(i*43)%130,i%4===0?1.5:.8,0,Math.PI*2);ctx.fill();
        }
      }
      const hg=ctx.createRadialGradient(250,160,5,250,160,220);
      const gc=bm==="trucker"?"rgba(255,107,53,0.2)":bm==="americana"?"rgba(74,158,255,0.15)":bm==="zen"?"rgba(0,232,122,0.12)":"rgba(255,107,53,0.1)";
      hg.addColorStop(0,gc);hg.addColorStop(1,"transparent");
      ctx.fillStyle=hg;ctx.fillRect(0,0,500,200);
      ctx.strokeStyle="rgba(255,107,53,0.1)";ctx.lineWidth=1;
      const off=(f*2)%40;
      for(let y=100+off;y<210;y+=40){const p=(y-100)/110,w=8+p*90;ctx.beginPath();ctx.moveTo(250-w/2,y);ctx.lineTo(250+w/2,y);ctx.stroke();}
      raf=requestAnimationFrame(draw);
    };
    draw();
    return()=>cancelAnimationFrame(raf);
  },[]);

  // Reverse geocode via Nominatim
  const reverseGeocode=async(lat,lng)=>{
    try{

      const d=await r.json();
      const a=d.address||{};
      const road=a.road||a.motorway||a.trunk||"";
      const ref=a["ref"]||"";
      const county=a.county||a.municipality||"";
      const state=a.state||"";
      const city=a.city||a.town||a.village||a.hamlet||"";
      const hw=ref?ref:road?road:"";
      setLocData({name:d.display_name?.split(",").slice(0,2).join(",").trim()||"",highway:hw,county,state,city});
      return{highway:hw,county,state,city};
    }catch{return{highway:"",county:"",state:"",city:""};}
  };

      const r=await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(q)}`);
      const d=await r.json();
      const names=[...new Set(d.elements?.map(e=>e.tags?.name).filter(Boolean))].slice(0,6);
      setNearbyPOI(names);
      return names;
    }catch{return[];}

EXACT CURRENT LOCATION:

          <div className="sep">{isRu?"или введите вручную":"or enter manually"}</div>
          <div>
            <label className="flabel">📍 {isRu?"Координаты (широта, долгота)":"Coordinates (lat, lng)"}</label>
            <input className="finput" value={coordInput} onChange={e=>setCoordInput(e.target.value)} placeholder="35.4615, -97.6882"/>
          </div>
          <div>
            <label className="flabel">🏁 {isRu?"Куда едете?":"Destination?"}</label>
            <input className="finput" value={destination} onChange={e=>setDestination(e.target.value)} placeholder={isRu?"Лос-Анджелес, CA":"Los Angeles, CA"}/>
          </div>
          <div className="row2">
            <div>
              <label className="flabel">🚀 {isRu?"Скорость mph":"Speed mph"}</label>
              <input className="finput" type="number" value={speedVal} onChange={e=>setSpeedVal(e.target.value)}/>
            </div>
            <div>
              <label className="flabel">🧭 {isRu?"Направление °":"Heading °"}</label>
              <input className="finput" type="number" value={headVal} onChange={e=>setHeadVal(e.target.value)}/>
              <div className="dirhint">N=0 · E=90 · S=180 · W=270</div>
            </div>
          </div>
          {err&&<div className="errbox">⚠ {err}</div>}
          <button className="bigbtn blue" onClick={()=>{localStorage.removeItem(KEY_STORE);setApiInput("");setScreen("apikey");}}>🔑 {isRu?"Сменить ключ":"Change API Key"}</button>
          <button className="bigbtn green" onClick={startTour}>▶ {isRu?"Начать тур":"Start Tour"}</button>
        </div>
      )}

      {screen==="main"&&(
        <>
          <div className="road-bg">
            <canvas ref={canvasRef} className="road-canvas"/>
            <div className="road-over"/>
            <div className="road-top">
              <div className="bcast-badge">{bmObj.icon}</div>
              {wBadge&&<div className="weather-badge">{wBadge}</div>}
            </div>
            <div className="road-bot">
              {hwDisplay&&<div className="hw-line">{hwDisplay}</div>}
              <div className="locname">{locData.name||locData.city||"On the road..."}</div>
              {coords&&<div className="loccrd">{coords.lat.toFixed(4)}°N / {Math.abs(coords.lng).toFixed(4)}°W</div>}
              {nearbyPOI.length>0&&<div className="poi-strip">📍 {nearbyPOI.slice(0,4).join(" · ")}</div>}
            </div>
          </div>

          <div className="dash">
            <div className="gauge"><div className="gv">{toMph(coords?.speed)||parseInt(speedVal)||"—"}</div><div className="gl">MPH</div></div>
            <div className="gauge"><div className="gv d">{toDir(coords?.heading)}</div><div className="gl">DIR</div></div>
            <div className="gauge"><div className="gv t">{weather?`${weather.temp}°`:"—"}</div><div className="gl">°F</div></div>
          </div>

          <div className="sa">
            <div className="airbar">
              <div className="airlbl">{status==="ready"&&<div className="airdot"/>}{status==="loading"?(isRu?"ГЕНЕРИРУЮ...":"GENERATING..."):(isRu?"В ЭФИРЕ":"ON AIR")}</div>
              <div className="timeinfo">{timeStr}</div>
            </div>
            {status==="loading"&&<div className="ldtxt"><span className="spinico">◌</span>&nbsp;{isRu?"Готовлю рассказ...":"Preparing story..."}</div>}
            {showTxt&&story&&status!=="loading"&&<div className="stxt">{story}</div>}
            {!showTxt&&story&&status!=="loading"&&<div className="ldtxt">🔊 {isRu?"Только голос":"Audio only"}</div>}
            {story&&status==="ready"&&(
              <div className="pgrow">
                <span className="pglbl">⟳ {isRu?"след.":"next"}</span>
                <div className="pgbar"><div className="pgfill" style={{width:`${Math.max(0,(1-cd/55)*100)}%`}}/></div>
                <span className="pglbl">{cd}s</span>
              </div>
            )}
          </div>

          <div className="wakeinfo">{wakeLock?(isRu?"🔆 Экран включён":"🔆 Screen on"):(isRu?"⚠ Экран может погаснуть":"⚠ Screen may turn off")}</div>

          <div className="togrow">
            <div className={`tog${showTxt?" act":""}`} onClick={()=>setShowTxt(t=>!t)}>{showTxt?"📄 ✓":"📄"}</div>
            <div className={`tog spk${speaking?" going":""}`} onClick={()=>story&&speak(story)}>{speaking?"🔊 ●":"🔊"}</div>
            <div className={`tog wake${wakeLock?" act":""}`} onClick={()=>wakeLock?wlRef.current?.release():requestWake()}>{wakeLock?"🔆 ✓":"🔆"}</div>
          </div>

          <div className="voice-area">
            <button className={`mic-btn${micState==="listening"?" listening":micState==="processing"?" processing":""}`}
              onMouseDown={startVoice} onTouchStart={startVoice} onMouseUp={()=>{}} onTouchEnd={()=>{}}>
              {micState==="listening"?(isRu?"🔴 Слушаю...":"🔴 Listening..."):micState==="processing"?(isRu?"⏳ Обрабатываю...":"⏳ Processing..."):(isRu?"🎤 Держите для вопроса":"🎤 Hold to Speak")}
            </button>
          </div>

          {err&&<div className="errbox" style={{margin:"0 14px 6px"}}>⚠ {err}</div>}

          {qMode&&(
            <div className="qa">
              <input className="qi" value={qText} onChange={e=>setQText(e.target.value)} placeholder={isRu?"Введите вопрос...":"Type your question..."} onKeyDown={e=>e.key==="Enter"&&sendQ()} autoFocus/>
              <div className="qbs">
                <button className="btn bsend" style={{flex:1,padding:"13px"}} onClick={sendQ}>{isRu?"Спросить":"Ask"}</button>
                <button className="btn bcancel" style={{padding:"13px"}} onClick={()=>{setQMode(false);setQText("");}}>{isRu?"Отмена":"Cancel"}</button>
              </div>
            </div>
          )}

          <div className="ctrl">
            <button className="btn bstop" onClick={stop}>{isRu?"■ Стоп":"■ Stop"}</button>
            <button className="btn bq" onClick={()=>setQMode(t=>!t)}>{isRu?"? Текст":"? Type"}</button>
          </div>
        </>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
