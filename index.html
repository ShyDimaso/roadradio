*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#05070f;height:100%;overscroll-behavior:none;}
body{font-family:'Inter',sans-serif;color:#fff;}
.app{min-height:100vh;background:#05070f;display:flex;flex-direction:column;max-width:500px;margin:0 auto;}
.hdr{padding:12px 16px;border-bottom:2px solid #2a3550;display:flex;align-items:center;justify-content:space-between;background:#080b15;position:sticky;top:0;z-index:99;}
.logo{font-family:'Orbitron',monospace;font-size:14px;font-weight:900;letter-spacing:2px;color:#ff6b35;}
.logo em{color:#4a9eff;font-style:normal;}
.hdr-r{display:flex;align-items:center;gap:8px;}
.langsel{background:#0d1525;border:2px solid #4a9eff;border-radius:8px;padding:5px 8px;color:#4a9eff;font-family:'Orbitron',monospace;font-size:9px;font-weight:700;cursor:pointer;outline:none;}
.pill{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;border:2px solid #2a3550;background:#0d1525;}
.dot{width:9px;height:9px;border-radius:50%;}
.dot.on{background:#00e87a;box-shadow:0 0 10px #00e87a;animation:pulse 1.5s infinite;}
.dot.ld{background:#f5c842;box-shadow:0 0 8px #f5c842;animation:pulse .8s infinite;}
.dot.off{background:#334466;}
.ptxt{font-family:'Orbitron',monospace;font-size:9px;font-weight:700;letter-spacing:2px;color:#aabbcc;text-transform:uppercase;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.flabel{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:2px;color:#4a9eff;text-transform:uppercase;margin-bottom:9px;display:block;}
.finput{background:#0d1525;border:2px solid #ffffff;border-radius:12px;padding:16px 18px;color:#ffffff;font-size:18px;outline:none;width:100%;}
.finput::placeholder{color:#556688;font-size:15px;}
.finput:focus{border-color:#4a9eff;}
.keyscreen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:20px;text-align:center;}
.key-icon{font-size:56px;}
.key-title{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:#ff6b35;letter-spacing:2px;}
.key-sub{font-size:16px;color:#aabbcc;line-height:1.7;}
.key-sub a{color:#4a9eff;text-decoration:none;}
.kinput{background:#0d1525;border:2px solid #ffffff;border-radius:12px;padding:15px 18px;color:#ffffff;font-size:13px;font-family:monospace;outline:none;width:100%;letter-spacing:1px;}
.kinput::placeholder{color:#556688;}
.kinput:focus{border-color:#4a9eff;}
.setup{flex:1;padding:22px 18px;display:flex;flex-direction:column;gap:16px;}
.s-hero{text-align:center;}
.s-icon{font-size:50px;margin-bottom:8px;}
.s-title{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:#ff6b35;letter-spacing:2px;margin-bottom:5px;}
.s-sub{font-size:16px;color:#aabbcc;line-height:1.5;}
.geobtn{background:#0d1828;border:2px solid #4a9eff;border-radius:12px;padding:16px;color:#4a9eff;font-size:14px;font-weight:700;cursor:pointer;width:100%;}
.geobtn.ok{border-color:#00e87a;color:#00e87a;background:#081810;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.dirhint{font-size:13px;color:#778899;margin-top:6px;}
.errbox{padding:14px 16px;background:#200808;border:2px solid #cc2020;border-radius:10px;color:#ff9090;font-size:15px;font-weight:600;}
.bigbtn{border-radius:14px;padding:18px;font-size:15px;font-weight:700;cursor:pointer;width:100%;letter-spacing:1px;border:none;}
.bigbtn.green{background:linear-gradient(135deg,#0d3a0d,#1a6a1a);color:#00e87a;border:2px solid #2a6a2a;}
.bigbtn.blue{background:#0d1828;color:#4a9eff;border:2px solid #2a4a80;}
.sep{display:flex;align-items:center;gap:12px;color:#667788;font-size:14px;}
.sep:before,.sep:after{content:'';flex:1;height:1px;background:#2a3550;}
.imgzone{position:relative;height:190px;background:#0d1020;overflow:hidden;flex-shrink:0;}

.imgover{position:absolute;inset:0;background:linear-gradient(to top,rgba(5,7,15,1) 0%,rgba(5,7,15,.15) 65%,transparent 100%);}

.loccrd{font-family:'Orbitron',monospace;font-size:10px;color:#aabbcc;letter-spacing:1px;}
.imgsp{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:36px;opacity:.2;animation:spin 4s linear infinite;}

.qi{width:100%;background:#0d1525;border:2px solid #ffffff;border-radius:10px;padding:14px 15px;color:#ffffff;font-size:17px;outline:none;margin-bottom:8px;}

.qi:focus{border-color:#4a9eff;}
.qbs{display:flex;gap:8px;}
.ctrl{padding:13px 14px 24px;display:flex;gap:10px;border-top:2px solid #2a3550;}
.btn{flex:1;padding:17px;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:1px;}
.btn:active{transform:scale(.96);}
.bstop{background:linear-gradient(135deg,#2e0d0d,#5a1a1a);color:#ff9090;border:2px solid #5a2020;}
.bq{flex:.6;background:#0d1525;color:#4a9eff;border:2px solid #2a4a70;font-size:11px;}
.bsend{background:#0d1e3a;color:#88bbff;border:2px solid #2a4a80;}
.bcancel{background:#0d1020;color:#8899aa;border:2px solid #2a3550;flex:.5;}

function App(){
  const saved=localStorage.getItem(KEY_STORE)||"";
  const autoL=(navigator.language||"en").split("-")[0].toLowerCase();

  const [lang,setLang]=useState(L[autoL]?autoL:"en");

  const [headVal,setHeadVal]=useState("90");

  const [locName,setLocName]=useState("");
  const [imgSeed,setImgSeed]=useState(1);
  const [imgLoaded,setImgLoaded]=useState(false);
  const [err,setErr]=useState("");
  const [qMode,setQMode]=useState(false);
  const [qText,setQText]=useState("");

  const [count,setCount]=useState(0);

  const [wakeLock,setWakeLock]=useState(false);

  const runRef=useRef(false);
  const histRef=useRef([]);
  const loopRef=useRef(null);

  const cdRef=useRef(null);

    try{if("wakeLock" in navigator){wlRef.current=await navigator.wakeLock.request("screen");setWakeLock(true);wlRef.current.addEventListener("release",()=>setWakeLock(false));}}catch{}

  useEffect(()=>{
    const h=()=>{if(document.visibilityState==="visible"&&runRef.current)requestWake();};
    document.addEventListener("visibilitychange",h);
    return()=>document.removeEventListener("visibilitychange",h);
  },[]);

  const startCd=s=>{
    setCd(s);
    if(cdRef.current)clearInterval(cdRef.current);
    cdRef.current=setInterval(()=>setCd(p=>{if(p<=1){clearInterval(cdRef.current);return 0;}return p-1;}),1000);
  };

  const speak=text=>new Promise(res=>{
    try{
      const s=window.speechSynthesis;
      if(!s){res();return;}
      s.cancel();
      const tl=L[langRef.current]?.tts||"en-US";
      const u=new SpeechSynthesisUtterance(text);
      u.lang=tl;u.rate=0.88;u.pitch=1.05;
      try{const vs=s.getVoices();const v=vs.find(x=>x.lang===tl)||vs.find(x=>x.lang.startsWith(tl.split("-")[0]))||vs[0];if(v)u.voice=v;}catch{}

      u.onend=u.onerror=()=>{setSpeaking(false);res();};
      s.speak(u);
    }catch{setSpeaking(false);res();}
  });

    const key=localStorage.getItem(KEY_STORE);
    const al=L[langRef.current]?.ai||"English";
    const msgs=[...histRef.current.slice(-4),{role:"user",content:msg}];
    const r=await fetch(PROXY,{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({
        model:"claude-haiku-4-5-20251001",
        max_tokens:400,
        system:`You are Road Radio AI — a charismatic, witty road trip companion and guide. You make every mile interesting.

YOUR STYLE: Warm, engaging, slightly humorous — like a brilliant friend who happens to know everything. Never dry or lecture-like. Think best podcast host meets knowledgeable local guide.

WHAT TO TALK ABOUT (rotate naturally, never repeat same topic twice in a row):
- Immediate surroundings: exact terrain, trees, soil type, what animals live here RIGHT NOW
- Local geology: what rocks/minerals are under the wheels, how this landscape formed
- Weather & climate: current conditions, seasonal patterns, what to expect ahead
- Road itself: when built, what material, interesting construction facts
- Wildlife: what animals are in these exact woods/fields, habits, fun facts
- Plants & forests: species here, age of trees, ecosystem facts
- Underground: what minerals/fossils have been found in this county
- Night sky: what constellations are visible here, any observatories nearby
- Water: any rivers/lakes/swamps nearby, what fish live there, water quality
- History: what happened HERE 50-500 years ago, Native American history, settlers
- Upcoming: "In about 15 miles you'll approach [place] — here's a fun fact to get you ready..."
- Hidden gems: things 10-30 miles away that most drivers never know about

RULES:
- If nothing famous nearby: go deep on nature, geology, wildlife, road history, weather
- Always end with a hook or teaser about what's coming
- Be warm and conversational, add light humor when appropriate  
- NEVER say "there's nothing interesting here" — there ALWAYS is something
- 3-4 sentences ONLY. Make every word count.
- CRITICAL: Respond entirely in ${al}. Every single word must be in ${al}.
Reply ONLY valid JSON no markdown: {"story":"3-4 sentences","location":"name of exact current location in English","image":"2-3 english words for landscape"}`,
        messages:msgs
      })
    });
    if(!r.ok)throw new Error(await r.text());
    const data=await r.json();
    let txt=data.content?.[0]?.text??"{}";
    txt=txt.replace(/```json|```/g,"").trim();
    try{const p=JSON.parse(txt);histRef.current=[...msgs,{role:"assistant",content:txt}];return p;}
    catch{histRef.current=[...msgs,{role:"assistant",content:txt}];return{story:txt,location:"On the road",image:"highway"};}
  };

  const loop=async()=>{
    if(!runRef.current)return;
    const c=coordsRef.current;
    if(!c)return;
    setStatus("loading");
    try{
      const spd=toMph(c.speed)||parseInt(speedVal)||65;
      const prompt=`EXACT current position: ${c.lat.toFixed(5)}°N, ${c.lng.toFixed(5)}°W. Speed: ${spd} mph. Heading: ${toDir(c.heading)}. Describe what is RIGHT HERE within 1 mile of this exact spot.`;
      const res=await callClaude(prompt);
      if(!runRef.current)return;
      setStory(res.story||"");
      setLocName(res.location||"");
      cntRef.current+=1;
      setCount(cntRef.current);
      const seed=Math.round(Math.abs(c.lat*1000+c.lng*1000))%9000+1000;
      setImgSeed(seed);
      setImgLoaded(false);
      setStatus("ready");
      startCd(35);
      if(res.story)speak(res.story);
      await new Promise(r=>setTimeout(r,35000));
      if(runRef.current)loopRef.current?.();
    }catch(e){
      setErr((e.message||"Connection error").slice(0,100));
      runRef.current=false;setStatus("idle");
    }
  };
  loopRef.current=loop;

  const getGeo=()=>{
    if(!navigator.geolocation){setErr("Geolocation not supported");return;}
    setErr("");
    navigator.geolocation.getCurrentPosition(pos=>{
      const c={lat:pos.coords.latitude,lng:pos.coords.longitude,speed:pos.coords.speed||0,heading:pos.coords.heading};
      setCoordInput(`${c.lat.toFixed(6)}, ${c.lng.toFixed(6)}`);
      if(c.speed)setSpeedVal(String(toMph(c.speed)));
      if(c.heading)setHeadVal(String(Math.round(c.heading)));
      coordsRef.current=c;setGeoOk(true);
    },()=>setErr("Location denied. Enter manually."),{enableHighAccuracy:true,timeout:12000});
  };

  const parseCoords=()=>{
    const m=coordInput.trim().match(/(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)/);
    if(!m)return null;
    return{lat:parseFloat(m[1]),lng:parseFloat(m[2]),speed:0,heading:parseFloat(headVal)||90};
  };

  const startGeoWatch=()=>{
    if(!navigator.geolocation)return;
    navigator.geolocation.watchPosition(pos=>{
      const c={lat:pos.coords.latitude,lng:pos.coords.longitude,speed:pos.coords.speed||0,heading:pos.coords.heading};
      coordsRef.current=c;setCoords(c);
    },()=>{},{enableHighAccuracy:true,maximumAge:5000});
  };

  const startTour=async()=>{
    let c=coordsRef.current||parseCoords();
    if(!c){setErr("Tap Auto-Detect or enter coordinates");return;}
    coordsRef.current=c;setCoords(c);
    runRef.current=true;histRef.current=[];cntRef.current=0;
    setErr("");setStory("");setCount(0);
    setScreen("main");startGeoWatch();
    await requestWake();
    setTimeout(()=>loopRef.current?.(),300);
  };

  const stop=()=>{
    runRef.current=false;
    try{window.speechSynthesis?.cancel();}catch{}
    setSpeaking(false);setStatus("idle");
    try{wlRef.current?.release();}catch{}
    setWakeLock(false);
    if(cdRef.current)clearInterval(cdRef.current);
    setScreen("setup");
  };

  const sendQ=async()=>{
    if(!qText.trim())return;
    try{window.speechSynthesis?.cancel();}catch{}
    setQMode(false);setStatus("loading");
    try{
      const res=await callClaude(qText);
      setStory(res.story||res);setQText("");setStatus("ready");startCd(35);
      if(res.story)speak(res.story);
      await new Promise(r=>setTimeout(r,35000));
      if(runRef.current)loopRef.current?.();else setStatus("idle");
    }catch{setStatus("idle");}
  };

  const saveKey=()=>{
    const k=apiInput.trim();
    if(!k.startsWith("sk-ant")){setErr(T("ke"));return;}
    localStorage.setItem(KEY_STORE,k);setErr("");setScreen("setup");
  };

  const isMain=screen==="main";
  const dotCls=!isMain?"off":status==="loading"?"ld":"on";
  const stTxt=!isMain?T("rdy"):status==="loading"?T("load"):T("air");
  const imgUrl=`https://picsum.photos/seed/${imgSeed}/700/300`;

  return(
    <div className="app">
      <div className="hdr">
        <div className="logo">Road <em>Radio</em> AI</div>
        <div className="hdr-r">
          <select className="langsel" value={lang} onChange={e=>setLang(e.target.value)}>
            {LK.map(k=><option key={k} value={k}>{L[k].lb}</option>)}
          </select>
          <div className="pill">
            <div className={`dot ${dotCls}`}/>
            <span className="ptxt">{stTxt}</span>
          </div>
        </div>
      </div>

      {screen==="apikey"&&(
        <div className="keyscreen">
          <div className="key-icon">🔑</div>
          <div className="key-title">{T("kt")}</div>
          <div className="key-sub">{T("ks")}<br/><a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a><br/>{T("kc")}</div>
          <div style={{width:"100%"}}>
            <div className="flabel">{T("kl")}</div>
            <input className="kinput" value={apiInput} onChange={e=>setApiInput(e.target.value)} placeholder="sk-ant-api03-..."/>
          </div>
          {err&&<div className="errbox">⚠ {err}</div>}
          <button className="bigbtn green" onClick={saveKey}>{T("ksv")}</button>
          <div style={{fontSize:"13px",color:"#667788",textAlign:"center"}}>{T("kn")}</div>
        </div>
      )}

      {screen==="setup"&&(
        <div className="setup">
          <div className="s-hero">
            <div className="s-icon">🛣️</div>
            <div className="s-title">Road Radio AI</div>
            <div className="s-sub">{T("title")}</div>
          </div>
          <button className={`geobtn${geoOk?" ok":""}`} onClick={getGeo}>{geoOk?T("geoOk"):T("geo")}</button>
          <div className="sep">{T("manual")}</div>
          <div>
            <label className="flabel">{T("coords")}</label>
            <input className="finput" value={coordInput} onChange={e=>setCoordInput(e.target.value)} placeholder="35.4615, -97.6882"/>
          </div>
          <div className="row2">
            <div>
              <label className="flabel">{T("speed")}</label>
              <input className="finput" type="number" value={speedVal} onChange={e=>setSpeedVal(e.target.value)}/>
            </div>
            <div>
              <label className="flabel">{T("hdg")}</label>
              <input className="finput" type="number" value={headVal} onChange={e=>setHeadVal(e.target.value)}/>
              <div className="dirhint">{T("hint")}</div>
            </div>
          </div>
          {err&&<div className="errbox">⚠ {err}</div>}
          <button className="bigbtn blue" onClick={()=>{localStorage.removeItem(KEY_STORE);setApiInput("");setScreen("apikey");}}>{T("chKey")}</button>
          <button className="bigbtn green" onClick={startTour}>{T("start")}</button>
        </div>
      )}

      {screen==="main"&&(
        <>
          <div className="imgzone">
            {!imgLoaded&&<div className="imgsp">🌄</div>}
            <img className={`locimg${imgLoaded?" on":""}`} src={imgUrl} alt=""
              onLoad={()=>setImgLoaded(true)}
              onError={(e)=>{e.target.src=`https://picsum.photos/700/300?random=${imgSeed}`;}}
            />
            <div className="imgover"/>
            <div className="imgbot">
              <div className="locname">{locName||"..."}</div>
              {coords&&<div className="loccrd">{coords.lat.toFixed(4)}°N / {Math.abs(coords.lng).toFixed(4)}°W</div>}
            </div>
          </div>
          <div className="dash">
            <div className="gauge"><div className="gv">{toMph(coords?.speed)||parseInt(speedVal)||"—"}</div><div className="gl">MPH</div></div>
            <div className="gauge"><div className="gv d">{toDir(coords?.heading)}</div><div className="gl">DIR</div></div>
            <div className="gauge"><div className="gv c">{count}</div><div className="gl">{L[lang].lb}</div></div>
            <div className="gauge"><div className="gv w">{coords?`${coords.lat.toFixed(1)}°`:"—"}</div><div className="gl">LAT</div></div>
          </div>
          <div className="sa">
            <div className="airbar">
              <div className="airlbl">{status==="ready"&&<div className="airdot"/>}{status==="loading"?T("gen"):T("air")}</div>
              <div className="snum">#{count}</div>
            </div>
            {status==="loading"&&<div className="ldtxt"><span className="sp">◌</span>&nbsp;{T("prep")}</div>}
            {showTxt&&story&&status!=="loading"&&<div className="stxt">{story}</div>}
            {!showTxt&&story&&status!=="loading"&&<div className="ldtxt">🔊</div>}
            {story&&status==="ready"&&(
              <div className="pgrow">
                <span className="pglbl">⟳ {T("nxt")}</span>
                <div className="pgbar"><div className="pgfill" style={{width:`${Math.max(0,(1-cd/35)*100)}%`}}/></div>
                <span className="pglbl">{cd}s</span>
              </div>
            )}
          </div>
          <div className="wakeinfo">{wakeLock?T("scrOn"):T("scrOff")}</div>
          <div className="togrow">
            <div className={`tog${showTxt?" act":""}`} onClick={()=>setShowTxt(t=>!t)}>{showTxt?T("tOn"):T("tOff")}</div>
            <div className={`tog spk${speaking?" going":""}`} onClick={()=>story&&speak(story)}>{speaking?T("spk"):T("rpl")}</div>
            <div className={`tog wake${wakeLock?" act":""}`} onClick={()=>wakeLock?wlRef.current?.release():requestWake()}>{wakeLock?T("awk"):T("wk")}</div>
          </div>
          {err&&<div className="errbox" style={{margin:"0 14px 8px"}}>⚠ {err}</div>}
          {qMode&&(
            <div className="qa">
              <input className="qi" value={qText} onChange={e=>setQText(e.target.value)} placeholder={T("qph")} onKeyDown={e=>e.key==="Enter"&&sendQ()} autoFocus/>
              <div className="qbs">
                <button className="btn bsend" style={{flex:1,padding:"12px"}} onClick={sendQ}>{T("send")}</button>
                <button className="btn bcancel" style={{padding:"12px"}} onClick={()=>{setQMode(false);setQText("");}}>{T("cnl")}</button>
              </div>
            </div>
          )}
          <div className="ctrl">
            <button className="btn bstop" onClick={stop}>{T("stop")}</button>
            {!qMode&&<button className="btn bq" onClick={()=>setQMode(true)}>{T("ask")}</button>}
          </div>
        </>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
